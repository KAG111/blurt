    const flash = document.getElementById('flash-note');
    const inputEl = document.getElementById('answer-input');
    inputEl.classList.add('flash');
    flash.classList.add('show');
    setTimeout(() => { inputEl.classList.remove('flash'); flash.classList.remove('show'); }, 900);
    renderStudentCloud();
  }
}

function renderStudentRoomMC() {
  const s = state;
  const isPoll = s.type === 'poll';
  app.innerHTML = `
    <div class="student-wrap">
      <div class="student-header">
        <div class="student-room-code sans">Room ${s.code}${isPoll ? ' · Question ' + (currentIndexOf(s) + 1) + ' of ' + numQuestionsOf(s) : ''}</div>
        <div class="student-prompt" id="mc-prompt-text">${escapeHtml(currentPromptText(s))}</div>
        <div class="footnote sans" id="mc-multi-hint" style="margin-top:0.4rem;">${currentAllowMultiple(s) ? 'Select all that apply' : ''}</div>
      </div>
      <button class="btn-leave-room sans" id="btn-leave-room">🔁 Join a different bower</button>
      <div style="display:flex;flex-direction:column;gap:0.6rem;width:100%;max-width:420px;" id="mc-options-wrap"></div>
      <button class="btn-submit sans" id="btn-submit-vote" style="max-width:420px;width:100%;" disabled>Submit</button>
      <div class="flash-note sans show" id="mc-status-note" style="height:auto;"></div>
      <div style="width:100%;max-width:640px;margin-top:1rem;" id="mc-results-wrap"></div>
    </div>`;
  wireLeaveRoomBtn();
  s.selected = [];
  if (isPoll) s.hasVoted = !!s.answeredIndices[s.currentIndex];
  renderMCOptions();
  renderMCStudentResults();
  stopPolling();
  const tick = async () => {
    const cfgRaw = await kvGet('room:' + s.code + ':config');
    let indexChanged = false;
    if (cfgRaw) {
      try {
        const cfg = JSON.parse(cfgRaw);
        s.revealed = cfg.revealed;
        s.blockedSessions = cfg.blockedSessions || [];
        s.presentationMode = cfg.presentationMode || 'classic';
        
        if (isBlockedSession()) {
          renderBlockedScreen();
          return;
        }
        
        if (isPoll && cfg.finished && s.studentName) {
          stopPolling();
          state = { screen: 'studentQuizResults', code: s.code, questions: s.questions, studentName: s.studentName };
          render();
          return;
        }
        if (isPoll && cfg.currentIndex !== s.currentIndex) {
          s.currentIndex = cfg.currentIndex;
          s.selected = [];
          s.hasVoted = !!s.answeredIndices[s.currentIndex];
          indexChanged = true;
        }
      } catch (e) {}
    }
    const raw = await kvGet('room:' + s.code + ':votes');
    if (raw) { try { s.votes = JSON.parse(raw); } catch (e) {} }
    if (indexChanged) {
      document.getElementById('mc-prompt-text').textContent = currentPromptText(s);
      document.getElementById('mc-multi-hint').textContent = currentAllowMultiple(s) ? 'Select all that apply' : '';
      document.getElementById('mc-status-note').textContent = '';
      const roomLabel = document.querySelector('.student-room-code');
      if (roomLabel) roomLabel.textContent = 'Room ' + s.code + ' · Question ' + (currentIndexOf(s) + 1) + ' of ' + numQuestionsOf(s);
      renderMCOptions();
    }
    renderMCStudentResults();
  };
  pollTimer = setupRealtimeListener(s.code, tick);
}

function renderMCOptions() {
  const s = state;
  const wrap = document.getElementById('mc-options-wrap');
  if (!wrap) return;
  const options = currentOptions(s);
  const allowMultiple = currentAllowMultiple(s);
  wrap.innerHTML = options.map((opt, i) => `
    <button class="mc-vote-btn sans ${allowMultiple ? 'multi' : ''} ${s.selected.includes(i) ? 'selected' : ''}"
      data-idx="${i}" id="mc-opt-${i}" ${s.hasVoted ? 'disabled' : ''}>
      <span class="mc-vote-marker">${s.selected.includes(i) ? '✓' : ''}</span>
      <span>${escapeHtml(opt)}</span>
    </button>`).join('');
  const submitBtn = document.getElementById('btn-submit-vote');
  if (submitBtn) submitBtn.disabled = s.hasVoted || s.selected.length === 0;
  if (s.hasVoted) return;
  document.querySelectorAll('.mc-vote-btn').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx, 10);
      if (allowMultiple) {
        if (s.selected.includes(idx)) s.selected = s.selected.filter(x => x !== idx);
        else s.selected.push(idx);
      } else {
        s.selected = [idx];
      }
      renderMCOptions();
    };
  });
  if (submitBtn) submitBtn.onclick = submitVote;
}

async function submitVote() {
  const s = state;
  if (s.selected.length === 0) return;
  const isPoll = s.type === 'poll';
  const qIndex = currentIndexOf(s);
  document.getElementById('btn-submit-vote').disabled = true;
  
  const targetRoom = getTargetRoom(s);
  const isShadow = targetRoom.startsWith('MOD-');
  
  if (isShadow) {
    // Moderated: append server-side via RPC. This browser never reads the
    // shared pending vote list, so it never sees other students' choices.
    let status = 'error';
    for (let attempt = 0; attempt < 3; attempt++) {
      status = await submitPendingItem(s.code, 'votes', {
        id: Math.random().toString(36).slice(2) + Date.now().toString(36),
        value: s.selected.slice(),
        qIndex,
        studentName: s.studentName,
        sessionId: s.mySessionId
      });
      if (status === 'ok' || isSoftFailStatus(status)) break;
      await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
    }
    if (status !== 'ok') {
      document.getElementById('btn-submit-vote').disabled = false;
      document.getElementById('mc-status-note').textContent = submitStatusMessage(status);
      return;
    }
  } else {
    let status = 'error';
    for (let attempt = 0; attempt < 3; attempt++) {
      status = await incrementVotesRPC(targetRoom, isPoll ? qIndex : null, s.selected.slice(), s.mySessionId);
      if (status === 'ok' || isSoftFailStatus(status)) break;
      await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
    }
    if (status === 'ok') {
      const raw = await kvGet('room:' + targetRoom + ':votes');
      if (raw) { try { s.votes = JSON.parse(raw); } catch (e) {} }
    } else {
      document.getElementById('btn-submit-vote').disabled = false;
      document.getElementById('mc-status-note').textContent = submitStatusMessage(status);
      return;
    }
  }

  s.hasVoted = true;
  if (isPoll) {
    s.answeredIndices[qIndex] = true;
    if (s.studentName && !isShadow) await recordStudentResponse(s, qIndex, s.selected.slice());
  }
  document.getElementById('mc-status-note').textContent = '✓ Vote submitted — thanks!';
  renderMCOptions();
  renderMCStudentResults();
}

async function recordStudentResponse(s, qIndex, selectedIndices) {
  const targetRoom = getTargetRoom(s);
  let status = 'error';
  for (let attempt = 0; attempt < 3; attempt++) {
    status = await recordStudentResponseRPC(targetRoom, s.studentName.trim(), qIndex, selectedIndices);
    if (status === 'ok' || isSoftFailStatus(status)) return;
    await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
  }
}

function renderMCStudentResults() {
  const wrap = document.getElementById('mc-results-wrap');
  if (!wrap) return;
  const s = state;
  if (!s.revealed) {
    wrap.innerHTML = "<div class=\"hidden-note sans\" style=\"font-size:0.9rem;\">Your teacher hasn't revealed the results yet.</div>";
    return;
  }
  wrap.innerHTML = mcResultsHtml(currentOptions(s), getCurrentVotes(s), currentCorrectIndex(s), s.hasVoted);
}

function renderStudentCloud() {
  const wrap = document.getElementById('student-cloud-wrap');
  if (!wrap) return;
  const s = state;
  if (!s.revealed) {
    wrap.innerHTML = "<div class=\"hidden-note sans\" style=\"font-size:0.9rem;\">Your teacher hasn't revealed the answers yet.</div>";
    return;
  }
  wrap.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:0.8rem;">
      <div class="download-dropdown-wrap">
        <button class="btn-nav sans" id="btn-download-board" style="padding:0.4rem 0.8rem;font-size:0.8rem;">⬇️ Download Board</button>
        <div class="download-dropdown-menu sans" id="download-menu" style="display:none;right:0;left:auto;">
          <button class="download-menu-item" id="download-csv">Export as CSV</button>
          <button class="download-menu-item" id="download-pdf">Export as PDF</button>
          <button class="download-menu-item" id="download-jpeg">Export as JPEG</button>
        </div>
      </div>
    </div>
  ` + cloudHtml(s.words, true);

  const downloadBtn = wrap.querySelector('#btn-download-board');
  const downloadMenu = wrap.querySelector('#download-menu');
  if (downloadBtn && downloadMenu) {
    downloadBtn.onclick = (e) => {
      e.stopPropagation();
      downloadMenu.style.display = downloadMenu.style.display === 'none' ? 'flex' : 'none';
    };
    wrap.querySelector('#download-csv').onclick = () => exportBoard('csv');
    wrap.querySelector('#download-pdf').onclick = () => exportBoard('pdf');
    wrap.querySelector('#download-jpeg').onclick = () => exportBoard('jpeg');
  }
}

// html2canvas/jsPDF are only needed for this export feature, used well
// after initial load — fetched on first use instead of blocking startup.
const _scriptLoadPromises = {};
function loadScriptOnce(src) {
  if (!_scriptLoadPromises[src]) {
    _scriptLoadPromises[src] = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src;
      script.onload = () => resolve();
      script.onerror = () => reject(new Error('Failed to load ' + src));
      document.head.appendChild(script);
    });
  }
  return _scriptLoadPromises[src];
}
function ensureExportLibraries() {
  return Promise.all([
    loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
    loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
  ]);
}

function boardToCSVRows(s) {
  if (s.type === 'wordcloud') {
    const rows = [['Word', 'Count']];
    (s.words || []).slice().sort((a, b) => b.count - a.count).forEach(w => {
      rows.push([w.text, w.count]);
    });
    return rows;
  }
  if (s.type === 'brainstorm') {
    const rows = [['Idea', 'Likes']];
    (s.posts || []).slice().sort((a, b) => (b.likes || 0) - (a.likes || 0)).forEach(p => {
      rows.push([p.text, p.likes || 0]);
    });
    return rows;
  }
  if (s.type === 'sticky') {
    const rows = [['Note', 'Likes', 'Has Image']];
    (s.posts || []).slice().sort((a, b) => (b.likes || 0) - (a.likes || 0)).forEach(p => {
      rows.push([p.text, p.likes || 0, p.image ? 'Yes' : 'No']);
    });
    return rows;
  }
  if (s.type === 'ranking') {
    const N = (s.options || []).length;
    const scores = {};
    (s.options || []).forEach(opt => { scores[opt] = 0; });
    (s.votes || []).forEach(sub => {
      sub.forEach((opt, idx) => {
        if (scores[opt] !== undefined) scores[opt] += (N - idx);
      });
    });
    const sorted = (s.options || []).map(opt => ({ text: opt, points: scores[opt] })).sort((a, b) => b.points - a.points);
    const rows = [['Rank', 'Option', 'Points']];
    sorted.forEach((item, idx) => rows.push([idx + 1, item.text, item.points]));
    return rows;
  }
  if (s.type === 'mc' || s.type === 'poll') {
    const isPoll = s.type === 'poll';
    const questions = isPoll ? (s.questions || []) : [{ prompt: s.prompt, options: s.options, correctIndex: s.correctIndex }];
    const rows = [isPoll
      ? ['Question #', 'Question', 'Option', 'Votes', 'Percentage', 'Correct']
      : ['Option', 'Votes', 'Percentage', 'Correct']];
    questions.forEach((q, qIdx) => {
      const votes = isPoll ? ((s.votes && s.votes[qIdx]) || (q.options || []).map(() => 0)) : (s.votes || (q.options || []).map(() => 0));
      const total = votes.reduce((a, v) => a + v, 0);
      const correctIndex = (q.correctIndex === undefined || q.correctIndex === null) ? null : q.correctIndex;
      (q.options || []).forEach((opt, i) => {
        const count = votes[i] || 0;
        const pct = (total > 0 ? Math.round((count / total) * 100) : 0) + '%';
        const isCorrect = correctIndex === i ? 'Yes' : '';
        rows.push(isPoll ? [qIdx + 1, q.prompt, opt, count, pct, isCorrect] : [opt, count, pct, isCorrect]);
      });
    });
    return rows;
  }
  return [];
}

function csvEscape(val) {
  const str = String(val === undefined || val === null ? '' : val);
  return /[",\r\n]/.test(str) ? '"' + str.replace(/"/g, '""') + '"' : str;
}

async function exportBoard(format) {
  if (format === 'csv') {
    const rows = boardToCSVRows(state);
    if (rows.length <= 1) {
      alert("No data to export yet.");
      return;
    }
    downloadCsv(rows, `bowerboard-${state.code}.csv`);
    return;
  }

  const target = document.getElementById('cloud-stage') ||
                 document.getElementById('brainstorm-board-wrap') ||
                 document.getElementById('student-cloud-wrap');
  if (!target) {
    alert("Could not find the board element to export.");
    return;
  }

  const btn = document.getElementById(format === 'pdf' ? 'download-pdf' : 'download-jpeg');
  const originalBtnText = btn ? btn.textContent : '';
  if (!window.html2canvas || !window.jspdf) {
    if (btn) { btn.disabled = true; btn.textContent = 'Loading export tools…'; }
    try {
      await ensureExportLibraries();
    } catch (e) {
      if (btn) { btn.disabled = false; btn.textContent = originalBtnText; }
      alert("Couldn't load the export tools — check your connection and try again.");
      return;
    }
    if (btn) { btn.disabled = false; btn.textContent = originalBtnText; }
  }

  const originalCursor = document.body.style.cursor;
  document.body.style.cursor = 'wait';

  html2canvas(target, {
    backgroundColor: '#B9F6CA',
    scale: 2,
    logging: false,
    useCORS: true
  }).then(canvas => {
    document.body.style.cursor = originalCursor;
    if (format === 'jpeg') {
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `bowerboard-${state.code}.jpg`;
      a.click();
    } else if (format === 'pdf') {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
        unit: 'px',
        format: [canvas.width, canvas.height]
      });
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, canvas.width, canvas.height);
      pdf.save(`bowerboard-${state.code}.pdf`);
    }
  }).catch(err => {
    document.body.style.cursor = originalCursor;
    alert("Export failed: " + err.message);
  });
}

/* Auto-join if the URL contains ?join=CODE (used by the QR code) */
(function init() {
  const params = new URLSearchParams(window.location.search);
  const joinCode = params.get('join');
  const displayCode = params.get('display');
  const remoteCode = params.get('remote');
  const remoteToken = params.get('token');
  const demoTypes = ['wordcloud', 'mc', 'poll', 'brainstorm', 'sticky', 'ranking', 'quiz'];
  const demoType = demoTypes.includes(params.get('demo')) ? params.get('demo') : null;

  // The plain landing page doesn't touch Supabase at all — render it
  // immediately rather than waiting on supabaseReady, so deferring the
  // Supabase script doesn't add latency to the common case.
  if (!joinCode && !displayCode && !remoteCode && !demoType) {
    render();
    return;
  }

  supabaseReady.then(() => {
    if (joinCode) {
      state = { screen: 'studentJoin', codeInput: joinCode.toUpperCase(), error: '' };
      render();
      document.getElementById('btn-join').click();
    } else if (displayCode) {
      startDisplayOnlyView(displayCode.toUpperCase());
    } else if (remoteCode) {
      startRemoteControlView(remoteCode.toUpperCase(), remoteToken);
    } else if (demoType) {
      state = {};
      startDemoSession(demoType);
    }
  });
})();
