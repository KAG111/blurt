<script id="supabase-js-script" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
  :root {
    --stage: #B9F6CA;
    --stage-dark: #1C3326;
    --paper: #FFFFFF;
    --paper-soft: #FBF9FF;
    --ink: #14111F;
    --muted: #6B6480;
    --faint: #9992AD;
    --line: #E4DFF2;
    --panel-line: #E4DFF2;
    --pink: #FF3E7F;
    --yellow: #FFD23F;
    --blue: #3AA0FF;
    --green: #21C48A;
    --shadow: #14111F;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: var(--stage);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
  }
  .sans { font-family: 'Inter', -apple-system, sans-serif; }
  .display { font-family: 'Space Grotesk', 'Inter', sans-serif; }
  .mono { font-family: 'Space Mono', 'Courier New', monospace; }
  button { cursor: pointer; font-family: inherit; }
  input, textarea { font-family: 'Inter', sans-serif; }
  ::selection { background: var(--yellow); color: var(--ink); }

  #app {
    min-height: 100vh; display: flex; flex-direction: column;
    background-color: var(--stage);
    background-image: radial-gradient(rgba(20, 17, 31, 0.05) 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Background trinkets decoration */
  .trinket {
    position: absolute;
    pointer-events: none;
    opacity: 0.12;
    z-index: 1;
  }
  .trinket.circle {
    border-radius: 50%;
    width: 14px;
    height: 14px;
  }
  .trinket.square {
    width: 12px;
    height: 12px;
  }
  .trinket.triangle {
    width: 0;
    height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 12px solid transparent;
  }
  .trinket.coral {
    background-color: var(--pink);
  }
  .trinket.triangle.coral {
    background-color: transparent;
    border-bottom-color: var(--pink);
  }
  .trinket.yellow {
    background-color: var(--yellow);
  }
  .trinket.triangle.yellow {
    background-color: transparent;
    border-bottom-color: var(--yellow);
  }
  .trinket.purple {
    background-color: #8c7ae6;
  }
  .trinket.triangle.purple {
    background-color: transparent;
    border-bottom-color: #8c7ae6;
  }

  /* ---------- brand chrome shared across screens ---------- */
  .brand-bar {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 1.1rem 0 0; flex-shrink: 0;
  }
  .brand-mark {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.3rem;
    color: var(--ink); letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.4rem;
  }
  .brand-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--pink); display: inline-block; }

  .bower-definition-box {
    position: absolute;
    top: 20px;
    right: 20px;
    max-width: 320px;
    background: #fff;
    border: 3.5px solid var(--ink);
    border-radius: 12px;
    box-shadow: 4px 4px 0 var(--shadow);
    padding: 1.1rem;
    text-align: left;
    z-index: 100;
  }
  @media (max-width: 900px) {
    .bower-definition-box {
      position: static;
      margin: 1.5rem auto 0;
      max-width: 100%;
      width: 100%;
      box-sizing: border-box;
    }
  }

  .screen {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 2rem; text-align: center; gap: 1.5rem;
    position: relative;
  }
  .back-btn {
    position: absolute; top: 1.5rem; left: 1.5rem; background: none; border: none;
    color: rgba(20,17,31,0.65); font-size: 0.9rem; font-weight: 600;
  }
  .back-btn:hover { color: var(--ink); }

  /* Hero / landing — soundwave motif flanking the wordmark */
  .hero-stage {
    display: flex; align-items: center; justify-content: center; gap: 1.5rem;
    flex-wrap: wrap;
  }
  .wave-row { display: flex; align-items: center; gap: 5px; }
  .wave-bar {
    width: 7px; border-radius: 4px; background: var(--pink);
    animation: waveBounce 1.4s ease-in-out infinite;
  }
  .wave-bar:nth-child(odd) { background: var(--yellow); }
  @keyframes waveBounce {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .wave-bar { animation: none; transform: scaleY(0.75); }
  }
  .title-xl {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: clamp(3rem, 11vw, 5.5rem); letter-spacing: -0.03em; line-height: 0.95;
    color: var(--ink);
  }
  .subtitle {
    margin-top: 1rem; font-size: 1.15rem; color: rgba(20,17,31,0.75); font-weight: 500;
    position: relative; z-index: 1;
  }
  .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; position: relative; z-index: 1; }

  /* Sticker-style buttons: chunky border + hard offset shadow, no blur */
  .btn-primary, .btn-outline {
    padding: 0.95rem 1.9rem;
    border-radius: 12px;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    transform: translate(0, 0);
    transition: transform 120ms ease-out, box-shadow 120ms ease-out;
  }
  .btn-primary:focus-visible, .btn-outline:focus-visible,
  .btn-nav:focus-visible, .btn-reveal:focus-visible, .btn-hide:focus-visible,
  .btn-submit:focus-visible, .toggle-btn:focus-visible, .activity-card:focus-visible {
    outline: 3px auto var(--yellow);
    outline-offset: 3px;
  }
  .btn-primary {
    background: var(--pink);
    color: #fff;
  }
  .btn-primary:hover, .btn-outline:hover {
    transform: translate(4px, 4px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .btn-primary:active, .btn-outline:active {
    transform: translate(6px, 6px);
    box-shadow: 0px 0px 0 var(--ink);
  }
  .btn-primary:disabled {
    background: #D8D3E8;
    color: #9992AD;
    box-shadow: 6px 6px 0 rgba(27,23,48,0.25);
    cursor: default;
    transform: none;
  }
  .btn-outline {
    background: #fff;
    color: var(--ink);
  }

  .footnote { font-size: 0.85rem; color: rgba(20,17,31,0.6); max-width: 380px; position: relative; z-index: 1; }

  /* Card surfaces (used inside screens that need a light panel over the dark stage) */
  .field-wrap {
    width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 1.3rem; text-align: left;
    background: var(--paper); border: 2.5px solid var(--ink); border-radius: 16px;
    padding: 2rem; box-shadow: 6px 6px 0 rgba(0,0,0,0.35); color: var(--ink);
  }
  .field-label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  textarea, input[type=text] {
    width: 100%; padding: 0.85rem; border-radius: 8px; border: 2px solid var(--line);
    font-size: 1rem; resize: vertical; box-sizing: border-box; background: var(--paper-soft);
    color: var(--ink); transition: border-color 0.15s;
  }
  textarea:focus, input[type=text]:focus { outline: none; border-color: var(--pink); }
  .toggle-row { display: flex; gap: 0.6rem; }
  .toggle-btn {
    flex: 1; padding: 0.7rem 0.8rem; border-radius: 8px; font-size: 0.88rem; font-weight: 700;
    border: 2px solid var(--line); background: var(--paper-soft); color: var(--muted);
  }
  .toggle-btn.active { border-color: var(--ink); background: var(--yellow); color: var(--ink); }

  /* Teacher live view */
  .live-wrap { flex: 1; display: flex; flex-direction: column; padding: 1.5rem 1.5rem 2.5rem; text-align: left; width: 100%; max-width: 980px; margin: 0 auto; }
  .live-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 1.25rem; margin-bottom: 0.5rem;
  }
  .room-badge {
    background: var(--ink); color: #fff; padding: 0.7rem 1.3rem;
    border-radius: 10px; text-align: center; border: 2.5px solid var(--ink);
    box-shadow: 4px 4px 0 var(--pink);
  }
  .room-badge-label { font-family: 'Inter', sans-serif; font-size: 0.68rem; letter-spacing: 0.12em; opacity: 0.75; font-weight: 700; }
  .room-badge-code { font-family: 'Space Mono', monospace; font-size: 1.9rem; font-weight: 700; letter-spacing: 0.15em; color: var(--yellow); }
  .qr-panel {
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    background: #fff; border: 2.5px solid var(--ink); border-radius: 12px;
    padding: 1rem; max-width: 220px; box-shadow: 4px 4px 0 var(--blue);
  }
  .qr-caption { font-size: 0.7rem; color: var(--muted); text-align: center; font-weight: 600; }
  .prompt-label {
    margin-top: 0.75rem; margin-bottom: 1.25rem; font-size: 1.5rem; font-weight: 700; max-width: 700px;
    font-family: 'Space Grotesk', sans-serif; color: var(--ink);
  }
  .controls-row { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .density-slider-wrap {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.45rem 0.8rem;
    background: #fff; border: 2px solid var(--ink); border-radius: 8px;
    box-shadow: 2px 2px 0 var(--yellow);
  }
  .density-slider-icon { font-size: 0.95rem; line-height: 1; }
  .density-slider-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
  .density-slider {
    -webkit-appearance: none; appearance: none;
    width: 110px; height: 6px; margin: 0;
    background: var(--paper-soft);
    border: 2px solid var(--ink); border-radius: 4px;
    cursor: pointer;
  }
  .density-slider:focus-visible { outline: 3px auto var(--yellow); outline-offset: 3px; }
  .density-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--pink); border: 2.5px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink); cursor: pointer;
  }
  .density-slider::-moz-range-track {
    height: 6px; background: var(--paper-soft);
    border: 2px solid var(--ink); border-radius: 4px;
  }
  .density-slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--pink); border: 2.5px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink); cursor: pointer;
  }
  .btn-reveal { background: var(--green); color: #1B1730; border: 2px solid var(--ink); padding: 0.65rem 1.3rem; border-radius: 8px; font-weight: 700; box-shadow: 3px 3px 0 var(--ink); }
  .btn-hide { background: var(--pink); color: #fff; border: 2px solid var(--ink); padding: 0.65rem 1.3rem; border-radius: 8px; font-weight: 700; box-shadow: 3px 3px 0 var(--ink); }
  .btn-clear { background: transparent; color: rgba(20,17,31,0.65); border: 2px solid rgba(20,17,31,0.3); padding: 0.65rem 1.1rem; border-radius: 8px; font-weight: 600; }
  .btn-clear:hover { color: var(--ink); border-color: rgba(20,17,31,0.6); }
  .count-note { font-size: 0.9rem; color: rgba(20,17,31,0.65); font-weight: 600; }
  .cloud-stage {
    flex: 1; display: flex; align-items: center; justify-content: center; min-height: 300px;
    background: var(--paper); border: 2.5px solid var(--ink); border-radius: 16px;
    padding: 2rem; box-shadow: 6px 6px 0 rgba(0,0,0,0.35);
  }
  .hidden-note { text-align: center; color: var(--muted); }
  .hidden-note-main { font-size: 1.15rem; margin-bottom: 0.5rem; font-weight: 700; color: var(--ink); }

  .room-code-input {
    font-family: 'Space Mono', monospace; font-size: 2rem; letter-spacing: 0.25em; text-align: center;
    padding: 0.7rem 1rem; border-radius: 10px; border: 2.5px solid var(--ink);
    width: 280px; text-transform: uppercase; background: #fff; color: var(--ink);
  }
  .error-text { color: var(--pink); font-size: 0.9rem; font-weight: 600; background: #fff; padding: 0.4rem 0.8rem; border-radius: 6px; }

  .student-wrap { flex: 1; display: flex; flex-direction: column; padding: 2rem 1.5rem; align-items: center; gap: 1.5rem; }
  .student-header { text-align: center; max-width: 480px; }
  .student-room-code { font-size: 0.85rem; color: rgba(20,17,31,0.65); font-weight: 700; letter-spacing: 0.03em; }
  .student-prompt { font-size: 1.6rem; font-weight: 700; margin-top: 0.4rem; color: var(--ink); font-family: 'Space Grotesk', sans-serif; }
  .btn-leave-room {
    background: none; border: none; color: rgba(20,17,31,0.55); font-size: 0.78rem; font-weight: 600;
    text-decoration: underline; text-underline-offset: 2px; margin-top: -0.6rem;
  }
  .btn-leave-room:hover { color: var(--ink); }
  .btn-leave-room:focus-visible { outline: 3px auto var(--yellow); outline-offset: 3px; }
  .answer-form { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; max-width: 400px; }
  .answer-input {
    font-size: 1.2rem; padding: 0.85rem 1rem; border-radius: 10px;
    border: 2.5px solid var(--line); text-align: center; transition: border-color 0.2s; background: #fff; color: var(--ink);
  }
  .answer-input.flash { border-color: var(--green); }
  .btn-submit { background: var(--green); color: #1B1730; border: 2.5px solid var(--ink); padding: 0.85rem; border-radius: 10px; font-size: 1.05rem; font-weight: 700; box-shadow: 4px 4px 0 var(--ink); transition: transform 0.12s, box-shadow 0.12s; }
  .btn-submit:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  .btn-submit:disabled, .btn-primary:disabled { background: #D8D3E8; color: #9992AD; box-shadow: 4px 4px 0 rgba(0,0,0,0.15); transform: none; }
  .flash-note { text-align: center; font-size: 0.85rem; color: transparent; transition: color 0.2s; height: 1rem; font-weight: 700; }
  .flash-note.show { color: var(--green); }

  .cloud-word { display: inline-block; margin: 0.25rem 0.65rem; font-weight: 700; line-height: 1.1; font-family: 'Space Grotesk', sans-serif; animation: floatIn 0.4s ease-out; }
  @keyframes floatIn { from { opacity: 0; transform: translateY(10px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .spinner-note { font-size: 0.85rem; color: var(--faint); }

  .activity-grid { display: flex; gap: 1.1rem; flex-wrap: wrap; justify-content: center; max-width: 780px; }
  .activity-card {
    width: 220px; padding: 1.6rem 1.3rem; border-radius: 14px; border: 2.5px solid var(--ink);
    background: #fff; text-align: left; display: flex; flex-direction: column; gap: 0.5rem;
    box-shadow: 5px 5px 0 var(--ink); transition: transform 0.12s, box-shadow 0.12s; color: var(--ink);
  }
  .activity-card:nth-of-type(1) { box-shadow: 5px 5px 0 var(--blue); }
  .activity-card:nth-of-type(2) { box-shadow: 5px 5px 0 var(--pink); }
  .activity-card:nth-of-type(3) { box-shadow: 5px 5px 0 var(--yellow); }
  .activity-card:nth-of-type(4) { box-shadow: 5px 5px 0 var(--green); }
  .activity-card:nth-of-type(5) { box-shadow: 5px 5px 0 var(--blue); }
  .activity-card:nth-of-type(6) { box-shadow: 5px 5px 0 var(--yellow); }
  .activity-card:hover { transform: translate(-3px, -3px); }
  .activity-card:nth-of-type(1):hover { box-shadow: 8px 8px 0 var(--blue); }
  .activity-card:nth-of-type(2):hover { box-shadow: 8px 8px 0 var(--pink); }
  .activity-card:nth-of-type(3):hover { box-shadow: 8px 8px 0 var(--yellow); }
  .activity-card:nth-of-type(4):hover { box-shadow: 8px 8px 0 var(--green); }
  .activity-card:nth-of-type(5):hover { box-shadow: 8px 8px 0 var(--blue); }
  .activity-card:nth-of-type(6):hover { box-shadow: 8px 8px 0 var(--yellow); }
  .activity-card-title { font-size: 1.25rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .activity-card-desc { font-size: 0.87rem; color: var(--muted); line-height: 1.45; }

  .option-row { display: flex; gap: 0.5rem; align-items: center; }
  .option-row input[type=text] { flex: 1; }
  .option-remove { background: none; border: none; color: var(--faint); font-size: 1.2rem; padding: 0 0.3rem; }
  .option-remove:hover { color: var(--pink); }
  .btn-add-option { background: var(--paper-soft); border: 2px dashed var(--line); color: var(--muted); padding: 0.6rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; }
  .btn-add-option:hover { border-color: var(--pink); color: var(--pink); }
  .checkbox-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--muted); font-weight: 500; }
  .correct-marker-row { display: flex; flex-direction: column; gap: 0.4rem; }
  .correct-option-choice {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0.75rem; border-radius: 8px;
    border: 2px solid var(--line); font-size: 0.9rem; cursor: pointer; font-weight: 500;
  }
  .correct-option-choice.marked { border-color: var(--green); background: #E7FBF3; font-weight: 700; }
  .correct-tick-box {
    width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--line); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff;
  }
  .correct-option-choice.marked .correct-tick-box { border-color: var(--green); background: var(--green); }

  .mc-vote-btn {
    width: 100%; text-align: left; padding: 0.95rem 1.2rem; border-radius: 10px;
    border: 2.5px solid var(--line); background: #fff; font-size: 1.05rem; font-weight: 600;
    display: flex; align-items: center; gap: 0.7rem; box-shadow: 3px 3px 0 rgba(27,23,48,0.12);
    transition: transform 0.1s, box-shadow 0.1s; color: var(--ink);
  }
  .mc-vote-btn:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 rgba(27,23,48,0.2); }
  .mc-vote-btn.selected { border-color: var(--green); background: #E7FBF3; box-shadow: 3px 3px 0 var(--green); }
  .mc-vote-btn:disabled { opacity: 0.75; cursor: default; }
  .mc-vote-marker {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700;
  }
  .mc-vote-btn.selected .mc-vote-marker { border-color: var(--green); background: var(--green); color: #fff; }
  .mc-vote-btn.multi .mc-vote-marker { border-radius: 6px; }

  .mc-bar-row { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; text-align: left; }
  .mc-bar-label { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 700; color: var(--ink); }
  .mc-bar-track { background: var(--paper-soft); border: 2px solid var(--line); border-radius: 8px; height: 30px; overflow: hidden; }
  .mc-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; display: flex; align-items: center; }
  @media (prefers-reduced-motion: reduce) {
    .mc-bar-fill { transition: none; }
  }
  .mc-bar-count { font-size: 0.8rem; color: var(--faint); font-weight: 600; }
  .correct-badge { color: var(--green); font-size: 0.8rem; font-weight: 700; }
  .answer-banner {

    for (let r = -1; r <= 7; r++) {
      if (row+r <= -1 || this.moduleCount <= row+r) continue;

  }
  static createData(typeNumber, errorCorrectLevel, dataList) {
    const rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectLevel);
    const buffer = new QRBitBuffer();
    for (let i = 0; i < dataList.length; i++) {
      const data = dataList[i];
      buffer.put(data.mode, 4);
      buffer.put(data.getLength(), QRUtil.getLengthInBits(data.mode, typeNumber));
      data.write(buffer);
    }
    let totalDataCount = 0;
    for (let i = 0; i < rsBlocks.length; i++) totalDataCount += rsBlocks[i].dataCount;
    if (buffer.getLengthInBits() > totalDataCount * 8) throw new Error('code length overflow');
    if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) buffer.put(0, 4);

      if (buffer.getLengthInBits() >= totalDataCount * 8) break;

    for (let r = 0; r < rsBlocks.length; r++) {
      const dcCount = rsBlocks[r].dataCount, ecCount = rsBlocks[r].totalCount - dcCount;
      maxDcCount = Math.max(maxDcCount, dcCount); maxEcCount = Math.max(maxEcCount, ecCount);
      dcdata[r] = new Array(dcCount);
      for (let i = 0; i < dcdata[r].length; i++) dcdata[r][i] = 0xff & buffer.buffer[i + offset];
      offset += dcCount;
      const rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
      const rawPoly = new QRPolynomial(dcdata[r], rsPoly.getLength() - 1);
      const modPoly = rawPoly.mod(rsPoly);
      ecdata[r] = new Array(rsPoly.getLength() - 1);

    for (let i = 0; i < rsBlocks.length; i++) totalCodeCount += rsBlocks[i].totalCount;
    const data = new Array(totalCodeCount);
    let index = 0;
    for (let i = 0; i < maxDcCount; i++) for (let r = 0; r < rsBlocks.length; r++) if (i < dcdata[r].length) data[index++] = dcdata[r][i];
    for (let i = 0; i < maxEcCount; i++) for (let r = 0; r < rsBlocks.length; r++) if (i < ecdata[r].length) data[index++] = ecdata[r][i];
    return data;
  }
}

function getMinimumQRTypeNumber(data, errorCorrectLevel) {
  for (let typeNumber = 1; typeNumber <= 40; typeNumber++) {
    try {
      const testModel = new QRCodeModel(typeNumber, errorCorrectLevel);
      testModel.addData(data);
      testModel.make();
      return typeNumber;
    } catch (e) { continue; }
  }
  throw new Error('data too long for QR code');
}

function generateQR(text, errorCorrectLevel) {
  const ecLevel = errorCorrectLevel !== undefined ? errorCorrectLevel : QRErrorCorrectLevel.M;
  const typeNumber = getMinimumQRTypeNumber(text, ecLevel);
  const qr = new QRCodeModel(typeNumber, ecLevel);
  qr.addData(text);
  qr.make();
  return qr;
}

function qrToSVGString(text, sizePx) {
  if (!text) return '<div style="width:' + sizePx + 'px;height:' + sizePx + 'px;background:#F0EEE6;border-radius:3px;"></div>';
  let qr;
  try { qr = generateQR(text, QRErrorCorrectLevel.M); }
  catch (e) { return '<div style="width:' + sizePx + 'px;height:' + sizePx + 'px;background:#F0EEE6;border-radius:3px;"></div>'; }
  const count = qr.getModuleCount();
  const quiet = 2;
  const total = count + quiet * 2;
  let rects = '';
  for (let r = 0; r < count; r++) {
    for (let c = 0; c < count; c++) {
      if (qr.isDark(r, c)) rects += '<rect x="' + (c+quiet) + '" y="' + (r+quiet) + '" width="1" height="1" fill="#14111F"/>';
    }
  }
  return '<svg viewBox="0 0 ' + total + ' ' + total + '" width="' + sizePx + '" height="' + sizePx +
    '" style="border-radius:3px;background:#fff;" shape-rendering="crispEdges">' +
    '<rect x="0" y="0" width="' + total + '" height="' + total + '" fill="#fff"/>' + rects + '</svg>';
}

function baseRoomCode(code) {
  return code.startsWith('MOD-') ? code.slice(4) : code;
}

function getHostSecret(code) {
  try { return localStorage.getItem('bowerboard_host_' + baseRoomCode(code)) || null; } catch (e) { return null; }
}

function setHostSecret(code, secret) {
  try { localStorage.setItem('bowerboard_host_' + baseRoomCode(code), secret); } catch (e) {}
}

function clearHostSecret(code) {
  try { localStorage.removeItem('bowerboard_host_' + baseRoomCode(code)); } catch (e) {}
}

function generateHostSecret() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'hs-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

// Requests must be scoped per-room (and per-host-secret, when known) so RLS can
// enforce room isolation and hide moderation-pending rows from anyone but the
// room's creator. A fresh lightweight client is cheap (no network call) and
// keeps this scoping explicit at every call site, unlike mutating shared state.
function clientFor(code) {
  if (!window.supabase) return null;
  const headers = { 'x-room-code': code };
  const secret = getHostSecret(code);
  if (secret) headers['x-host-secret'] = secret;
  return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    global: { headers },
    // This app has no login/auth; each ephemeral client only needs to send
    // headers for one request, so skip session storage entirely — avoids
    // "Multiple GoTrueClient instances" warnings from creating many clients.
    auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
  });
}

async function kvGet(key) {
  if (!supabaseClient) return null;
  try {
    const parts = key.split(':');
    const code = parts[1];
    const property = parts[2];
    const client = clientFor(code);
    if (!client) return null;

    const { data, error } = await client
      .from('rooms')
      .select(property)
      .eq('code', code)
      .maybeSingle();

    if (error) {
      console.error("Supabase kvGet error:", error);
      return null;
    }
    if (!data) return null;

    const val = data[property];
    if (val === undefined || val === null) return null;
    return typeof val === 'string' ? val : JSON.stringify(val);
  } catch (e) {
    console.error("kvGet Exception:", e);
    return null;
  }
}

async function kvSet(key, value) {
  if (!supabaseClient) return false;
  try {
    const parts = key.split(':');
    const code = parts[1];
    const property = parts[2];
    const parsedValue = JSON.parse(value);

    // Save to local history if it's a room config being created/written!
    if (property === 'config' && parsedValue && parsedValue.type) {
      saveRoomToHistory(code, parsedValue.type, parsedValue.prompt || '');
    }

    const upsertData = { code };
    upsertData[property] = parsedValue;
    upsertData['updated_at'] = new Date().toISOString();
    // Only include host_secret when this browser actually knows it (room
    // creator / phone remote) — omitting the key on conflict leaves the
    // existing DB value untouched, so a plain student write can't clobber it.
    const secret = getHostSecret(code);
    if (secret) upsertData['host_secret'] = secret;

    const client = clientFor(code);
    if (!client) return false;
    const { error } = await client
      .from('rooms')
      .upsert(upsertData, { onConflict: 'code' });

    if (error) {
      console.error("Supabase kvSet error:", error);
      return false;
    }
    return true;
  } catch (e) {
    console.error("kvSet Exception:", e);
    return false;
  }
}

// Appends a single item to a MOD-<code> shadow row's array column via a

// (and therefore never sees) other students' pending, unapproved submissions.

// This and every RPC wrapper below returns a status string rather than a
// boolean: 'ok' on success, 'blocked_word' / 'rate_limited' / 'room_full'

// submission wasn't accepted), or 'error' for anything else (room not
// found, network failure, etc). Callers must compare against 'ok'
// explicitly — every one of these strings, including the failure ones, is

    console.error("submitPendingItem Exception:", e);
    return 'error';
  }
}

// A write RPC status is "soft-fail" if the room itself is fine and this
// one submission just wasn't accepted — as opposed to 'error', which means
// something went wrong worth retrying (network blip, room briefly
// unreachable). Submit paths should stop retrying and show a message on
// soft-fail, but keep retrying on 'error'.
function isSoftFailStatus(status) {
  return status === 'blocked_word' || status === 'rate_limited' || status === 'room_full' || status === 'taken' || status === 'room_not_found'
    || status === 'not_answering_phase' || status === 'time_expired' || status === 'already_answered';
}
function submitStatusMessage(status) {
  if (status === 'blocked_word') return "That can't be posted here. Try another.";
  if (status === 'rate_limited') return "Slow down — try again in a moment.";
  if (status === 'room_full') return "This board is full — ask your teacher to clear some space.";
  if (status === 'taken') return "That nickname is already taken in this room — try another.";
  if (status === 'room_not_found') return "Couldn't find that room. Check the code with your teacher.";
  if (status === 'not_answering_phase') return "Time's up for this question — wait for the next one.";
  if (status === 'time_expired') return "Just missed it — the timer ran out.";
  if (status === 'already_answered') return "You've already answered this one.";
  return "Couldn't post that — check your connection and try again.";
}

// Rotates a room's host_secret (used for both teacher access to pending
// content and the phone-moderation-remote link). Authorizes the rotation
// with the OLD secret, so only a device that already holds it can invalidate
// existing phone-remote links.
async function rotatePhoneRemote(code) {
  const oldSecret = getHostSecret(code);
  const newSecret = generateHostSecret();
  const headers = { 'x-room-code': code };
  if (oldSecret) headers['x-host-secret'] = oldSecret;
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    global: { headers },
    auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
  });
  const { error } = await client
    .from('rooms')
    .update({ host_secret: newSecret, updated_at: new Date().toISOString() })
    .eq('code', 'MOD-' + code);
  if (error) {
    console.error("rotatePhoneRemote error:", error);
    return false;
  }
  setHostSecret(code, newSecret);
  return true;
}

function setupRealtimeListener(roomCode, tickFunction) {
  if (!supabaseClient) {
    tickFunction();
    return { close: () => {} };
  }
  tickFunction(); // Execute the layout logic once immediately on load

  const channel = supabaseClient
    .channel(`room:${roomCode}`)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'rooms',
      filter: `code=eq.${roomCode}`
    }, () => {
      tickFunction(); // Instantly re-render charts when data changes
    })
    .subscribe();

  // Realtime's postgres_changes evaluates the same RLS policies as ordinary
  // reads, but over the replication connection rather than a per-request
  // HTTP call, so it doesn't carry the x-room-code/x-host-secret headers
  // those policies check — meaning a push notification may never arrive.
  // This interval is a guaranteed fallback so screens stay live regardless.
  const pollFallback = setInterval(tickFunction, 4000);

  return {
    close: () => {
      supabaseClient.removeChannel(channel);
      clearInterval(pollFallback);
    }
  };
}

/* =========================================================================
   App logic
   ========================================================================= */
// There used to be a client-side profanity pre-check here (a BAD_WORDS
// list + isClean()). It's gone: shipping the list meant anyone could read
// it in view-source, and it did nothing against a direct RPC call that
// skips the browser entirely. Filtering now happens once, server-side, in
// contains_blocked_word() (see supabase/migrations) — every submit path
// below checks the RPC's 'blocked_word' status instead of pre-checking
// locally. The cost is one fewer round trip saved for the common case;
// a client-side "mild subset" list was considered and rejected, since it
// would only catch words that were never the problem in the first place,
// while giving no earlier feedback for anything that actually matters.
function normalize(text) { return text.trim().replace(/\s+/g, ' ').slice(0, 40); }
const PALETTE = ['#2B6B5E', '#3D8B7A', '#D4A017', '#C05B3F', '#4A6FA5', '#7A5C8E', '#1F4E45'];
function colorFor(i) { return PALETTE[i % PALETTE.length]; }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// posts/words/votes are shared JSON columns writable directly via the
// Supabase REST API by anyone with a room code — not just through this
// app's own UI. A crafted post.image value could otherwise break out of
// the src="..." (or data-img="...") attribute it's interpolated into.
// Only ever render it if it's actually a data: image URI.
function sanitizeImageSrc(src) {
  if (typeof src !== 'string') return null;
  return /^data:image\/(png|jpe?g|gif|webp);base64,[A-Za-z0-9+/=]+$/.test(src) ? src : null;
}
// Same threat model as above: post.color is rendered straight into a
// style="background-color:...` attribute. Only accept a plausible hex
// color; anything else falls back to the app's default note color.
function sanitizeColor(color) {
  return (typeof color === 'string' && /^#[0-9a-fA-F]{3,8}$/.test(color)) ? color : '#FFE57F';
}
function generateCode() {
  const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let c = '';
  for (let i = 0; i < 4; i++) c += letters[Math.floor(Math.random() * letters.length)];
  return c;
}

function saveRoomToHistory(code, type, prompt) {
  try {
    const history = JSON.parse(localStorage.getItem('bowerboard_history') || '[]');
    const filtered = history.filter(item => item.code !== code);
    filtered.unshift({ code, type, prompt, date: Date.now() });
    localStorage.setItem('bowerboard_history', JSON.stringify(filtered.slice(0, 5)));
  } catch (e) {
    console.error("Error saving room history:", e);
  }
}

async function reopenBower(code, type) {
  state.loading = true;
  render();
  const configRaw = await kvGet('room:' + code + ':config');
  if (!configRaw) {
    alert("Could not load this room. It may have expired or been deleted.");
    state.loading = false;
    render();
    return;
  }
  const config = JSON.parse(configRaw);
  
  let words = [];
  let posts = [];
  let votes = [];
  let responses = [];
  let roster = [];
  
  if (type === 'wordcloud') {
    const raw = await kvGet('room:' + code + ':words');
    words = raw ? JSON.parse(raw) : [];
  } else if (type === 'brainstorm' || type === 'sticky') {
    const raw = await kvGet('room:' + code + ':posts');
    posts = raw ? JSON.parse(raw) : [];
  } else if (type === 'mc' || type === 'poll' || type === 'ranking') {
    const raw = await kvGet('room:' + code + ':votes');
    votes = raw ? JSON.parse(raw) : [];
    if (type === 'poll') {
      const respRaw = await kvGet('room:' + code + ':responses');
      responses = respRaw ? JSON.parse(respRaw) : [];
      const rostRaw = await kvGet('room:' + code + ':roster');
      roster = rostRaw ? JSON.parse(rostRaw) : [];
    }
  }
  
  state = {
    screen: 'teacherLive',
    type,
    code,
    revealed: config.revealed,
    revealMode: config.revealMode,
    prompt: config.prompt,
    options: config.options || [],
    questions: config.questions || [],
    words,
    posts,
    votes,
    responses,
    roster,
    likesEnabled: config.likesEnabled || false,
    requireNames: config.requireNames || false
  };
  render();
}

      { prompt: "What's a 'bower' in the wild?", options: ["A structure a bowerbird builds to attract a mate", "A type of tree", "A nickname for a desk", "A card game"], correctIndex: 0 }
    ];
    const answerKey = demoQuestions.map(q => q.correctIndex);
    const cleanQuestions = demoQuestions.map(q => ({ prompt: q.prompt, options: q.options }));

    const quizResponses = rosterNames.map(name => {
      const perQuestion = demoQuestions.map(q => {
        const isCorrect = Math.random() < 0.7;
        const wrongOptions = q.options.map((o, i) => i).filter(i => i !== q.correctIndex);
        const selected = isCorrect ? q.correctIndex : wrongOptions[Math.floor(Math.random() * wrongOptions.length)];
        const pointsEarned = isCorrect ? 60 + Math.floor(Math.random() * 40) : 0;
        return { selected, correct: isCorrect, pointsEarned };
      });
      let streak = 0;
      for (let i = perQuestion.length - 1; i >= 0 && perQuestion[i].correct; i--) streak++;
      const totalScore = perQuestion.reduce((sum, pq) => sum + pq.pointsEarned, 0);
      return { name, totalScore, streak, perQuestion };
    });

    const answeredNames = rosterNames.slice(0, rosterNames.length - 1);
    const phaseStartedAt = Date.now();
    const quizConfig = {
      type: 'quiz', questions: cleanQuestions, currentIndex: 0,
      phase: 'answering', phaseStartedAt,

    await kvSet('room:' + code + ':roster', JSON.stringify(rosterNames));

      screen: 'teacherLive', type: 'quiz', code, questions: cleanQuestions,
      currentIndex: 0, phase: 'answering', phaseStartedAt,
      timerSeconds: 20, scoringEnabled: true, shuffleAnswers: true,
      answeredNames, roster: rosterNames, remoteConnected: false, autoRevealTriggered: false
    };
  }

  render();
}

/* Unified accessors so 'mc' (a single question) and 'poll' (many questions,
   navigated by the teacher) can share the same voting/rendering logic. */
function currentQuestion(s) {
  if (s.type === 'poll') return s.questions[s.currentIndex || 0];
  return { prompt: s.prompt, options: s.options, allowMultiple: s.allowMultiple, correctIndex: s.correctIndex };
}
function currentOptions(s) { return currentQuestion(s).options || []; }
function currentPromptText(s) { return currentQuestion(s).prompt || ''; }
function currentAllowMultiple(s) { return !!currentQuestion(s).allowMultiple; }
function currentCorrectIndex(s) { const c = currentQuestion(s).correctIndex; return (c === undefined) ? null : c; }
function currentIndexOf(s) { return s.type === 'poll' ? (s.currentIndex || 0) : 0; }
function numQuestionsOf(s) { return s.type === 'poll' ? s.questions.length : 1; }
function getCurrentVotes(s) {
  if (s.type === 'poll') return (s.votes && s.votes[s.currentIndex]) || currentOptions(s).map(() => 0);
  return s.votes || currentOptions(s).map(() => 0);
}
function emptyVotesStructure(s) {
  if (s.type === 'poll') return s.questions.map(q => q.options.map(() => 0));
  return (s.options || []).map(() => 0);
}

function stopPolling() {
  if (pollTimer) {
    if (pollTimer.close) {
      pollTimer.close();
    } else {
      clearInterval(pollTimer);
    }
    pollTimer = null;
  }
  if (shadowTimer) {
    if (shadowTimer.close) {
      shadowTimer.close();
    } else {
      clearInterval(shadowTimer);
    }
    shadowTimer = null;
  }
  if (quizCountdownHandle) {
    clearInterval(quizCountdownHandle);

function renderTeacherSetup() {
  if (state.pasteMode) return renderPasteStage();
  if (state.activityType === 'quiz') return renderQuizSetup();
  if (state.activityType === 'mc') return renderMCSetup();
  if (state.activityType === 'poll') return renderPollSetup();
  if (state.activityType === 'brainstorm') return renderBrainstormSetup();
  if (state.activityType === 'sticky') return renderStickySetup();
  if (state.activityType === 'ranking') return renderRankingSetup();
  return renderWordCloudSetup();
}

function parsePastedQuestions(raw) {
  const lines = raw.split('\n').map(l => l.trim());
  const OPTION_RE = /^[\(\[]?([A-Fa-f])[\.\)\:\]]\s*(.+)$/;
  const QNUM_RE = /^(?:q(?:uestion)?\s*)?\d{1,2}[\.\)\:]\s*(.*)$/i;
  const ANSWER_LINE_RE = /^(answer|correct)[:\s]+([A-Fa-f])\s*$/i;
  const CORRECT_MARK_RE = /\s*[\*✓]\s*$|\s*\((?:correct|right)\)\s*$|\s*\[(?:correct|right)\]\s*$/i;

  const questions = [];
  let current = null;
  let skippedCount = 0;

  function pushCurrent() {
    if (!current) return;
    const filledOptions = current.options.filter(o => o.text.trim().length > 0);
    if (current.prompt.trim() && filledOptions.length >= 2) {
      questions.push({
        prompt: current.prompt.trim(),
        options: filledOptions.map(o => o.text.trim()).slice(0, 6),
        allowMultiple: false,
        correctIndex: current.correctIndex
      });
    } else if (current.prompt.trim() || filledOptions.length > 0) {
      skippedCount++;
    }
    current = null;
  }

  for (const line of lines) {
    if (!line) continue;

    const answerLineMatch = line.match(ANSWER_LINE_RE);
    if (answerLineMatch && current) {
      const letter = answerLineMatch[2].toUpperCase();
      const idx = letter.charCodeAt(0) - 65;
      if (idx >= 0 && idx < current.options.length) current.correctIndex = idx;
      continue;
    }

    const optMatch = line.match(OPTION_RE);
    if (optMatch && current) {
      let text = optMatch[2];
      let isCorrect = false;
      if (CORRECT_MARK_RE.test(text)) {
        isCorrect = true;
        text = text.replace(CORRECT_MARK_RE, '');
      }
      current.options.push({ text });
      if (isCorrect && current.correctIndex === null) current.correctIndex = current.options.length - 1;
      continue;
    }

    let promptText = line;
    const qnumMatch = line.match(QNUM_RE);
    if (qnumMatch) promptText = qnumMatch[1];

    if (current && current.options.length === 0) {
      current.prompt = (current.prompt + ' ' + promptText).trim();
    } else {
      pushCurrent();
      current = { prompt: promptText, options: [], correctIndex: null };
    }
  }
  pushCurrent();

  return { questions, skippedCount };
}

  const filled = (q.options || []).map(o => o.trim()).filter(o => o.length > 0);

            ${s.loading ? 'Creating room…' : (isLast ? 'Create room code' : 'Next question →')}
          </button>
        </div>
      </div>
    </div>`;

  document.getElementById('btn-back').onclick = () => { state = { screen: 'activityPicker' }; render(); };
  document.getElementById('prompt-input').oninput = (e) => { q.prompt = e.target.value; refreshPollNextBtn(q); };
  document.querySelectorAll('.poll-option-input').forEach(inp => {
    inp.oninput = (e) => {
      const i = parseInt(e.target.dataset.idx, 10);
      q.options[i] = e.target.value;
      refreshPollNextBtn(q);
      const label = document.querySelector('#poll-correct-opt-' + i + ' .correct-opt-text');
      if (label) label.textContent = e.target.value.trim() ? e.target.value : ('Option ' + (i + 1));
    };
  });
  document.querySelectorAll('#poll-options-list .option-remove').forEach(btn => {
    btn.onclick = (e) => {
      const i = parseInt(e.target.dataset.idx, 10);
      q.options.splice(i, 1);
      if (q.correctIndex === i) q.correctIndex = null;
      else if (q.correctIndex > i) q.correctIndex -= 1;
      render();
    };
  });
  const addBtn = document.getElementById('btn-add-option');
  if (addBtn) addBtn.onclick = () => { q.options.push(''); render(); };
  document.getElementById('allow-multiple').onchange = (e) => { q.allowMultiple = e.target.checked; };
  document.querySelectorAll('.correct-option-choice').forEach(el => {
    el.onclick = () => {
      const i = parseInt(el.dataset.idx, 10);
      q.correctIndex = (q.correctIndex === i) ? null : i;
      render();
    };
  });
  const clearCorrectBtn = document.getElementById('btn-clear-correct');
  if (clearCorrectBtn) clearCorrectBtn.onclick = () => { q.correctIndex = null; render(); };

  document.getElementById('btn-poll-back').onclick = () => {
    if (idx === 0) { s.pollStage = 'count'; render(); }
    else { s.buildIndex -= 1; render(); }
  };
  document.getElementById('btn-poll-next').onclick = async () => {
    if (!canCreatePollQuestion(q)) return;
    if (!isLast) { s.buildIndex += 1; render(); return; }
    // last question — validate all, then create the room
    for (let i = 0; i < s.questions.length; i++) {
      if (!canCreatePollQuestion(s.questions[i])) {
        s.buildIndex = i; s.pollStage = 'build'; render();
        alert('Question ' + (i + 1) + ' needs a prompt and at least 2 options.');
        return;
      }
    }
    s.loading = true; render();
    await supabaseReady;
    const code = generateCode();
    setHostSecret(code, generateHostSecret());
    const cleanQuestions = s.questions.map(qq => ({
      prompt: qq.prompt.trim(),
      options: qq.options.map(o => o.trim()).filter(o => o.length > 0),
      allowMultiple: !!qq.allowMultiple,
      correctIndex: (qq.correctIndex === null || qq.correctIndex === undefined) ? null : qq.correctIndex
    }));
    const revealMode = s.revealMode || 'live';
    const requireNames = (s.requireNames === undefined) ? true : !!s.requireNames;
    const config = {
      type: 'poll', questions: cleanQuestions, currentIndex: 0,
      revealMode, revealed: revealMode === 'live', requireNames, started: !requireNames, createdAt: Date.now()
    };
    const ok = await kvSet('room:' + code + ':config', JSON.stringify(config));
    if (ok) {
      const votes = cleanQuestions.map(qq => qq.options.map(() => 0));
      await kvSet('room:' + code + ':votes', JSON.stringify(votes));
      await kvSet('room:' + code + ':responses', JSON.stringify([]));
      await kvSet('room:' + code + ':roster', JSON.stringify([]));
      if (requireNames) {
        // Pre-create the MOD- shadow row so a phone remote can authorize
        // itself (by successfully reading it) from the waiting room, before
        // the teacher ever switches presentationMode away from classic.
        await kvSet('room:MOD-' + code + ':config', '{}');
        state = {
          screen: 'teacherLobby', code, questions: cleanQuestions,
          currentIndex: 0, revealMode, requireNames, roster: [], remoteConnected: false
        };
      } else {
        state = {
          screen: 'teacherLive', type: 'poll', code, questions: cleanQuestions,
          currentIndex: 0, revealMode, revealed: config.revealed, requireNames, votes
        };
      }
      render();
    } else {
      s.loading = false;
      alert("Couldn't create the room — check your internet connection and try again.");
      render();
    }
  };
}

function refreshPollNextBtn(q) {
  const btn = document.getElementById('btn-poll-next');
  if (btn) btn.disabled = !canCreatePollQuestion(q);
}

function canCreateQuizQuestion(q) {
  if (!q || !q.prompt || !q.prompt.trim()) return false;
  const filled = (q.options || []).map(o => o.trim()).filter(o => o.length > 0);
  if (filled.length < 2) return false;
  return q.correctIndex !== null && q.correctIndex !== undefined && q.correctIndex < filled.length;
}

  const showRemoteQrBtn = document.getElementById('btn-show-remote-qr');
  if (showRemoteQrBtn) {
    showRemoteQrBtn.onclick = () => {
      s.showRemoteQrModal = true;

  const closeRemoteQrBtn = document.getElementById('btn-close-remote-qr');
  if (closeRemoteQrBtn) {
    closeRemoteQrBtn.onclick = () => {
      s.showRemoteQrModal = false;
      render();
    };
  }
  const copyRemoteLinkBtn = document.getElementById('btn-copy-remote-link');
  if (copyRemoteLinkBtn) {
    copyRemoteLinkBtn.onclick = () => {
      const link = window.location.href.split('#')[0].split('?')[0] + '?remote=' + s.code + '&token=' + getHostSecret(s.code);
      navigator.clipboard.writeText(link).then(() => {
        copyRemoteLinkBtn.textContent = '✓ Copied!';
        setTimeout(() => { copyRemoteLinkBtn.textContent = '📋 Copy Remote Link'; }, 2000);
      });
    };
  }

  const tick = async () => {
    const raw = await kvGet('room:' + s.code + ':roster');
    if (raw) { try { s.roster = JSON.parse(raw); renderRoster(); } catch (e) {} }
    const cfgRaw = await kvGet('room:' + s.code + ':config');
    if (cfgRaw) {
      try {
        const cfg = JSON.parse(cfgRaw);
        if (!!cfg.remoteConnected !== !!s.remoteConnected) {
          s.remoteConnected = !!cfg.remoteConnected;
          render();
          return;
        }
      } catch (e) {}
    }
  };
  pollTimer = setupRealtimeListener(s.code, tick);
}

async function mergeShadowIntoMain(code) {
  const s = state;
  // 1. Posts (Brainstorm / Sticky)
  const pendingPostsRaw = await kvGet('room:MOD-' + code + ':posts');
  if (pendingPostsRaw) {
    try {
      const pending = JSON.parse(pendingPostsRaw);
      if (pending && pending.length > 0) {
        const mainRaw = await kvGet('room:' + code + ':posts');
        let main = [];
        if (mainRaw) main = JSON.parse(mainRaw);
        main = [...main, ...pending];
        await kvSet('room:' + code + ':posts', JSON.stringify(main));
        await kvSet('room:MOD-' + code + ':posts', JSON.stringify([]));
        s.posts = main;
      }
    } catch (e) {}
  }
  // 2. Words (Word Cloud)
  const pendingWordsRaw = await kvGet('room:MOD-' + code + ':words');
  if (pendingWordsRaw) {
    try {
      const pending = JSON.parse(pendingWordsRaw);
      if (pending && pending.length > 0) {
        const mainRaw = await kvGet('room:' + code + ':words');
        let main = [];
        if (mainRaw) main = JSON.parse(mainRaw);
        pending.forEach(pw => {
          const match = main.find(mw => mw.text.toLowerCase() === pw.text.toLowerCase());
          if (match) match.count += pw.count; else main.push(pw);
        });
        await kvSet('room:' + code + ':words', JSON.stringify(main));
        await kvSet('room:MOD-' + code + ':words', JSON.stringify([]));
        s.words = main;
      }
    } catch (e) {}
  }
  // 3. Votes (MC / Poll / Ranking)
  const pendingVotesRaw = await kvGet('room:MOD-' + code + ':votes');
  if (pendingVotesRaw) {
    try {
      const pending = JSON.parse(pendingVotesRaw);
      const mainRaw = await kvGet('room:' + code + ':votes');
      if (s.type === 'ranking') {
        let main = [];
        if (mainRaw) main = JSON.parse(mainRaw);
        if (pending && pending.length > 0) {
          main = [...main, ...pending];
          await kvSet('room:' + code + ':votes', JSON.stringify(main));
          s.votes = main;
        }
      } else if (s.type === 'poll') {
        let main = [];
        if (mainRaw) main = JSON.parse(mainRaw);
        if (pending && pending.length > 0) {
          pending.forEach((qVotes, qIdx) => {
            if (!main[qIdx]) main[qIdx] = qVotes.map(() => 0);
            qVotes.forEach((val, optIdx) => {
              main[qIdx][optIdx] = (main[qIdx][optIdx] || 0) + val;
            });
          });
          await kvSet('room:' + code + ':votes', JSON.stringify(main));
          s.votes = main;
        }
      } else { // MC
        let main = [];
        if (mainRaw) main = JSON.parse(mainRaw);
        if (pending && pending.length > 0) {
          if (main.length === 0) main = pending.map(() => 0);
          pending.forEach((val, idx) => {
            main[idx] = (main[idx] || 0) + val;
          });
          await kvSet('room:' + code + ':votes', JSON.stringify(main));
          s.votes = main;
        }
      }
      await kvSet('room:MOD-' + code + ':votes', JSON.stringify([]));
    } catch (e) {}
  }
  // 4. Responses (Poll individual name responses)
  const pendingRespRaw = await kvGet('room:MOD-' + code + ':responses');
  if (pendingRespRaw) {
    try {
      const pending = JSON.parse(pendingRespRaw);
      if (pending && pending.length > 0) {
        const mainRaw = await kvGet('room:' + code + ':responses');
        let main = [];
        if (mainRaw) main = JSON.parse(mainRaw);
        pending.forEach(pr => {
          const match = main.find(mr => mr.name.toLowerCase() === pr.name.toLowerCase());
          if (match) {
            pr.answers.forEach((ans, idx) => {
              if (ans !== null) match.answers[idx] = ans;
            });
          } else {
            main.push(pr);
          }
        });
        await kvSet('room:' + code + ':responses', JSON.stringify(main));
        await kvSet('room:MOD-' + code + ':responses', JSON.stringify([]));
        s.responses = main;
      }
    } catch (e) {}
  }
}

async function approveSubmission(item) {
  const s = state;
  const code = s.code;
  
  if (s.type === 'brainstorm' || s.type === 'sticky') {
    s.pendingPosts = (s.pendingPosts || []).filter(p => p.id !== item.id);
    await kvSet('room:MOD-' + code + ':posts', JSON.stringify(s.pendingPosts));
    
    for (let attempt = 0; attempt < 3; attempt++) {
      const raw = await kvGet('room:' + code + ':posts');
      let mainList = [];
      if (raw) { try { mainList = JSON.parse(raw); } catch (e) {} }
      
      // Sticky notes merge on identical text too, like brainstorm — except
      // when the text is empty (a sticky note can be a photo with no text
      // at all), since two different photo-only notes would otherwise both
      // "match" on empty text and get merged, silently losing one photo.
      const existing = item.text ? mainList.find(p => p.text && p.text.toLowerCase() === item.text.toLowerCase()) : null;
      if (existing) {
        existing.count = (existing.count || 1) + (item.count || 1);
        existing.ownerSessionIds = existing.ownerSessionIds || [];
        (item.ownerSessionIds || []).forEach(id => {
          if (existing.ownerSessionIds.indexOf(id) === -1) existing.ownerSessionIds.push(id);
        });
      } else {
        mainList.push(item);
      }
      
      const ok = await kvSet('room:' + code + ':posts', JSON.stringify(mainList));
      if (ok) { s.posts = mainList; break; }
      await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
    }
  } else if (s.type === 'wordcloud') {
    s.pendingWords = (s.pendingWords || []).filter(w => w.id !== item.id);
    await kvSet('room:MOD-' + code + ':words', JSON.stringify(s.pendingWords));
    
    for (let attempt = 0; attempt < 3; attempt++) {
      const raw = await kvGet('room:' + code + ':words');
      let mainList = [];
      if (raw) { try { mainList = JSON.parse(raw); } catch (e) {} }
      
      const lower = item.text.toLowerCase();
      const existing = mainList.find(w => w.text.toLowerCase() === lower);
      if (existing) {
        existing.count += 1;
      } else {
        mainList.push({ text: item.text, count: 1 });
      }
      
      const ok = await kvSet('room:' + code + ':words', JSON.stringify(mainList));
      if (ok) { s.words = mainList; break; }
      await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
    }
  } else {
    s.pendingVotes = (s.pendingVotes || []).filter(v => v.id !== item.id);
    await kvSet('room:MOD-' + code + ':votes', JSON.stringify(s.pendingVotes));
    
    for (let attempt = 0; attempt < 3; attempt++) {
      const raw = await kvGet('room:' + code + ':votes');
      let votes = emptyVotesStructure(s);
      if (raw) { try { votes = JSON.parse(raw); } catch (e) {} }
      
      if (s.type === 'ranking') {
        votes.push(item.value);
      } else if (s.type === 'poll') {
        const qIdx = item.qIndex;
        if (!votes[qIdx]) votes[qIdx] = s.questions[qIdx].options.map(() => 0);
        item.value.forEach(idx => {
          votes[qIdx][idx] = (votes[qIdx][idx] || 0) + 1;
        });
      } else {
        item.value.forEach(idx => {
          votes[idx] = (votes[idx] || 0) + 1;
        });
      }
      
      const ok = await kvSet('room:' + code + ':votes', JSON.stringify(votes));
      if (ok) {
        s.votes = votes;
        if (s.type === 'poll' && item.studentName) {
          await recordStudentResponse(s, item.qIndex, item.value);
        }
        break;
      }
      await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
    }
  }
  render();
}

async function blockDevice(sessionId) {
  const s = state;
  const code = s.code;
  if (!sessionId) return;
  
  if (confirm("Block this device? All current and future submissions from this student will be deleted/blocked.")) {
    s.blockedSessions = s.blockedSessions || [];
    if (s.blockedSessions.indexOf(sessionId) === -1) {
      s.blockedSessions.push(sessionId);
    }
    
    const cfgRaw = await kvGet('room:' + code + ':config');
    if (cfgRaw) {
      try {
        const cfg = JSON.parse(cfgRaw);
        cfg.blockedSessions = s.blockedSessions;
        await kvSet('room:' + code + ':config', JSON.stringify(cfg));
      } catch (e) {}
    }
    
    if (s.type === 'brainstorm' || s.type === 'sticky') {
      s.pendingPosts = (s.pendingPosts || []).filter(p => !p.ownerSessionIds || p.ownerSessionIds.indexOf(sessionId) === -1);
      await kvSet('room:MOD-' + code + ':posts', JSON.stringify(s.pendingPosts));
    } else if (s.type === 'wordcloud') {
      s.pendingWords = (s.pendingWords || []).filter(w => w.sessionId !== sessionId);
      await kvSet('room:MOD-' + code + ':words', JSON.stringify(s.pendingWords));
    } else {
      s.pendingVotes = (s.pendingVotes || []).filter(v => v.sessionId !== sessionId);
      await kvSet('room:MOD-' + code + ':votes', JSON.stringify(s.pendingVotes));
    }
    
    if (s.type === 'brainstorm' || s.type === 'sticky') {
      for (let attempt = 0; attempt < 3; attempt++) {
        const raw = await kvGet('room:' + code + ':posts');
        if (raw) {
          try {
            let list = JSON.parse(raw);
            list = list.filter(p => !p.ownerSessionIds || p.ownerSessionIds.indexOf(sessionId) === -1);
            const ok = await kvSet('room:' + code + ':posts', JSON.stringify(list));
            if (ok) { s.posts = list; break; }
          } catch (e) {}
        }
        await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
      }
    }
    
    render();
  }
}

// ---------------------------------------------------------------------------
// Quiz live play (teacher side). A teacher-paced state machine cycling
// config.phase through 'answering' -> 'reveal' -> 'leaderboard' per question,
// then 'finished'. Every phase transition here is a plain host-authenticated
// kvGet/kvSet — no RPC needed, since only the teacher's own client (which
// already holds host_secret) ever calls these. The only RPC in the whole
// quiz flow is submit_quiz_answer, called from the student side.
// ---------------------------------------------------------------------------

function stopQuizCountdown() {
  if (quizCountdownHandle) {
    clearInterval(quizCountdownHandle);
    quizCountdownHandle = null;
  }
}

function quizTimeRemaining(s) {
  if (!s.timerSeconds || !s.phaseStartedAt) return null;
  const elapsed = (Date.now() - s.phaseStartedAt) / 1000;
  return Math.max(0, Math.ceil(s.timerSeconds - elapsed));
}

function startQuizTimerDisplay() {
  stopQuizCountdown();
  const s = state;
  if (!s.timerSeconds || s.phase !== 'answering') return;
  quizCountdownHandle = setInterval(() => {
    const badge = document.getElementById('quiz-timer-badge');
    if (!badge) { stopQuizCountdown(); return; }
    const remaining = quizTimeRemaining(s);
    badge.textContent = remaining + 's';
    badge.classList.toggle('low', remaining <= 5);
    if (remaining <= 0 && !s.autoRevealTriggered) {
      s.autoRevealTriggered = true;
      stopQuizCountdown();
      quizRevealCurrentQuestion();
    }
  }, 250);
}

        s.phaseStartedAt = cfg.phaseStartedAt;
        s.answeredNames = cfg.answeredNames || [];
        s.revealStats = cfg.revealStats || null;
        s.leaderboard = cfg.leaderboard || null;
        s.climber = cfg.climber || null;
      } catch (e) {}
    }
    const rosterRaw = await kvGet('room:' + s.code + ':roster');
    if (rosterRaw) { try { s.roster = JSON.parse(rosterRaw); } catch (e) {} }
    render();
  }
  // tick() calls the top-level render(), which re-enters this function on
  // every poll — guard the (re)subscribe so that doesn't stack up a new
  // realtime channel + 4s interval fallback every single cycle.
  if (state.lastListenerCode !== s.code || state.lastListenerScreen !== 'quizTeacherLive') {
    stopPolling();
    state.lastListenerCode = s.code;
    state.lastListenerScreen = 'quizTeacherLive';
    pollTimer = setupRealtimeListener(s.code, tick);
  }
}

// Per-question accuracy, most-common wrong answer, sorted worst-first so
// the questions most worth revisiting float to the top.
function computeQuizQuestionStats(questions, quizResponses) {
  return questions.map((q, i) => {
    let attempted = 0, correctCount = 0;
    const wrongTally = {};
    quizResponses.forEach(r => {
      const pq = r.perQuestion && r.perQuestion[i];
      if (!pq || typeof pq.selected !== 'number') return;
      attempted++;
      if (pq.correct) correctCount++;
      else wrongTally[pq.selected] = (wrongTally[pq.selected] || 0) + 1;
    });
    let mostCommonWrong = null, mostCommonWrongCount = 0;
    Object.keys(wrongTally).forEach(idx => {
      if (wrongTally[idx] > mostCommonWrongCount) { mostCommonWrongCount = wrongTally[idx]; mostCommonWrong = parseInt(idx, 10); }
    });
    return {
      index: i, prompt: q.prompt, attempted, correctCount,
      pctCorrect: attempted > 0 ? Math.round((correctCount / attempted) * 100) : null,
      mostCommonWrong, mostCommonWrongCount
    };
  });
}

function quizAutoSummary(questionStats) {
  const attempted = questionStats.filter(qs => qs.attempted > 0);
  if (attempted.length === 0) return 'No answers were recorded for this quiz.';
  const weak = attempted.filter(qs => qs.pctCorrect < 60).sort((a, b) => a.pctCorrect - b.pctCorrect);
  if (weak.length === 0) return "🎉 Everyone did well — no question dropped below 60% correct.";
  const names = weak.slice(0, 2).map(qs => 'Q' + (qs.index + 1));
  const label = names.length === 2 ? names.join(' and ') : names[0];
  return `${label} need${names.length === 1 ? 's' : ''} revisiting — under 60% got ${names.length === 1 ? 'it' : 'these'} right.`;
}

function quizResultsCSVRows(questions, quizResponses) {
  const header = ['Name', 'Total Score', 'Streak'];
  questions.forEach((q, i) => { header.push('Q' + (i + 1) + ' Answer', 'Q' + (i + 1) + ' Correct', 'Q' + (i + 1) + ' Points'); });
  const rows = [header];
  quizResponses.slice().sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0)).forEach(r => {
    const row = [r.name, r.totalScore || 0, r.streak || 0];
    questions.forEach((q, i) => {
      const pq = r.perQuestion && r.perQuestion[i];
      if (pq && typeof pq.selected === 'number') {
        row.push(q.options[pq.selected] || '', pq.correct ? 'Yes' : 'No', pq.pointsEarned || 0);
      } else {
        row.push('', '', '');
      }
    });
    rows.push(row);
  });
  return rows;
}

function quizAnalysisCSVRows(questionStats, questions) {
  const rows = [['Question #', 'Question', '% Correct', 'Answered', 'Correct', 'Most Common Wrong Answer', 'Wrong Answer Count']];
  questionStats.forEach(qs => {
    rows.push([
      qs.index + 1, qs.prompt, qs.pctCorrect === null ? '' : qs.pctCorrect + '%', qs.attempted, qs.correctCount,
      qs.mostCommonWrong !== null ? (questions[qs.index].options[qs.mostCommonWrong] || '') : '',
      qs.mostCommonWrong !== null ? qs.mostCommonWrongCount : ''
    ]);
  });
  return rows;
}

function downloadCsv(rows, filename) {
  const csvContent = rows.map(row => row.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

async function quizRevealCurrentQuestion() {
  stopQuizCountdown();
  const s = state;
  const raw = await kvGet('room:' + s.code + ':config');
  let cfg = null;
  if (raw) { try { cfg = JSON.parse(raw); } catch (e) {} }
  if (!cfg) return;
  const modRaw = await kvGet('room:MOD-' + s.code + ':config');
  let modCfg = null;
  if (modRaw) { try { modCfg = JSON.parse(modRaw); } catch (e) {} }
  const responses = (modCfg && Array.isArray(modCfg.quizResponses)) ? modCfg.quizResponses : [];
  const answerKey = (modCfg && Array.isArray(modCfg.answerKey)) ? modCfg.answerKey : [];
  const qIndex = cfg.currentIndex;
  const correctIdx = answerKey[qIndex];
  const question = s.questions[qIndex];
  const votes = question.options.map(() => 0);
  let totalAnswered = 0;
  responses.forEach(r => {
    const pq = r.perQuestion && r.perQuestion[qIndex];
    if (pq && typeof pq.selected === 'number') {
      if (votes[pq.selected] !== undefined) votes[pq.selected]++;
      totalAnswered++;
    }
  });
  cfg.phase = 'reveal';
  cfg.revealStats = { qIndex, correctIndex: correctIdx, votes, totalAnswered };
  await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
  s.phase = 'reveal';
  s.revealStats = cfg.revealStats;
  render();
}

async function quizShowLeaderboard() {
  stopQuizCountdown();
  const s = state;
  const raw = await kvGet('room:' + s.code + ':config');
  let cfg = null;
  if (raw) { try { cfg = JSON.parse(raw); } catch (e) {} }
  if (!cfg) return;
  const modRaw = await kvGet('room:MOD-' + s.code + ':config');
  let modCfg = null;
  if (modRaw) { try { modCfg = JSON.parse(modRaw); } catch (e) {} }
  const responses = (modCfg && Array.isArray(modCfg.quizResponses)) ? modCfg.quizResponses : [];
  const ranked = responses.slice().sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));
  const newRanks = ranked.map(r => r.name);
  const previousRanks = Array.isArray(cfg.previousRanks) ? cfg.previousRanks : [];
  let climber = null;
  if (previousRanks.length > 0) {
    newRanks.forEach((name, newIdx) => {
      const oldIdx = previousRanks.findIndex(n => n.trim().toLowerCase() === name.trim().toLowerCase());
      if (oldIdx === -1) return;
      const gain = oldIdx - newIdx;
      if (gain > 0 && (!climber || gain > climber.spots)) climber = { name, spots: gain };
    });
  }
  cfg.leaderboard = ranked.map(r => ({ name: r.name, totalScore: r.totalScore || 0, streak: r.streak || 0 }));
  cfg.climber = climber;
  cfg.previousRanks = newRanks;
  cfg.phase = 'leaderboard';
  await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
  s.leaderboard = cfg.leaderboard;
  s.climber = climber;
  s.phase = 'leaderboard';
  render();
}

async function quizNextQuestion() {
  stopQuizCountdown();
  const s = state;
  const raw = await kvGet('room:' + s.code + ':config');
  let cfg = null;
  if (raw) { try { cfg = JSON.parse(raw); } catch (e) {} }
  if (!cfg) return;
  const nextIndex = (cfg.currentIndex || 0) + 1;
  if (nextIndex >= s.questions.length) {
    cfg.phase = 'finished';
  } else {
    cfg.currentIndex = nextIndex;
    cfg.phase = 'answering';
    cfg.phaseStartedAt = Date.now();
    cfg.answeredNames = [];
    cfg.revealStats = null;
  }
  await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
  s.currentIndex = cfg.currentIndex;
  s.phase = cfg.phase;
  s.phaseStartedAt = cfg.phaseStartedAt;
  s.answeredNames = cfg.answeredNames || [];
  s.revealStats = null;
  s.autoRevealTriggered = false;
  render();
}

        <button class="btn-nav sans" id="btn-new-bower">🏗️ Build another bower</button>
        <div class="count-note sans" id="submission-count">${teacherCountLabel(s)}</div>
      </div>
      <div class="cloud-stage" id="cloud-stage"></div>
    </div>

    ${s.qrExpanded ? `
      <div class="qr-modal-overlay" id="qr-modal">
        <div class="qr-modal-content">
          <button class="qr-modal-close" id="btn-close-qr">✕</button>
