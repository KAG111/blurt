          <div class="sans" style="margin-top:1rem; font-size:1.25rem; font-weight:700; color:#fff; text-align:center;">
            Scan to join Room <span style="color:var(--yellow); font-size:1.6rem; font-weight:800;">${s.code}</span>
          </div>
        </div>
      </div>
    ` : ''}
    ${s.showRemoteQrModal ? `
      <div class="qr-modal-overlay" id="remote-qr-modal" style="z-index:30000;">
        <div class="qr-modal-content" style="max-width:440px;">
          <button class="qr-modal-close" id="btn-close-remote-qr">✕</button>
          <div style="background:#fff; padding:1.5rem; border-radius:12px; border:3px solid var(--ink); box-shadow:6px 6px 0 var(--shadow); text-align:center;">
            <div class="sans" style="font-weight:800; font-size:1.3rem; margin-bottom:0.8rem; color:var(--ink);">📱 Phone Moderation Remote</div>
            <div class="sans" style="font-size:0.85rem; color:var(--muted); margin-bottom:1.2rem; line-height:1.4;">
              Scan this QR code with your phone or tablet to moderate submissions on a second screen. No login required.
            </div>
            <div style="display:flex; justify-content:center; margin-bottom:1.2rem;">
              ${qrToSVGString(window.location.href.split('#')[0].split('?')[0] + '?remote=' + s.code + '&token=' + getHostSecret(s.code), 240)}
            </div>
            <div style="display:flex; flex-direction:column; gap:0.6rem;">
              <button class="btn-nav sans" id="btn-copy-remote-link" style="width:100%; font-size:0.85rem; font-weight:700; border:2px solid var(--ink); padding:0.5rem; background:#fff; cursor:pointer; border-radius:6px; box-shadow:2px 2px 0 var(--shadow);">📋 Copy Remote Link</button>
              <button class="btn-clear sans" id="btn-disconnect-remote" style="width:100%; font-size:0.85rem; font-weight:700; border:2px solid var(--ink); padding:0.5rem; background:var(--pink); color:#fff; cursor:pointer; border-radius:6px; box-shadow:2px 2px 0 var(--shadow);">🔌 Disconnect Remote</button>
            </div>
          </div>
        </div>
      </div>
    ` : ''}
    ${sanitizeImageSrc(s.zoomedImage) ? `
      <div class="qr-modal-overlay" id="img-zoom-modal" style="z-index:30000;cursor:zoom-out;">
        <div class="qr-modal-content" style="max-width:90vw;max-height:85vh;">
          <button class="qr-modal-close" id="btn-close-img-zoom" style="top:-35px;right:-10px;">✕</button>
          <div style="background:#fff; padding:1rem; border-radius:12px; border:3.5px solid var(--ink); box-shadow:6px 6px 0 var(--shadow); max-height:80vh; display:flex; flex-direction:column; align-items:center; justify-content:center;cursor:default;">
            <img src="${sanitizeImageSrc(s.zoomedImage)}" style="max-width:100%; max-height:70vh; object-fit:contain; border-radius:4px; border:2px solid var(--ink);" />
            ${s.zoomedImageCaption ? `<div class="sans" style="margin-top:0.8rem; font-weight:700; color:var(--ink); font-size:1.05rem; text-align:center; max-width:500px; word-break:break-word;">${escapeHtml(s.zoomedImageCaption)}</div>` : ''}
          </div>
        </div>
      </div>
    ` : ''}`;
  const finishBtn = document.getElementById('btn-finish-poll');
  if (finishBtn) finishBtn.onclick = async () => {
    stopPolling();
    const raw = await kvGet('room:' + s.code + ':config');
    if (raw) {
      try {
        const cfg = JSON.parse(raw);
        cfg.finished = true;
        await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
      } catch (e) {}
    }
    state = { screen: 'teacherResults', code: s.code, questions: s.questions };
    render();
  };
  document.getElementById('btn-clear').onclick = async () => {
    if (isChoice) {
      if (isPoll) {
        s.votes[s.currentIndex] = currentOptions(s).map(() => 0);
      } else {
        s.votes = currentOptions(s).map(() => 0);
      }
      await kvSet('room:' + s.code + ':votes', JSON.stringify(s.votes));
    } else if (s.type === 'ranking') {
      s.votes = [];
      s.rankingRevealedPlaces = [];
      await kvSet('room:' + s.code + ':votes', JSON.stringify([]));
    } else if (isBrainstorm) {
      s.posts = [];
      await kvSet('room:' + s.code + ':posts', JSON.stringify([]));
    } else {
      s.words = [];
      await kvSet('room:' + s.code + ':words', JSON.stringify([]));
    }
    renderTeacherStage();
    document.getElementById('submission-count').textContent = teacherCountLabel(s);
  };
  const toggleBtn = document.getElementById('btn-toggle-reveal');
  if (toggleBtn) {
    toggleBtn.onclick = async () => {
      s.revealed = !s.revealed;
      const raw = await kvGet('room:' + s.code + ':config');
      if (raw) {
        try { const cfg = JSON.parse(raw); cfg.revealed = s.revealed; await kvSet('room:' + s.code + ':config', JSON.stringify(cfg)); } catch (e) {}
      }
      render();
    };
  }
  const prevBtn = document.getElementById('btn-poll-prev');
  const nextBtn = document.getElementById('btn-poll-next-live');
  if (prevBtn) prevBtn.onclick = () => pollGoTo(s.currentIndex - 1);
  if (nextBtn) nextBtn.onclick = () => pollGoTo(s.currentIndex + 1);
  const mergeToggleBtn = document.getElementById('btn-toggle-merge');
  if (mergeToggleBtn) mergeToggleBtn.onclick = () => {
    s.mergeMode = !s.mergeMode;
    s.mergeSelectedIds = [];
    if (s.mergeMode) s.moveMode = false;
    render();
  };
  const toggleMoveBtn = document.getElementById('btn-toggle-move');
  if (toggleMoveBtn) {
    toggleMoveBtn.onclick = () => {
      s.moveMode = !s.moveMode;
      s.mergeSelectedIds = [];
      if (s.moveMode) s.mergeMode = false;
      render();
    };
  }
  const toggleLikesBtn = document.getElementById('btn-toggle-likes');
  if (toggleLikesBtn) {
    toggleLikesBtn.onclick = async () => {
      s.likesEnabled = !s.likesEnabled;
      const raw = await kvGet('room:' + s.code + ':config');
      if (raw) {
        try {
          const cfg = JSON.parse(raw);
          cfg.likesEnabled = s.likesEnabled;
          await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
        } catch (e) {}
      }
      render();
    };
  }

  const densitySlider = document.getElementById('sticky-density-slider');
  if (densitySlider) {
    densitySlider.oninput = (e) => {
      s.stickyDensity = parseFloat(e.target.value);
      // Re-render just the board, not the whole screen — a full render()
      // would rebuild the slider element itself mid-drag. The config write
      // is debounced (see scheduleStickyDensitySave) so dragging doesn't
      // fire a network write on every pixel of movement.
      renderTeacherStage();
      scheduleStickyDensitySave(s.code, s.stickyDensity);
    };
  }

  const downloadBtn = document.getElementById('btn-download-board');
  const downloadMenu = document.getElementById('download-menu');
  if (downloadBtn && downloadMenu) {
    downloadBtn.onclick = (e) => {
      e.stopPropagation();
      downloadMenu.style.display = downloadMenu.style.display === 'none' ? 'flex' : 'none';
    };
    document.getElementById('download-csv').onclick = () => exportBoard('csv');
    document.getElementById('download-pdf').onclick = () => exportBoard('pdf');
    document.getElementById('download-jpeg').onclick = () => exportBoard('jpeg');
  }

  const toggleBoardModeBtn = document.getElementById('btn-toggle-boardmode');
  if (toggleBoardModeBtn) {
    toggleBoardModeBtn.onclick = () => {
      s.boardMode = !s.boardMode;
      render();
    };
  }
  const newBowerBtn = document.getElementById('btn-new-bower');
  if (newBowerBtn) {
    newBowerBtn.onclick = () => {
      // This room keeps running (nothing is deleted) and stays in the
      // "recent bowers" list on this screen with a Resume button, so
      // there's no confirm() here — leaving is never a one-way door.
      state = { screen: 'activityPicker' };
      render();
    };
  }
  const revealRanksBtn = document.getElementById('btn-reveal-all-ranks');
  if (revealRanksBtn) {
    revealRanksBtn.onclick = () => {
      s.rankingRevealedPlaces = s.options.map((_, i) => i);
      renderRankingStage();
    };
  }

  const zoomBtn = document.getElementById('btn-zoom-qr');
  if (zoomBtn) {
    zoomBtn.onclick = () => {
      s.qrExpanded = true;
      render();
    };
  }
  const closeBtn = document.getElementById('btn-close-qr');
  if (closeBtn) {
    closeBtn.onclick = () => {
      s.qrExpanded = false;
      render();
    };
  }
  const closeImgZoomBtn = document.getElementById('btn-close-img-zoom');
  if (closeImgZoomBtn) {
    closeImgZoomBtn.onclick = () => {
      s.zoomedImage = null;
      s.zoomedImageCaption = null;
      render();
    };
  }
  const imgZoomModal = document.getElementById('img-zoom-modal');
  if (imgZoomModal) {
    imgZoomModal.onclick = (e) => {
      if (e.target === imgZoomModal) {
        s.zoomedImage = null;
        s.zoomedImageCaption = null;
        render();
      }
    };
  }
  // Mode Selection Handlers
  ['classic', 'split', 'remote'].forEach(mode => {
    const btn = document.getElementById('pres-mode-' + mode);
    if (btn) {
      btn.onclick = async () => {
        const oldMode = s.presentationMode || 'classic';
        if (oldMode === mode) return;
        
        s.presentationMode = mode;
        
        // Update database configuration
        const raw = await kvGet('room:' + s.code + ':config');
        if (raw) {
          try {
            const cfg = JSON.parse(raw);
            cfg.presentationMode = mode;
            await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
            
            // Initialize shadow room row
            if (mode !== 'classic') {
              await kvSet('room:MOD-' + s.code + ':posts', '[]');
              await kvSet('room:MOD-' + s.code + ':words', '[]');
              const initVotes = s.type === 'ranking' ? '[]' : (s.type === 'poll' ? JSON.stringify(s.questions.map(q => q.options.map(() => 0))) : JSON.stringify((s.options || []).map(() => 0)));
              await kvSet('room:MOD-' + s.code + ':votes', initVotes);
              await kvSet('room:MOD-' + s.code + ':responses', '[]');
              await kvSet('room:MOD-' + s.code + ':config', '{}');
            }
          } catch (e) {}
        }
        
        // If switching back to classic, automatically approve/merge any pending submissions
        if (mode === 'classic') {
          await mergeShadowIntoMain(s.code);
        }
        
        // If switching to remote, automatically show the QR code modal
        if (mode === 'remote') {
          s.showRemoteQrModal = true;
        }
        
        render();
      };
    }
  });

  const openDisplayBtn = document.getElementById('btn-open-display');
  if (openDisplayBtn) {
    openDisplayBtn.onclick = () => {
      window.open(window.location.href.split('#')[0].split('?')[0] + '?display=' + s.code, '_blank');
    };
  }

  const showRemoteQrBtn = document.getElementById('btn-show-remote-qr');
  if (showRemoteQrBtn) {
    showRemoteQrBtn.onclick = () => {
      s.showRemoteQrModal = true;
      render();
    };
  }

  const closeRemoteQrBtn = document.getElementById('btn-close-remote-qr');
  if (closeRemoteQrBtn) {
    closeRemoteQrBtn.onclick = () => {
      s.showRemoteQrModal = false;
      render();
    };
  }

  const copyRemoteLinkBtn = document.getElementById('btn-copy-remote-link');
  if (copyRemoteLinkBtn) {
    copyRemoteLinkBtn.onclick = () => {
      const link = window.location.href.split('#')[0].split('?')[0] + '?remote=' + s.code + '&token=' + getHostSecret(s.code);
      navigator.clipboard.writeText(link).then(() => {
        copyRemoteLinkBtn.textContent = '✓ Copied!';
        setTimeout(() => { copyRemoteLinkBtn.textContent = '📋 Copy Remote Link'; }, 2000);
      });
    };
  }

  const disconnectRemoteBtn = document.getElementById('btn-disconnect-remote');
  if (disconnectRemoteBtn) {
    disconnectRemoteBtn.onclick = async () => {
      if (confirm("Disconnect the current phone remote? This will generate a new secret token.")) {
        await rotatePhoneRemote(s.code);
        s.remoteConnected = false;
        const raw = await kvGet('room:' + s.code + ':config');
        if (raw) {
          try {
            const cfg = JSON.parse(raw);
            cfg.remoteConnected = false;
            await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
          } catch (e) {}
        }
        render();
      }
    };
  }
  renderTeacherStage();
  const tick = async () => {
    const cfgRaw = await kvGet('room:' + s.code + ':config');
    if (cfgRaw) {
      try {
        const cfg = JSON.parse(cfgRaw);
        const prevMode = s.presentationMode;
        s.presentationMode = cfg.presentationMode || 'classic';
        s.blockedSessions = cfg.blockedSessions || [];
        s.remoteConnected = cfg.remoteConnected || false;
        s.revealed = cfg.revealed !== undefined ? cfg.revealed : s.revealed;
        
        if (prevMode !== s.presentationMode) {
          render();
          return;
        }
      } catch (e) {}
    }

    if (isChoice) {
      const raw = await kvGet('room:' + s.code + ':votes');
      if (raw) { try { s.votes = JSON.parse(raw); } catch (e) {} }
    } else if (s.type === 'ranking') {
      const raw = await kvGet('room:' + s.code + ':votes');
      if (raw) { try { s.votes = JSON.parse(raw); } catch (e) {} }
    } else if (isBrainstorm) {
      const raw = await kvGet('room:' + s.code + ':posts');
      if (raw) { try { s.posts = JSON.parse(raw); } catch (e) {} }
    } else {
      const raw = await kvGet('room:' + s.code + ':words');
      if (raw) { try { s.words = JSON.parse(raw); } catch (e) {} }
    }
    if (document.getElementById('submission-count')) document.getElementById('submission-count').textContent = teacherCountLabel(s);
    renderTeacherStage();
  };

  const shadowTick = async () => {
    if (isChoice) {
      const raw = await kvGet('room:MOD-' + s.code + ':votes');
      if (raw) { try { s.pendingVotes = JSON.parse(raw); } catch (e) {} }
    } else if (s.type === 'ranking') {
      const raw = await kvGet('room:MOD-' + s.code + ':votes');
      if (raw) { try { s.pendingVotes = JSON.parse(raw); } catch (e) {} }
    } else if (isBrainstorm) {
      const raw = await kvGet('room:MOD-' + s.code + ':posts');
      if (raw) { try { s.pendingPosts = JSON.parse(raw); } catch (e) {} }
    } else {
      const raw = await kvGet('room:MOD-' + s.code + ':words');
      if (raw) { try { s.pendingWords = JSON.parse(raw); } catch (e) {} }
    }
    
    const cfgRaw = await kvGet('room:' + s.code + ':config');
    if (cfgRaw) {
      try {
        const cfg = JSON.parse(cfgRaw);
        s.remoteConnected = cfg.remoteConnected || false;
        s.presentationMode = cfg.presentationMode || 'classic';
      } catch (e) {}
    }
    
    renderTeacherStage();
  };

  if (state.lastListenerCode !== s.code || state.lastListenerMode !== (s.presentationMode || 'classic')) {
    stopPolling();
    state.lastListenerCode = s.code;
    state.lastListenerMode = s.presentationMode || 'classic';
    
    pollTimer = setupRealtimeListener(s.code, tick);
    if (s.presentationMode && s.presentationMode !== 'classic') {
      shadowTimer = setupRealtimeListener('MOD-' + s.code, shadowTick);
    }
  }
}

async function pollGoTo(newIndex) {
  const s = state;
  if (newIndex < 0 || newIndex >= s.questions.length) return;
  s.currentIndex = newIndex;
  s.revealed = s.revealMode === 'live';
  const raw = await kvGet('room:' + s.code + ':config');
  if (raw) {
    try {
      const cfg = JSON.parse(raw);
      cfg.currentIndex = newIndex;
      cfg.revealed = s.revealed;
      await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
    } catch (e) {}
  }
  render();
}

async function startDisplayOnlyView(code) {
  state = { screen: 'displayView', code: code, posts: [], words: [], votes: [], config: {}, boardMode: true };
  
  const configRaw = await kvGet('room:' + code + ':config');
  if (configRaw) {
    try {
      const cfg = JSON.parse(configRaw);
      state.type = cfg.type;
      state.prompt = cfg.prompt;
      state.questions = cfg.questions;
      state.currentIndex = cfg.currentIndex || 0;
      state.revealMode = cfg.revealMode || 'instant';
      state.revealed = cfg.revealed;
      state.likesEnabled = !!cfg.likesEnabled;
      state.presentationMode = cfg.presentationMode || 'classic';
      state.stickyDensity = cfg.stickyDensity;
    } catch (e) {}
  }

  if (state.type === 'mc' || state.type === 'poll') {
    const raw = await kvGet('room:' + code + ':votes');
    if (raw) { try { state.votes = JSON.parse(raw); } catch (e) {} }
  } else if (state.type === 'ranking') {
    const raw = await kvGet('room:' + code + ':votes');
    if (raw) { try { state.votes = JSON.parse(raw); } catch (e) {} }
  } else if (state.type === 'brainstorm' || state.type === 'sticky') {
    const raw = await kvGet('room:' + code + ':posts');
    if (raw) { try { state.posts = JSON.parse(raw); } catch (e) {} }
  } else {
    const raw = await kvGet('room:' + code + ':words');
    if (raw) { try { state.words = JSON.parse(raw); } catch (e) {} }
  }
  
  render();
  
  stopPolling();
  const tick = async () => {
    const cfgRaw = await kvGet('room:' + code + ':config');
    if (cfgRaw) {
      try {
        const cfg = JSON.parse(cfgRaw);
        state.prompt = cfg.prompt;
        state.currentIndex = cfg.currentIndex || 0;
        state.revealed = cfg.revealed;
        state.likesEnabled = !!cfg.likesEnabled;
        state.mergeMode = cfg.mergeMode;
        state.moveMode = cfg.moveMode;
        state.stickyDensity = cfg.stickyDensity;
      } catch (e) {}
    }

    if (state.type === 'mc' || state.type === 'poll') {
      const raw = await kvGet('room:' + code + ':votes');
      if (raw) { try { state.votes = JSON.parse(raw); } catch (e) {} }
    } else if (state.type === 'ranking') {
      const raw = await kvGet('room:' + code + ':votes');
      if (raw) { try { state.votes = JSON.parse(raw); } catch (e) {} }
    } else if (state.type === 'brainstorm' || state.type === 'sticky') {
      const raw = await kvGet('room:' + code + ':posts');
      if (raw) { try { state.posts = JSON.parse(raw); } catch (e) {} }
    } else {
      const raw = await kvGet('room:' + code + ':words');
      if (raw) { try { state.words = JSON.parse(raw); } catch (e) {} }
    }
    render();
  };
  pollTimer = setupRealtimeListener(code, tick);
}

            </div>
            <div style="display:flex; flex-direction:column; gap:0.6rem;">
              <button class="btn-nav sans" id="btn-copy-remote-link" style="width:100%; font-size:0.85rem; font-weight:700; border:2px solid var(--ink); padding:0.5rem; background:#fff; cursor:pointer; border-radius:6px; box-shadow:2px 2px 0 var(--shadow);">📋 Copy Remote Link</button>

            <div style="display:flex; gap:0.4rem; align-items:center; margin-top:1.2rem; justify-content:center; flex-wrap:wrap;">
              <span class="sans" style="font-weight:700; font-size:0.85rem; color:var(--ink);">Switch Mode:</span>
              <button class="btn-nav sans" id="modal-pres-mode-classic" style="padding:0.4rem 0.6rem; font-size:0.75rem; font-weight:700; border:2px solid var(--ink); cursor:pointer; border-radius:4px; box-shadow:1px 1px 0 var(--shadow); background:#fff;">Classic</button>
              <button class="btn-nav sans" id="modal-pres-mode-split" style="padding:0.4rem 0.6rem; font-size:0.75rem; font-weight:700; border:2px solid var(--ink); cursor:pointer; border-radius:4px; box-shadow:1px 1px 0 var(--shadow); background:#fff;">Split Screen</button>
            </div>
          </div>
        </div>
      </div>
    ` : ''}
  `;
  
  if (s.type === 'mc' || s.type === 'poll') renderMCStage();
  else if (s.type === 'brainstorm') renderBrainstormStage();
  else if (s.type === 'sticky') renderStickyStage();
  else if (s.type === 'ranking') renderRankingStage();
  else renderCloudStage();
}

async function startRemoteControlView(code, token) {
  state = { screen: 'phoneRemote', code: code, token: token, posts: [], words: [], votes: [], roster: [], config: {} };

  // The QR/link's "token" is the room's real host_secret. Store it so every
  // subsequent kvGet/kvSet call from this device sends it as the
  // x-host-secret header, then prove authorization with a real DB round-trip
  // (reading the MOD- row) instead of trusting a value from public config.
  setHostSecret(code, token);

  const configRaw = await kvGet('room:' + code + ':config');
  if (configRaw) {
    try {
      const cfg = JSON.parse(configRaw);
      state.type = cfg.type;
      state.prompt = cfg.prompt;
      state.questions = cfg.questions;
      state.currentIndex = cfg.currentIndex || 0;
      state.revealMode = cfg.revealMode || 'instant';
      state.revealed = cfg.revealed;
      state.likesEnabled = !!cfg.likesEnabled;
      state.presentationMode = cfg.presentationMode || 'classic';
      state.requireNames = !!cfg.requireNames;
      state.phase = cfg.phase;
      state.phaseStartedAt = cfg.phaseStartedAt;
      state.timerSeconds = cfg.timerSeconds;
      state.answeredNames = cfg.answeredNames || [];
      state.revealStats = cfg.revealStats || null;
      state.leaderboard = cfg.leaderboard || null;
      state.climber = cfg.climber || null;
    } catch (e) {}
  }

  const modAuthCheck = await kvGet('room:MOD-' + code + ':config');
  if (modAuthCheck !== null) {
    const raw = await kvGet('room:' + code + ':config');
    if (raw) {
      try {
        const cfg = JSON.parse(raw);
        cfg.remoteConnected = true;
        await kvSet('room:' + code + ':config', JSON.stringify(cfg));
      } catch (e) {}
    }
  } else {
    clearHostSecret(code);
    state.unauthorized = true;
  }

  if ((state.type === 'poll' || state.type === 'quiz') && state.requireNames) {
    const rosterRaw = await kvGet('room:' + code + ':roster');
    if (rosterRaw) { try { state.roster = JSON.parse(rosterRaw); } catch (e) {} }
  }

  render();

  if (state.unauthorized) return;

  stopPolling();

  const tick = async () => {
    const cfgRaw = await kvGet('room:' + code + ':config');
    const modCheck = await kvGet('room:MOD-' + code + ':config');
    if (modCheck === null) {
      clearHostSecret(code);
      stopPolling();
      state.unauthorized = true;
      render();
      return;
    }
    if (cfgRaw) {
      try {
        const cfg = JSON.parse(cfgRaw);
        state.prompt = cfg.prompt;
        state.currentIndex = cfg.currentIndex || 0;
        state.revealed = cfg.revealed;
        state.likesEnabled = !!cfg.likesEnabled;
        state.presentationMode = cfg.presentationMode || 'classic';
        state.requireNames = !!cfg.requireNames;
        state.phase = cfg.phase;
        state.phaseStartedAt = cfg.phaseStartedAt;
        state.timerSeconds = cfg.timerSeconds;
        state.answeredNames = cfg.answeredNames || [];
        state.revealStats = cfg.revealStats || null;
        state.leaderboard = cfg.leaderboard || null;
        state.climber = cfg.climber || null;
      } catch (e) {}
    }

    if ((state.type === 'poll' || state.type === 'quiz') && state.requireNames) {
      const raw = await kvGet('room:' + code + ':roster');
      if (raw) { try { state.roster = JSON.parse(raw); } catch (e) {} }
    } else if (state.type === 'mc' || state.type === 'poll') {
      const raw = await kvGet('room:' + code + ':votes');
      if (raw) { try { state.votes = JSON.parse(raw); } catch (e) {} }
    } else if (state.type === 'ranking') {
      const raw = await kvGet('room:' + code + ':votes');
      if (raw) { try { state.votes = JSON.parse(raw); } catch (e) {} }
    } else if (state.type === 'brainstorm' || state.type === 'sticky') {
      const raw = await kvGet('room:' + code + ':posts');
      if (raw) { try { state.posts = JSON.parse(raw); } catch (e) {} }
    } else {
      const raw = await kvGet('room:' + code + ':words');
      if (raw) { try { state.words = JSON.parse(raw); } catch (e) {} }
    }
    render();
  };
  
  const shadowTick = async () => {
    if (state.type === 'quiz') {
      // Nothing to poll here for quiz: correctness/scores only change at
      // teacher-driven phase transitions, which write straight into the
      // main config that `tick` already re-fetches every cycle.
      return;
    }
    if (state.type === 'mc' || state.type === 'poll') {
      const raw = await kvGet('room:MOD-' + code + ':votes');
      if (raw) { try { state.pendingVotes = JSON.parse(raw); } catch (e) {} }
    } else if (state.type === 'ranking') {
      const raw = await kvGet('room:MOD-' + code + ':votes');
      if (raw) { try { state.pendingVotes = JSON.parse(raw); } catch (e) {} }
    } else if (state.type === 'brainstorm' || state.type === 'sticky') {
      const raw = await kvGet('room:MOD-' + code + ':posts');
      if (raw) { try { state.pendingPosts = JSON.parse(raw); } catch (e) {} }
    } else {
      const raw = await kvGet('room:MOD-' + code + ':words');
      if (raw) { try { state.pendingWords = JSON.parse(raw); } catch (e) {} }
    }
    render();
  };

  pollTimer = setupRealtimeListener(code, tick);
  shadowTimer = setupRealtimeListener('MOD-' + code, shadowTick);
}

window.addEventListener('beforeunload', () => {
  // Browsers do not wait for async beforeunload handlers to finish, so the
  // previous kvGet-then-kvSet round trip never actually completed before
  // the page unloaded. keepalive fetch is specifically designed to survive
  // page teardown; this is best-effort (network failures are swallowed —
  // there's nothing meaningful to do about them at this point anyway).
  if (state.screen === 'phoneRemote' && state.code) {
    try {
      fetch(SUPABASE_URL + '/rest/v1/rpc/set_remote_disconnected', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ p_code: baseRoomCode(state.code) }),
        keepalive: true
      }).catch(() => {});
    } catch (e) {}
  }
});

// Phone-remote "clicker" body for a live quiz — lets the teacher advance
// phases from anywhere in the room instead of walking back to their laptop.
// Reuses quizRevealCurrentQuestion/quizShowLeaderboard/quizNextQuestion
// unchanged: those functions only ever touch the shared global `state`, so
// calling them from this screen works exactly like calling them from
// renderQuizTeacherLive.
function quizRemoteHtml(s) {
  const question = s.questions ? s.questions[s.currentIndex] : null;
  const answeredCount = (s.answeredNames || []).length;
  const totalCount = (s.roster || []).length;
  const phaseLabel = s.phase === 'answering' ? 'Answering' : s.phase === 'reveal' ? 'Reveal' : s.phase === 'leaderboard' ? 'Leaderboard' : 'Finished';
  const btnStyle = 'width:100%; padding:0.7rem; font-size:0.95rem; font-weight:700; border:2.5px solid var(--ink); box-shadow:3px 3px 0 var(--shadow); cursor:pointer; border-radius:8px;';
  let actionButton = '';
  if (s.phase === 'answering') {
    actionButton = `<button class="btn-reveal sans" id="btn-remote-quiz-action" style="${btnStyle}color:#fff;">${totalCount > 0 && answeredCount >= totalCount ? "Everyone's in → Reveal" : 'Reveal now'}</button>`;
  } else if (s.phase === 'reveal') {
    actionButton = `<button class="btn-reveal sans" id="btn-remote-quiz-action" style="${btnStyle}color:#fff;">🏆 Show leaderboard</button>`;
  } else if (s.phase === 'leaderboard') {
    const isLast = s.currentIndex >= (s.questions || []).length - 1;
    actionButton = `<button class="btn-primary sans" id="btn-remote-quiz-action" style="${btnStyle}">${isLast ? '🏁 Finish quiz' : 'Next question →'}</button>`;
  }
  return `
      <div class="sans" style="font-size:0.85rem; color:rgba(20,17,31,0.85); line-height:1.4; margin-bottom:1rem; text-align:left;">
        💡 Use this screen as a clicker to control pacing from anywhere in the room.
      </div>
      <div style="text-align:left; margin-bottom:1rem;">
        <div class="sans" style="font-weight:800; font-size:1.05rem; color:var(--ink);">Question ${s.currentIndex + 1} of ${(s.questions || []).length}</div>
        <div class="sans" style="font-size:0.8rem; color:var(--muted); text-transform:uppercase; font-weight:700; letter-spacing:0.05em; margin-top:0.2rem;">${phaseLabel}</div>
        ${question ? `<div class="sans" style="font-weight:700; color:var(--ink); margin-top:0.5rem;">${escapeHtml(question.prompt)}</div>` : ''}
      </div>
      ${s.phase === 'answering' ? `<div class="sans" style="font-weight:700; color:var(--ink); margin-bottom:1rem;">${answeredCount}/${totalCount} answered</div>` : ''}
      ${actionButton}
      <div style="background:rgba(20,17,31,0.06); border:2px dashed rgba(20,17,31,0.3); padding:0.8rem; border-radius:8px; color:rgba(20,17,31,0.85); font-size:0.85rem; text-align:left; margin-top:1rem;">
        💡 You are connected to this room. Changes you make here appear instantly on the main screen.
      </div>`;
}

      const raw = await kvGet('room:' + s.code + ':roster');
      let currentRoster = [];
      if (raw) { try { currentRoster = JSON.parse(raw); } catch (e) {} }
      currentRoster = currentRoster.filter(n => n !== name);
      await kvSet('room:' + s.code + ':roster', JSON.stringify(currentRoster));
      s.roster = currentRoster;
      render();
    };
  });

  const approveAllBtn = document.getElementById('btn-remote-approve-all');
  if (approveAllBtn) approveAllBtn.onclick = approveAllSubmissions;

  const quizActionBtn = document.getElementById('btn-remote-quiz-action');
  if (quizActionBtn) {
    quizActionBtn.onclick = () => {
      quizActionBtn.disabled = true;
      if (s.phase === 'answering') { s.autoRevealTriggered = true; quizRevealCurrentQuestion(); }
      else if (s.phase === 'reveal') quizShowLeaderboard();
      else if (s.phase === 'leaderboard') quizNextQuestion();
    };
  }

  const remoteToggleRevealBtn = document.getElementById('btn-remote-toggle-reveal');
  if (remoteToggleRevealBtn) {
    remoteToggleRevealBtn.onclick = async () => {
      s.revealed = !s.revealed;
      const raw = await kvGet('room:' + s.code + ':config');
      if (raw) {
        try { const cfg = JSON.parse(raw); cfg.revealed = s.revealed; await kvSet('room:' + s.code + ':config', JSON.stringify(cfg)); } catch (e) {}
      }
      renderPhoneRemote();
    };
  }
  
  const toggleDismissedBtn = document.getElementById('btn-remote-toggle-dismissed');
  if (toggleDismissedBtn) {
    toggleDismissedBtn.onclick = () => {
      s.showDismissedList = !s.showDismissedList;
      render();
    };
  }
  
  document.querySelectorAll('.btn-remote-card-approve').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const item = pending.find(i => i.id === id);
      if (item) approveSubmission(item);
    };
  });
  
  document.querySelectorAll('.btn-remote-card-dismiss').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const item = pending.find(i => i.id === id);
      if (item) dismissSubmission(item);
    };
  });
  
  document.querySelectorAll('.btn-remote-undo').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const item = dismissed.find(i => i.id === id);
      if (item) undoDismiss(item);
    };
  });
  
  document.querySelectorAll('.block-dev-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const sessionId = btn.dataset.session;
      blockDevice(sessionId);
    };
  });
  
  document.querySelectorAll('.mod-img-thumbnail').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      s.zoomedImage = el.dataset.img;
      render();
    };
  });

  const imgZoomModal = document.getElementById('img-zoom-modal');
  if (imgZoomModal) {
    imgZoomModal.onclick = (e) => {
      if (e.target === imgZoomModal || e.target.id === 'btn-close-img-zoom') {
        s.zoomedImage = null;
        render();
      }
    };
  }
  
  // Register Swipe touch gesture events
  document.querySelectorAll('.phone-mod-card').forEach(card => {
    let startX = 0;
    let startY = 0;
    const id = card.dataset.id;
    const item = pending.find(i => i.id === id);
    if (!item) return;
    
    card.ontouchstart = (e) => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      card.style.transition = 'none';
    };
    
    card.ontouchmove = (e) => {
      const diffX = e.touches[0].clientX - startX;
      const diffY = e.touches[0].clientY - startY;
      
      if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) < 160) {
        card.style.transform = `translateX(${diffX}px) rotate(${diffX * 0.05}deg)`;
      }
    };
    
    card.ontouchend = (e) => {
      const diffX = e.changedTouches[0].clientX - startX;
      const diffY = e.changedTouches[0].clientY - startY;
      
      card.style.transition = 'transform 0.2s, opacity 0.2s';
      
      if (Math.abs(diffX) > 85 && Math.abs(diffY) < 55) {
        if (diffX > 0) {
          card.style.transform = 'translateX(250px) rotate(15deg)';
          card.style.opacity = '0';
          setTimeout(() => approveSubmission(item), 150);
        } else {
          card.style.transform = 'translateX(-250px) rotate(-15deg)';
          card.style.opacity = '0';
          setTimeout(() => dismissSubmission(item), 150);
        }
      } else {
        card.style.transform = 'none';
      }
    };
  });
}

async function renderTeacherResults() {
  const s = state;

    </div>`;
  const raw = await kvGet('room:' + s.code + ':responses');

  if (raw) { try { responses = JSON.parse(raw); } catch (e) { responses = []; } }

  const rosterRaw = await kvGet('room:' + s.code + ':roster');

  const top3 = scored.slice(0, 3);

  const visualOrder = top3.length === 3 ? [1, 0, 2] : top3.map((_, i) => i);

        <div class="leaderboard-row">

          <span class="sans">${r.correct}/${r.total} correct</span>
        </div>`).join('')}
    </div>
    <div class="results-actions">
      <button class="btn-outline sans" id="btn-back-to-quiz">← Back to quiz</button>
    </div>`;

  document.getElementById('btn-back-to-quiz').onclick = () => {

function scoreResponse(record, questions) {
  let correct = 0, wrong = 0;
  const perQuestion = questions.map((q, i) => {
    const answer = (record.answers && record.answers[i]) || null;
    if (!answer || answer.length === 0) return { status: 'unanswered', text: '' };
    const answerText = answer.map(idx => q.options[idx]).filter(Boolean).join('; ');
    if (q.correctIndex === null || q.correctIndex === undefined) {
      return { status: 'unscored', text: answerText };
    }
    const isCorrect = answer.length === 1 && answer[0] === q.correctIndex;
    if (isCorrect) correct++; else wrong++;
    return { status: isCorrect ? 'correct' : 'wrong', text: answerText };
  });
  const scoredQuestionCount = questions.filter(q => q.correctIndex !== null && q.correctIndex !== undefined).length;
  return { name: record.name, correct, wrong, total: scoredQuestionCount, perQuestion };
}

function teacherCountLabel(s) {
  if (s.type === 'mc' || s.type === 'poll') {
    const total = getCurrentVotes(s).reduce((a, v) => a + v, 0);
    return total + ' vote' + (total === 1 ? '' : 's');
  }
  if (s.type === 'ranking') {
    const count = (s.votes || []).length;
    return count + ' ranking' + (count === 1 ? '' : 's');
  }
  if (s.type === 'brainstorm' || s.type === 'sticky') {
    const count = (s.posts || []).length;
    const labelWord = s.type === 'sticky' ? 'note' : 'idea';
    return count + ' ' + labelWord + (count === 1 ? '' : 's');
  }
  return totalCount(s.words) + ' submissions';
}

function renderRankingStage() {
  const stage = document.getElementById('cloud-stage');
  if (!stage) return;
  const s = state;
  const votes = s.votes || [];
  s.rankingRevealedPlaces = s.rankingRevealedPlaces || [];
  
  if (s.revealMode === 'manual' && !s.revealed) {
    stage.innerHTML = `
      <div class="hidden-note sans">
        <div class="hidden-note-main">Ranking results are hidden from view.</div>
        <div>${votes.length} submission${votes.length === 1 ? '' : 's'} collected so far — hit "Reveal answers" when ready.</div>
      </div>`;
    return;
  }

  const N = s.options.length;
  const scores = {};
  s.options.forEach(opt => { scores[opt] = 0; });
  
  votes.forEach(sub => {
    sub.forEach((opt, idx) => {
      if (scores[opt] !== undefined) {
        scores[opt] += (N - idx);
      }
    });
  });

  const sorted = s.options.map(opt => ({
    text: opt,
    points: scores[opt]
  })).sort((a, b) => b.points - a.points);

  let html = `<div style="width:100%;max-width:640px;margin:0 auto;text-align:left;">`;
  
  if (!s.boardMode) {
    html += `<div class="sans" style="font-size:0.85rem;color:var(--muted);margin-bottom:0.8rem;text-align:center;">
      💡 Tip: Click on any ranked position below to reveal it step-by-step!
    </div>`;
  }

  const maxVal = Math.max(...sorted.map(x => x.points)) || 1;

  sorted.forEach((item, idx) => {
    const isRevealed = s.rankingRevealedPlaces.indexOf(idx) !== -1;
    const pct = maxVal > 0 ? Math.round((item.points / maxVal) * 100) : 0;
    
    html += `
      <div class="mc-bar-row ranking-bar-row ${isRevealed ? '' : 'locked'}" data-place="${idx}">
        ${isRevealed ? '' : `<div class="ranking-locked-overlay">🔒 Click to reveal #${idx + 1}</div>`}
        <div style="display:flex;justify-content:space-between;margin-bottom:0.3rem;">
          <div class="mc-bar-label sans">
            <span style="font-weight:800;color:var(--pink);margin-right:0.4rem;">#${idx + 1}</span>
            <span>${escapeHtml(item.text)}</span>
          </div>
          <div class="mc-bar-count sans">${item.points} pts</div>
        </div>
        <div class="mc-bar-track">
          <div class="mc-bar-fill" style="width:${pct}%;background-color:${colorFor(idx)};"></div>
        </div>
      </div>`;
  });
  html += `</div>`;
  stage.innerHTML = html;

  stage.querySelectorAll('.ranking-bar-row.locked').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.place, 10);
      s.rankingRevealedPlaces.push(idx);
      renderRankingStage();
    };
  });
}

function renderStickyStage() {
  const stage = document.getElementById('cloud-stage');
  if (!stage) return;
  const s = state;
  const posts = s.posts || [];
  s.mergeSelectedIds = s.mergeSelectedIds || [];
  if (s.revealMode === 'manual' && !s.revealed) {
    stage.innerHTML = `
      <div class="hidden-note sans">
        <div class="hidden-note-main">Pinned cards are hidden from view.</div>
        <div>${posts.length} card${posts.length === 1 ? '' : 's'} collected so far — hit "Reveal answers" when ready.</div>
      </div>`;
    return;
  }
  
  stage.innerHTML = corkBoardHtml(s.prompt, posts, {
    isTeacher: true,
    interactive: false,
    mergeMode: s.mergeMode,
    moveMode: s.moveMode,
    selectedIds: s.mergeSelectedIds,
    likesEnabled: s.likesEnabled,
    density: s.stickyDensity
  });

  if (s.moveMode) {
    const { spread } = stickyDensityFactors(s.stickyDensity);
    stage.querySelectorAll('.sticky-note').forEach(el => {
      setupPostDragging(el, el.dataset.id, spread);
    });
  }

  stage.querySelectorAll('.sticky-edit-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); editSticky(btn.dataset.id); };
  });
  stage.querySelectorAll('.sticky-delete-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); deleteSticky(btn.dataset.id); };
  });

  stage.querySelectorAll('.sticky-note-img').forEach(img => {
    img.style.cursor = 'zoom-in';
    img.onclick = (e) => {
      e.stopPropagation();
      const postId = img.closest('.sticky-note').dataset.id;
      const post = s.posts.find(p => p.id === postId);
      if (post && post.image) {
        s.zoomedImage = post.image;
        s.zoomedImageCaption = post.text;
        render();
      }
    };
  });

  if (s.mergeMode) {
    stage.querySelectorAll('.sticky-note[data-id]').forEach(el => {
      el.onclick = () => {
        const id = el.dataset.id;
        const idx = s.mergeSelectedIds.indexOf(id);
        if (idx === -1) s.mergeSelectedIds.push(id); else s.mergeSelectedIds.splice(idx, 1);
        renderStickyStage();
      };
    });
    renderMergeControls(stage, posts);
  }
}

function totalCount(words) { return (words || []).reduce((a, w) => a + w.count, 0); }

function renderMCStage() {
  const stage = document.getElementById('cloud-stage');
  if (!stage) return;
  const s = state;
  const votes = getCurrentVotes(s);
  if (s.revealMode === 'manual' && !s.revealed) {
    const total = votes.reduce((a, v) => a + v, 0);
    stage.innerHTML = `
      <div class="hidden-note sans">
        <div class="hidden-note-main">Results are hidden from view.</div>
        <div>${total} vote${total === 1 ? '' : 's'} collected so far — hit "Reveal answers" when ready.</div>
      </div>`;
    return;
  }
  stage.innerHTML = '<div style="width:100%;max-width:600px;">' + mcResultsHtml(currentOptions(s), votes, currentCorrectIndex(s), true) + '</div>';
}

function mcResultsHtml(options, votes, correctIndex, revealCorrect) {
  const total = (votes || []).reduce((a, v) => a + v, 0);
  const hasCorrect = correctIndex !== null && correctIndex !== undefined;
  let html = '';
  if (revealCorrect && hasCorrect) {
    html += `<div class="answer-banner sans">✅ Correct answer: <strong>${escapeHtml(options[correctIndex])}</strong></div>`;
  }
  options.forEach((opt, i) => {
    const count = votes[i] || 0;
    const pct = total > 0 ? Math.round((count / total) * 100) : 0;
    const isCorrect = revealCorrect && hasCorrect && correctIndex === i;
    html += `
      <div class="mc-bar-row">
        <div class="mc-bar-label sans">
          <span>${escapeHtml(opt)} ${isCorrect ? '<span class="correct-badge">✓ correct</span>' : ''}</span>
          <span class="mc-bar-count">${count} · ${pct}%</span>
        </div>
        <div class="mc-bar-track">
          <div class="mc-bar-fill" style="width:${pct}%;background:${isCorrect ? '#2B6B5E' : colorFor(i)};"></div>
        </div>
      </div>`;
  });
  return html;
}

function renderBrainstormStage() {
  const stage = document.getElementById('cloud-stage');
  if (!stage) return;
  const s = state;
  const posts = s.posts || [];
  s.mergeSelectedIds = s.mergeSelectedIds || [];
  if (s.revealMode === 'manual' && !s.revealed) {
    stage.innerHTML = `
      <div class="hidden-note sans">
        <div class="hidden-note-main">Ideas are hidden from view.</div>
        <div>${posts.length} idea${posts.length === 1 ? '' : 's'} collected so far — hit "Reveal answers" when ready.</div>
      </div>`;
    return;
  }

  stage.innerHTML = brainstormBoardHtml(s.prompt, posts, {
    interactive: false, mergeMode: s.mergeMode, moveMode: s.moveMode, selectedIds: s.mergeSelectedIds
  });

  if (s.moveMode) {
    stage.querySelectorAll('.brainstorm-post').forEach(el => {
      setupPostDragging(el, el.dataset.id);
    });
  }

  if (s.mergeMode) {
    stage.querySelectorAll('.brainstorm-post[data-id], .brainstorm-chip[data-id]').forEach(el => {

function renderMergeControls(stage, posts) {
  const s = state;
  const selected = posts.filter(p => s.mergeSelectedIds.indexOf(p.id) !== -1);
  const container = document.createElement('div');

  if (s.mergePickText !== undefined && selected.length >= 2) {
    // confirmation panel: choose which wording to keep
    const panel = document.createElement('div');
    panel.className = 'merge-panel';
    panel.innerHTML = `
      <div class="field-label sans">Merge ${selected.length} ideas — which wording should we keep?</div>
      ${selected.map((p, i) => `
        <div class="merge-option-row sans ${s.mergePickText === p.text ? 'picked' : ''}" data-idx="${i}">
          ${escapeHtml(p.text)} <span style="color:var(--faint);font-weight:400;">(×${p.count || 1}, ❤️${p.likes})</span>
        </div>`).join('')}
      <div style="margin-top:0.6rem;">
        <label class="field-label sans">Or type a new combined label</label>
        <input type="text" id="merge-custom-text" placeholder="Custom wording (optional)" value="${escapeHtml(s.mergeCustomText || '')}" />
      </div>
      <div style="display:flex;gap:0.6rem;margin-top:1rem;">
        <button class="btn-nav sans" id="btn-merge-cancel" style="flex:1;">Cancel</button>
        <button class="btn-primary sans" id="btn-merge-confirm" style="flex:1;">Confirm merge</button>
      </div>`;
    container.appendChild(panel);
    stage.appendChild(container);

    panel.querySelectorAll('.merge-option-row').forEach((row, i) => {
      row.onclick = () => { s.mergePickText = selected[i].text; s.mergeCustomText = ''; renderTeacherStage(); };
    });
    document.getElementById('merge-custom-text').oninput = (e) => { s.mergeCustomText = e.target.value; };
    document.getElementById('btn-merge-cancel').onclick = () => { s.mergePickText = undefined; s.mergeCustomText = ''; renderTeacherStage(); };
    document.getElementById('btn-merge-confirm').onclick = () => confirmMerge(selected);
  } else {
    const bar = document.createElement('div');
    bar.className = 'merge-bar sans';
    bar.innerHTML = selected.length >= 2
      ? `<span>${selected.length} selected</span><button class="btn-primary sans" id="btn-merge-next">Merge these →</button>`
      : `<span style="color:var(--muted);">Tap 2 or more ideas to merge them</span>`;
    container.appendChild(bar);
    stage.appendChild(container);
    const nextBtn = document.getElementById('btn-merge-next');
    if (nextBtn) nextBtn.onclick = () => {
      s.mergePickText = selected[0].text;
      s.mergeCustomText = '';
      renderTeacherStage();
    };
  }
}

async function confirmMerge(selected) {
  const s = state;
  const finalText = (s.mergeCustomText && s.mergeCustomText.trim()) ? s.mergeCustomText.trim() : s.mergePickText;
  if (!finalText) return;
  for (let attempt = 0; attempt < 3; attempt++) {
    const raw = await kvGet('room:' + s.code + ':posts');
    let list = [];
    if (raw) { try { list = JSON.parse(raw); } catch (e) {} }
    const idsToMerge = selected.map(p => p.id);
    const toMerge = list.filter(p => idsToMerge.indexOf(p.id) !== -1);
    if (toMerge.length < 2) break;
    const mergedPost = {
      id: toMerge[0].id,
      text: finalText,
      likes: toMerge.reduce((a, p) => a + (p.likes || 0), 0),
      count: toMerge.reduce((a, p) => a + (p.count || 1), 0),
      ownerSessionIds: Array.from(new Set(toMerge.reduce((a, p) => a.concat(p.ownerSessionIds || []), [])))
    };
    const remaining = list.filter(p => idsToMerge.indexOf(p.id) === -1);
    remaining.push(mergedPost);
    const ok = await kvSet('room:' + s.code + ':posts', JSON.stringify(remaining));
    if (ok) { s.posts = remaining; break; }
    await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
  }
  s.mergeMode = false;
  s.mergeSelectedIds = [];
  s.mergePickText = undefined;
  s.mergeCustomText = '';
  renderTeacherStage();
  if (document.getElementById('submission-count')) document.getElementById('submission-count').textContent = teacherCountLabel(s);
}

function setupPostDragging(el, postId, spreadFactor) {
  spreadFactor = spreadFactor || 1;
  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let startLeft = 0;
  let startTop = 0;

  const onStart = (clientX, clientY) => {
    isDragging = true;
    startX = clientX;
    startY = clientY;
    startLeft = parseFloat(el.style.left) || 50;
    startTop = parseFloat(el.style.top) || 50;
    el.style.zIndex = 1000;
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  };

  const onMove = (clientX, clientY) => {
    if (!isDragging) return;
    const board = el.parentElement;
    const rect = board.getBoundingClientRect();
    const deltaX = clientX - startX;
    const deltaY = clientY - startY;
    const deltaLeft = (deltaX / rect.width) * 100;
    const deltaTop = (deltaY / rect.height) * 100;
    
    let newLeft = Math.max(5, Math.min(95, startLeft + deltaLeft));
    let newTop = Math.max(5, Math.min(95, startTop + deltaTop));
    
    el.style.left = newLeft + '%';
    el.style.top = newTop + '%';
  };

  const onMouseMove = (e) => {
    onMove(e.clientX, e.clientY);
  };

  const onTouchMove = (e) => {
    if (e.cancelable) e.preventDefault();
    if (e.touches.length > 0) {
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }
  };

  const onEnd = async () => {
    if (!isDragging) return;
    isDragging = false;
    el.style.zIndex = '';
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onEnd);

    // el.style.left/top are on-screen (density-transformed) coordinates.
    // Undo the same spread transform corkBoardHtml applied so we save the
    // note's real, untransformed board position — not where it happens to
    // render at whichever density is currently selected. Re-clamped since
    // inverting a display position pinned at the 5-95 drag boundary can
    // land well outside 0-100 once density has compressed it (spread < 1).
    const displayLeft = parseFloat(el.style.left);
    const displayTop = parseFloat(el.style.top);
    const finalLeft = Math.max(0, Math.min(100, 50 + (displayLeft - 50) / spreadFactor));
    const finalTop = Math.max(0, Math.min(100, 50 + (displayTop - 50) / spreadFactor));
    const post = state.posts.find(p => p.id === postId);
    if (post) {
      post.left = finalLeft;
      post.top = finalTop;
      await kvSet('room:' + state.code + ':posts', JSON.stringify(state.posts));
    }
  };

  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return; // Only left click
    onStart(e.clientX, e.clientY);
  });
  el.addEventListener('touchstart', (e) => {
    if (e.touches.length > 0) {
      onStart(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: true });
  el.addEventListener('dragstart', (e) => e.preventDefault());
}

function circlePositions(n) {
  const positions = [];
  if (n === 0) return positions;
  const radius = 38;
  for (let i = 0; i < n; i++) {
    const angle = (2 * Math.PI * i / n) - Math.PI / 2;
    positions.push({ left: 50 + radius * Math.cos(angle), top: 50 + radius * Math.sin(angle) });
  }
  return positions;
}

function postWeight(post) {
  return (post.likes || 0) + ((post.count || 1) - 1);
}

function brainstormBoardHtml(prompt, posts, opts) {
  opts = opts || {};
  const interactive = !!opts.interactive;
  const mergeMode = !!opts.mergeMode;
  const mySessionId = opts.mySessionId;
  const likedPostIds = opts.likedPostIds || [];
  const selectedIds = opts.selectedIds || [];

  if (!posts || posts.length === 0) {
    return `
      <div class="brainstorm-board">
        <div class="brainstorm-hub"><div class="brainstorm-hub-text">${escapeHtml(prompt)}</div></div>
      </div>
      <div class="hidden-note sans" style="margin-top:1rem;">No ideas yet — waiting for the first post…</div>`;
  }

  const sorted = posts.slice().sort((a, b) => postWeight(b) - postWeight(a));
  const top = sorted.slice(0, 8);
  const rest = sorted.slice(8);
  const maxW = postWeight(top[0]);
  const minW = postWeight(top[top.length - 1]);
  const positions = circlePositions(top.length);

  function postInner(post, small) {
    const likesEnabled = (opts.likesEnabled !== undefined) ? opts.likesEnabled : true;
    const canLike = interactive && !mergeMode && likesEnabled && (post.ownerSessionIds || []).indexOf(mySessionId) === -1 && likedPostIds.indexOf(post.id) === -1;
    const countBadge = (post.count || 1) > 1 ? `<span class="brainstorm-count-badge" title="${post.count} people wrote this">×${post.count}</span>` : '';
    const likeEl = mergeMode
      ? ''
      : (interactive
          ? `<button class="${small ? 'brainstorm-like-btn-sm' : 'brainstorm-like-btn'}" data-id="${escapeHtml(post.id)}" ${canLike ? '' : 'disabled'}>❤️ ${post.likes}</button>`
          : `<${small ? 'span' : 'div'} class="${small ? 'brainstorm-like-count-sm' : 'brainstorm-like-count'}">❤️ ${post.likes}</${small ? 'span' : 'div'}>`);
    return { countBadge, likeEl, canLike };
  }

  let html = '<div class="brainstorm-board">';
  html += '<div class="brainstorm-hub"><div class="brainstorm-hub-text">' + escapeHtml(prompt) + '</div></div>';
  top.forEach((post, i) => {
    const pos = positions[i];
    const leftVal = (post.left !== undefined) ? post.left : pos.left;
    const topVal = (post.top !== undefined) ? post.top : pos.top;
    const scale = maxW === minW ? 1 : (0.85 + 0.5 * ((postWeight(post) - minW) / (maxW - minW)));
    const { countBadge, likeEl } = postInner(post, false);
    const isSelected = selectedIds.indexOf(post.id) !== -1;
    html += `<div class="brainstorm-post ${mergeMode ? 'mergeable' : ''} ${opts.moveMode ? 'movable' : ''} ${isSelected ? 'merge-selected' : ''}" data-id="${escapeHtml(post.id)}" style="left:${leftVal}%;top:${topVal}%;transform:translate(-50%,-50%) scale(${scale.toFixed(2)});">
      ${mergeMode ? `<span class="merge-tick-box">${isSelected ? '✓' : ''}</span>` : ''}
      <div class="brainstorm-post-text">${escapeHtml(post.text)} ${countBadge}</div>
      ${likeEl}
    </div>`;
  });
  html += '</div>';

  if (rest.length > 0) {
    html += '<div class="brainstorm-more-list">';
    rest.forEach(post => {
      const { countBadge, likeEl } = postInner(post, true);
      const isSelected = selectedIds.indexOf(post.id) !== -1;
      html += `<div class="brainstorm-chip ${mergeMode ? 'mergeable' : ''} ${isSelected ? 'merge-selected' : ''}" data-id="${escapeHtml(post.id)}">
        ${mergeMode ? `<span class="merge-tick-box">${isSelected ? '✓' : ''}</span>` : ''}
        <span>${escapeHtml(post.text)} ${countBadge}</span>
        ${likeEl}
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function normalizeBrainstorm(text) {
  return text.trim().replace(/\s+/g, ' ').slice(0, 80);
}

function stickyFontSize(text, hasImage) {
  const len = (text || '').length;
  const steps = hasImage
    ? [[15, 1.1], [30, 0.92], [50, 0.8], [80, 0.7], [Infinity, 0.62]]
    : [[15, 1.6], [30, 1.3], [50, 1.05], [80, 0.88], [Infinity, 0.72]];
  for (const [limit, size] of steps) {
    if (len <= limit) return size;
  }
}

// Sticky board density: a 0 (Sparse) .. 1 (Dense) slider value maps to a
// note-size multiplier and a position-spread multiplier. 0.5 (the default
// for rooms that never touched the slider) maps to 1 for both, so density
// is purely additive — it never changes how an untouched room renders.
function stickyDensityFactors(density) {
  const d = (density === undefined || density === null) ? 0.5 : density;
  return {
    scale: 1.3 - 0.6 * d,  // 1.3 at Sparse, 1.0 at the midpoint, 0.7 at Dense
    spread: 1.4 - 0.8 * d  // 1.4 at Sparse, 1.0 at the midpoint, 0.6 at Dense
  };
}

// Transforms one stored coordinate (0-100, as saved in post.left/post.top)
// around the board's centre (50) by the current spread factor, for display
// only — the stored value in the database never changes just because the
// density slider moved. Clamped so a note can't visually escape the board.
function applyDensitySpread(pos, spread) {
  return Math.max(4, Math.min(96, 50 + (pos - 50) * spread));
}

function corkBoardHtml(prompt, posts, opts) {
  opts = opts || {};
  const interactive = !!opts.interactive;
  const mergeMode = !!opts.mergeMode;
  const mySessionId = opts.mySessionId;
  const likedPostIds = opts.likedPostIds || [];
  const selectedIds = opts.selectedIds || [];
  const likesEnabled = (opts.likesEnabled !== undefined) ? opts.likesEnabled : true;
  const { scale, spread } = stickyDensityFactors(opts.density);

  if (!posts || posts.length === 0) {
    return `
      <div class="cork-board" style="display:flex;align-items:center;justify-content:center;min-height:480px;">
        <div class="sans" style="color:#5C4033;font-weight:700;font-size:1.1rem;text-align:center;">No pinned cards yet — waiting for posts…</div>
      </div>`;
  }

  let html = `<div class="cork-board" style="--note-scale:${scale};">`;
  posts.forEach(post => {
    const storedLeft = (post.left !== undefined) ? post.left : 50;
    const storedTop = (post.top !== undefined) ? post.top : 50;
    const leftVal = applyDensitySpread(storedLeft, spread);
    const topVal = applyDensitySpread(storedTop, spread);
    const angle = post.angle || 0;
    const color = sanitizeColor(post.color);
    const textHtml = escapeHtml(post.text);
    const safeImageSrc = sanitizeImageSrc(post.image);
    const imgHtml = safeImageSrc ? `<img src="${safeImageSrc}" class="sticky-note-img" draggable="false" />` : '';
    const countBadge = (post.count || 1) > 1 ? `<span class="brainstorm-count-badge" title="${post.count} people wrote this">×${post.count}</span>` : '';

    const canLike = interactive && !mergeMode && likesEnabled && (post.ownerSessionIds || []).indexOf(mySessionId) === -1 && likedPostIds.indexOf(post.id) === -1;
    const isSelected = selectedIds.indexOf(post.id) !== -1;
    
    const likeEl = mergeMode
      ? ''
      : (interactive
          ? `<button class="brainstorm-like-btn-sm" data-id="${escapeHtml(post.id)}" ${canLike ? '' : 'disabled'} style="align-self:flex-start;margin-top:0.3rem;">❤️ ${post.likes || 0}</button>`
          : `<div class="brainstorm-like-count-sm" style="align-self:flex-start;margin-top:0.3rem;">❤️ ${post.likes || 0}</div>`);
          
    html += `
      <div class="sticky-note ${opts.moveMode ? 'movable' : ''} ${mergeMode ? 'mergeable' : ''} ${isSelected ? 'merge-selected' : ''}" data-id="${escapeHtml(post.id)}" style="left:${leftVal}%;top:${topVal}%;transform:translate(-50%,-50%) rotate(${angle}deg);background-color:${color};">
        <div class="pushpin"></div>
        ${opts.isTeacher ? `
          <div class="note-actions">
            <button class="note-action-btn btn-edit sticky-edit-btn" title="Edit text" data-id="${escapeHtml(post.id)}">✏️</button>
            <button class="note-action-btn btn-delete sticky-delete-btn" title="Delete note" data-id="${escapeHtml(post.id)}">✕</button>
          </div>
        ` : ''}
        ${mergeMode ? `<span class="merge-tick-box" style="position:absolute;bottom:4px;right:4px;margin:0;">${isSelected ? '✓' : ''}</span>` : ''}
        <div class="sticky-note-text" style="${safeImageSrc ? 'max-height:42%' : 'max-height:85%'} font-size:${stickyFontSize(post.text, !!safeImageSrc)}rem;">${textHtml} ${countBadge}</div>
        ${imgHtml}
        ${likeEl}
      </div>`;
  });
  html += '</div>';
  return html;
}

window.deleteSticky = async (id) => {
  if (!confirm("Are you sure you want to delete this pinned card?")) return;
  state.posts = state.posts.filter(p => p.id !== id);
  const ok = await kvSet('room:' + state.code + ':posts', JSON.stringify(state.posts));
  if (ok) render();
};

window.editSticky = async (id) => {
  const post = state.posts.find(p => p.id === id);
  if (!post) return;
  const newText = prompt("Edit pinned card text:", post.text);
  if (newText === null) return;
  post.text = normalizeBrainstorm(newText);
  const ok = await kvSet('room:' + state.code + ':posts', JSON.stringify(state.posts));
  if (ok) render();
};

function renderCloudStage() {
  const stage = document.getElementById('cloud-stage');
  if (!stage) return;
  const s = state;
  if (s.revealMode === 'manual' && !s.revealed) {
    stage.innerHTML = `
      <div class="hidden-note sans">
        <div class="hidden-note-main">Answers are hidden from view.</div>
        <div>${totalCount(s.words)} collected so far — hit "Reveal answers" when ready.</div>
      </div>`;
    return;
  }
  stage.innerHTML = cloudHtml(s.words, false);
}

function cloudHtml(words, compact) {
  if (!words || words.length === 0) {
    return '<div class="hidden-note sans">No answers yet — waiting for the first submission…</div>';
  }
  const max = Math.max(...words.map(w => w.count));
  const min = Math.min(...words.map(w => w.count));
  const sorted = [...words].sort((a, b) => b.count - a.count);
  let html = '<div style="display:flex;flex-wrap:wrap;gap:0.4rem 1rem;justify-content:center;align-items:center;max-width:' + (compact ? '620px' : '900px') + ';margin:0 auto;">';
  sorted.forEach((w, i) => {
    const scale = max === min ? 0.6 : (w.count - min) / (max - min);
    const size = compact ? (0.9 + scale * 1.6) : (1.1 + scale * 2.8);
    html += `<span class="cloud-word" style="--size-rem:${size}rem;font-size:${size}rem;color:${colorFor(i)};" title="${w.count} submission${w.count > 1 ? 's' : ''}">${escapeHtml(w.text)}</span>`;
  });
  html += '</div>';
  return html;
}

// ---------------------------------------------------------------------------
// Quiz live play (student side).
// ---------------------------------------------------------------------------

function ordinal(n) {
  const rem100 = n % 100;
  if (rem100 >= 11 && rem100 <= 13) return n + 'th';
  switch (n % 10) {
    case 1: return n + 'st';
    case 2: return n + 'nd';
    case 3: return n + 'rd';
    default: return n + 'th';
  }
}

// A tiny deterministic PRNG (mulberry32) seeded from a string hash, used to
// shuffle each student's answer order per question. Not cryptographic —
// same posture as sessionId elsewhere in this app (spoofable, but enough to
// stop "psst, it's B" working across the room, since everyone sees a
// different order).
function seededShuffle(array, seedStr) {
  let seed = 0;
  for (let i = 0; i < seedStr.length; i++) seed = (Math.imul(seed, 31) + seedStr.charCodeAt(i)) | 0;
  const rng = () => {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
  const arr = array.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Returns the canonical option indices in this student's display order.
// Submissions always send the canonical index, never the display slot, so
// the server-side answer key stays meaningful regardless of shuffle.
function quizAnswerOrder(s) {
  const question = s.questions[s.currentIndex];
  const base = question.options.map((_, i) => i);
  if (!s.shuffleAnswers) return base;
  return seededShuffle(base, s.code + '|' + (s.studentName || '') + '|' + s.currentIndex);
}

function renderStudentRoomQuiz() {

  renderQuizStudentStage();

  const tick = async () => {
    const cfgRaw = await kvGet('room:' + s.code + ':config');
    if (cfgRaw) {

        const indexChanged = cfg.currentIndex !== s.currentIndex;
        s.phase = cfg.phase;
        s.currentIndex = cfg.currentIndex;
        s.phaseStartedAt = cfg.phaseStartedAt;
        s.revealStats = cfg.revealStats || null;
        s.leaderboard = cfg.leaderboard || null;
        s.climber = cfg.climber || null;

      } catch (e) {}
    }
    render();
  };
  // See the matching comment in renderQuizTeacherLive — tick() calls the
  // top-level render(), which re-enters this function every cycle, so the
  // (re)subscribe has to be guarded or it stacks up channels/intervals.
  if (state.lastListenerCode !== s.code || state.lastListenerScreen !== 'studentRoomQuiz') {
    stopPolling();
    state.lastListenerCode = s.code;
    state.lastListenerScreen = 'studentRoomQuiz';
    pollTimer = setupRealtimeListener(s.code, tick);

}

function renderQuizStudentStage() {
  const stage = document.getElementById('quiz-student-stage');
  if (!stage) return;
  const s = state;
  if (s.phase === 'reveal') return renderQuizStudentReveal(stage);
  if (s.phase === 'leaderboard') return renderQuizStudentLeaderboard(stage);
  return renderQuizStudentAnswering(stage);
}

function renderQuizStudentAnswering(stage) {
  const s = state;
  const question = s.questions[s.currentIndex];
  const order = quizAnswerOrder(s);
  const remaining = quizTimeRemaining(s);
  const timedOut = s.timerSeconds > 0 && remaining !== null && remaining <= 0;
  const locked = s.hasAnsweredCurrent || timedOut;
  stage.innerHTML = `
    <div class="student-prompt" style="margin-bottom:0.2rem;">${escapeHtml(question.prompt)}</div>
    ${s.timerSeconds > 0 ? `<div class="quiz-timer-badge sans ${remaining !== null && remaining <= 5 ? 'low' : ''}" id="quiz-student-timer">${remaining !== null ? remaining : s.timerSeconds}s</div>` : ''}
    <div style="display:flex;flex-direction:column;gap:0.6rem;width:100%;" id="quiz-student-options"></div>
    <button class="btn-submit sans" id="btn-quiz-submit" style="width:100%;" disabled>${s.hasAnsweredCurrent ? 'Submitted' : 'Submit'}</button>
    <div class="flash-note sans show" id="quiz-status-note" style="height:auto;">${s.hasAnsweredCurrent ? 'Answer locked in — waiting for reveal…' : (s.quizSubmitError || (timedOut ? "Time's up!" : ''))}</div>`;
  renderQuizStudentOptions(order, question, locked);
  startQuizStudentTimerDisplay();
}

function renderQuizStudentOptions(order, question, locked) {
  const s = state;
  const wrap = document.getElementById('quiz-student-options');
  if (!wrap) return;
  wrap.innerHTML = order.map(canonicalIdx => `
    <button class="mc-vote-btn sans ${s.myAnswerIndex === canonicalIdx ? 'selected' : ''}"
      data-idx="${canonicalIdx}" ${locked ? 'disabled' : ''}>
      <span class="mc-vote-marker">${s.myAnswerIndex === canonicalIdx ? '✓' : ''}</span>
      <span>${escapeHtml(question.options[canonicalIdx])}</span>
    </button>`).join('');
  const submitBtn = document.getElementById('btn-quiz-submit');
  if (submitBtn) submitBtn.disabled = locked || s.myAnswerIndex === null || s.myAnswerIndex === undefined;
  if (locked) return;
  wrap.querySelectorAll('.mc-vote-btn').forEach(btn => {
    btn.onclick = () => {
      s.myAnswerIndex = parseInt(btn.dataset.idx, 10);
      renderQuizStudentOptions(order, question, locked);
    };
  });
  if (submitBtn) submitBtn.onclick = submitQuizAnswerFromStudent;
}

async function submitQuizAnswerFromStudent() {
  const s = state;
  if (s.myAnswerIndex === null || s.myAnswerIndex === undefined) return;
  const submitBtn = document.getElementById('btn-quiz-submit');
  if (submitBtn) submitBtn.disabled = true;
  const qIndex = s.currentIndex;
  s.quizSubmitError = null;

  let status = 'error';
  for (let attempt = 0; attempt < 3; attempt++) {
    status = await submitQuizAnswerRPC(s.code, s.studentName, qIndex, s.myAnswerIndex, s.mySessionId);
    if (status === 'ok' || isSoftFailStatus(status)) break;
    await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
  }

  // A realtime update for this very answer can land — and trigger its own
  // full re-render — before this request's response does, since it rides
  // an already-open connection while this is a fresh round trip. Re-render
  // from state instead of poking specific DOM nodes, so the result always
  // paints correctly regardless of what's currently in the DOM (or whether
  // the question/phase has already moved on, in which case do nothing).
  if (state.screen !== 'studentRoom' || state.type !== 'quiz' || state.currentIndex !== qIndex || state.phase !== 'answering') return;
  if (status === 'ok' || status === 'already_answered') {
    s.hasAnsweredCurrent = true;
  } else {
    s.quizSubmitError = submitStatusMessage(status);
  }
  renderQuizStudentStage();
}

function startQuizStudentTimerDisplay() {
  stopQuizCountdown();
  const s = state;
  if (!s.timerSeconds || s.phase !== 'answering' || s.hasAnsweredCurrent) return;
  quizCountdownHandle = setInterval(() => {
    const badge = document.getElementById('quiz-student-timer');
    if (!badge) { stopQuizCountdown(); return; }
    const remaining = quizTimeRemaining(s);
    badge.textContent = remaining + 's';
    badge.classList.toggle('low', remaining <= 5);
    if (remaining <= 0) {
      stopQuizCountdown();
      const submitBtn = document.getElementById('btn-quiz-submit');
      if (submitBtn) submitBtn.disabled = true;
      document.querySelectorAll('#quiz-student-options .mc-vote-btn').forEach(b => { b.disabled = true; });
      const note = document.getElementById('quiz-status-note');
      if (note && !s.hasAnsweredCurrent) note.textContent = "Time's up!";
    }
  }, 250);
}

async function renderQuizStudentReveal(stage) {
  const s = state;
  stopQuizCountdown();
  if (!s.myRevealResult) {
    stage.innerHTML = '<div class="hidden-note sans">Checking your answer…</div>';
    const qIndexAsked = s.currentIndex;
    const result = await getQuizRevealResultRPC(s.code, s.studentName, qIndexAsked, s.mySessionId);
    // The phase or question may have already moved on while this was in
    // flight — don't paint a stale result over whatever's showing now.
    if (state.screen !== 'studentRoom' || state.type !== 'quiz' || state.currentIndex !== qIndexAsked || state.phase !== 'reveal') return;
    s.myRevealResult = result || { unanswered: true };
    renderQuizStudentStage();
    return;
  }
  const r = s.myRevealResult;
  const question = s.questions[s.currentIndex];
  const correctIndex = s.revealStats ? s.revealStats.correctIndex : null;
  const correctText = (correctIndex !== null && correctIndex !== undefined) ? question.options[correctIndex] : '';
  if (r.unanswered || !r.perQuestion) {
    stage.innerHTML = `
      <div class="student-score-banner" style="box-shadow:6px 6px 0 var(--pink);">
        <div class="student-score-number" style="font-size:1.5rem;">⏱️ No answer</div>
        <div class="student-score-label sans">You didn't answer in time.</div>
      </div>
      ${correctText ? `<div class="footnote sans" style="color:var(--muted);margin-top:0.8rem;text-align:center;">Correct answer: <strong>${escapeHtml(correctText)}</strong></div>` : ''}`;
    return;
  }
  const pq = r.perQuestion;
  stage.innerHTML = `
    <div class="student-score-banner" style="box-shadow:6px 6px 0 ${pq.correct ? 'var(--green)' : 'var(--pink)'};">
      <div class="student-score-number">${pq.correct ? '✅ Correct!' : '❌ Not quite'}</div>
      <div class="student-score-label sans">${pq.correct ? '+' + pq.pointsEarned + ' pts' : (correctText ? 'Answer was: ' + escapeHtml(correctText) : '')}</div>
    </div>
    <div class="footnote sans" style="color:var(--muted);margin-top:0.8rem;text-align:center;">
      🔥 Streak: ${r.streak} · Total: ${r.totalScore} pts
    </div>`;
}

function renderQuizStudentLeaderboard(stage) {
  const s = state;
  stopQuizCountdown();
  const list = s.leaderboard || [];
  const myIdx = list.findIndex(r => r.name.trim().toLowerCase() === (s.studentName || '').trim().toLowerCase());
  if (myIdx === -1) {
    stage.innerHTML = '<div class="empty-results sans">We couldn\'t find your score yet — hang tight.</div>';
    return;
  }
  const me = list[myIdx];
  const above = myIdx > 0 ? list[myIdx - 1] : null;
  const gap = above ? Math.max(0, above.totalScore - me.totalScore) : 0;
  stage.innerHTML = `
    <div class="student-score-banner">
      <div class="student-score-number">#${myIdx + 1}</div>
      <div class="student-score-label sans">${me.totalScore} pts</div>
    </div>
    <div class="footnote sans" style="color:var(--muted);margin-top:0.8rem;text-align:center;">
      ${above ? `You're ${ordinal(myIdx + 1)} — ${gap} pts behind ${escapeHtml(above.name)}` : "You're in the lead! 🏆"}
    </div>`;
}

async function renderStudentRoomQuizFinished() {
  const s = state;
  stopPolling();
  stopQuizCountdown();
  app.innerHTML = `
    <div class="results-wrap">
      <div class="results-title display">Loading your results…</div>
    </div>`;
  const list = s.leaderboard || [];
  const myIdx = list.findIndex(r => r.name.trim().toLowerCase() === (s.studentName || '').trim().toLowerCase());
  const me = myIdx !== -1 ? list[myIdx] : null;
  const result = await getQuizRevealResultRPC(s.code, s.studentName, -1, s.mySessionId);
  const perQuestionAll = (result && result.perQuestionAll) || [];
  const answerKeyVisible = (result && result.answerKeyVisible) || [];
  const wrongOnes = s.questions
    .map((q, i) => ({ q, i, pq: perQuestionAll[i], correctIdx: answerKeyVisible[i] }))
    .filter(x => x.pq && x.pq.correct === false);

  const wrap = document.querySelector('.results-wrap');
  wrap.innerHTML = `
    <div class="results-title display">🏁 Quiz over!</div>
    <div class="student-score-banner">
      <div class="student-score-number">${me ? me.totalScore : (result ? result.totalScore || 0 : 0)}</div>
      <div class="student-score-label sans">points${myIdx !== -1 ? ' · #' + (myIdx + 1) + ' place' : ''}</div>
    </div>
    ${wrongOnes.length === 0 ? `
      <div class="perfect-score-banner sans">🎉 Perfect run — every answer scored!</div>
    ` : `
      <div class="revision-heading">Worth another look</div>
      <div class="revision-list">
        ${wrongOnes.map(({ q, pq, correctIdx }) => `
          <div class="revision-card">
            <div class="revision-question">${escapeHtml(q.prompt)}</div>
            <div class="revision-your-answer">Your answer: ${escapeHtml(typeof pq.selected === 'number' ? (q.options[pq.selected] || '') : '(no answer)')}</div>
            ${(correctIdx !== null && correctIdx !== undefined) ? `<div class="revision-correct-answer">Correct answer: ${escapeHtml(q.options[correctIdx] || '')}</div>` : ''}
          </div>`).join('')}
      </div>
    `}
    <div class="results-actions">
      <button class="btn-outline sans" id="btn-leave-quiz-final">🔁 Join a different bower</button>
    </div>`;
  const leaveBtn = document.getElementById('btn-leave-quiz-final');
  if (leaveBtn) leaveBtn.onclick = () => { state = { screen: 'landing' }; render(); };
}

function renderStudentRoomRanking() {
  const s = state;
  if (!s.mySessionId) s.mySessionId = Math.random().toString(36).slice(2) + Date.now().toString(36);
  if (!s.rankingOrder) {
    s.rankingOrder = [...(s.options || [])];
  }

function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX_WIDTH = 300;
      const MAX_HEIGHT = 300;
      let width = img.width;
      let height = img.height;
      
      if (width > height) {
        if (width > MAX_WIDTH) {
          height *= MAX_WIDTH / width;
          width = MAX_WIDTH;
        }
      } else {
        if (height > MAX_HEIGHT) {
          width *= MAX_HEIGHT / height;
          height = MAX_HEIGHT;
        }
      }
      
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      callback(dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
