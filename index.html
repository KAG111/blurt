<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blurt — get the whole room talking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --stage: #2B2145;
    --stage-dark: #1A1428;
    --paper: #FFFFFF;
    --paper-soft: #FBF9FF;
    --ink: #14111F;
    --muted: #6B6480;
    --faint: #9992AD;
    --line: #E4DFF2;
    --panel-line: #E4DFF2;
    --pink: #FF3E7F;
    --yellow: #FFD23F;
    --blue: #3AA0FF;
    --green: #21C48A;
    --shadow: #14111F;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: var(--stage);
    color: #F5F2FF;
    font-family: 'Inter', -apple-system, sans-serif;
  }
  .sans { font-family: 'Inter', -apple-system, sans-serif; }
  .display { font-family: 'Space Grotesk', 'Inter', sans-serif; }
  .mono { font-family: 'Space Mono', 'Courier New', monospace; }
  button { cursor: pointer; font-family: inherit; }
  input, textarea { font-family: 'Inter', sans-serif; }
  ::selection { background: var(--yellow); color: var(--ink); }

  #app {
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ---------- brand chrome shared across screens ---------- */
  .brand-bar {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 1.1rem 0 0; flex-shrink: 0;
  }
  .brand-mark {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.3rem;
    color: #fff; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.4rem;
  }
  .brand-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--pink); display: inline-block; }

  .screen {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 2rem; text-align: center; gap: 1.5rem;
    position: relative;
  }
  .back-btn {
    position: absolute; top: 1.5rem; left: 1.5rem; background: none; border: none;
    color: rgba(255,255,255,0.65); font-size: 0.9rem; font-weight: 600;
  }
  .back-btn:hover { color: #fff; }

  /* Hero / landing — soundwave motif flanking the wordmark */
  .hero-stage {
    display: flex; align-items: center; justify-content: center; gap: 1.5rem;
    flex-wrap: wrap;
  }
  .wave-row { display: flex; align-items: center; gap: 5px; }
  .wave-bar {
    width: 7px; border-radius: 4px; background: var(--pink);
    animation: waveBounce 1.4s ease-in-out infinite;
  }
  .wave-bar:nth-child(odd) { background: var(--yellow); }
  @keyframes waveBounce {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .wave-bar { animation: none; transform: scaleY(0.75); }
  }
  .title-xl {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: clamp(3rem, 11vw, 5.5rem); letter-spacing: -0.03em; line-height: 0.95;
    color: #fff;
  }
  .subtitle {
    margin-top: 1rem; font-size: 1.15rem; color: rgba(255,255,255,0.75); font-weight: 500;
    position: relative; z-index: 1;
  }
  .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; position: relative; z-index: 1; }

  /* Sticker-style buttons: chunky border + hard offset shadow, no blur */
  .btn-primary {
    background: var(--pink); color: #fff; border: 2.5px solid var(--ink);
    padding: 0.95rem 1.9rem; border-radius: 10px; font-size: 1.05rem; font-weight: 700;
    box-shadow: 4px 4px 0 var(--shadow); transition: transform 0.12s, box-shadow 0.12s;
    font-family: 'Inter', sans-serif;
  }
  .btn-primary:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--shadow); }
  .btn-primary:active { transform: translate(1px, 1px); box-shadow: 2px 2px 0 var(--shadow); }
  .btn-primary:disabled {
    background: #D8D3E8; color: #9992AD; box-shadow: 4px 4px 0 rgba(27,23,48,0.25);
    cursor: default; transform: none;
  }
  .btn-outline {
    background: #fff; color: var(--ink); border: 2.5px solid var(--ink);
    padding: 0.95rem 1.9rem; border-radius: 10px; font-size: 1.05rem; font-weight: 700;
    box-shadow: 4px 4px 0 var(--yellow); transition: transform 0.12s, box-shadow 0.12s;
  }
  .btn-outline:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--yellow); }
  .btn-outline:active { transform: translate(1px, 1px); box-shadow: 2px 2px 0 var(--yellow); }

  .footnote { font-size: 0.85rem; color: rgba(255,255,255,0.55); max-width: 380px; position: relative; z-index: 1; }

  /* Card surfaces (used inside screens that need a light panel over the dark stage) */
  .field-wrap {
    width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 1.3rem; text-align: left;
    background: var(--paper); border: 2.5px solid var(--ink); border-radius: 16px;
    padding: 2rem; box-shadow: 6px 6px 0 rgba(0,0,0,0.35); color: var(--ink);
  }
  .field-label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  textarea, input[type=text] {
    width: 100%; padding: 0.85rem; border-radius: 8px; border: 2px solid var(--line);
    font-size: 1rem; resize: vertical; box-sizing: border-box; background: var(--paper-soft);
    color: var(--ink); transition: border-color 0.15s;
  }
  textarea:focus, input[type=text]:focus { outline: none; border-color: var(--pink); }
  .toggle-row { display: flex; gap: 0.6rem; }
  .toggle-btn {
    flex: 1; padding: 0.7rem 0.8rem; border-radius: 8px; font-size: 0.88rem; font-weight: 700;
    border: 2px solid var(--line); background: var(--paper-soft); color: var(--muted);
  }
  .toggle-btn.active { border-color: var(--ink); background: var(--yellow); color: var(--ink); }

  /* Teacher live view */
  .live-wrap { flex: 1; display: flex; flex-direction: column; padding: 1.5rem 1.5rem 2.5rem; text-align: left; width: 100%; max-width: 980px; margin: 0 auto; }
  .live-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 1.25rem; margin-bottom: 0.5rem;
  }
  .room-badge {
    background: var(--ink); color: #fff; padding: 0.7rem 1.3rem;
    border-radius: 10px; text-align: center; border: 2.5px solid var(--ink);
    box-shadow: 4px 4px 0 var(--pink);
  }
  .room-badge-label { font-family: 'Inter', sans-serif; font-size: 0.68rem; letter-spacing: 0.12em; opacity: 0.75; font-weight: 700; }
  .room-badge-code { font-family: 'Space Mono', monospace; font-size: 1.9rem; font-weight: 700; letter-spacing: 0.15em; color: var(--yellow); }
  .qr-panel {
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    background: #fff; border: 2.5px solid var(--ink); border-radius: 12px;
    padding: 1rem; max-width: 220px; box-shadow: 4px 4px 0 var(--blue);
  }
  .qr-caption { font-size: 0.7rem; color: var(--muted); text-align: center; font-weight: 600; }
  .prompt-label {
    margin-top: 0.75rem; margin-bottom: 1.25rem; font-size: 1.5rem; font-weight: 700; max-width: 700px;
    font-family: 'Space Grotesk', sans-serif; color: #fff;
  }
  .controls-row { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .btn-reveal { background: var(--green); color: #1B1730; border: 2px solid var(--ink); padding: 0.65rem 1.3rem; border-radius: 8px; font-weight: 700; box-shadow: 3px 3px 0 var(--ink); }
  .btn-hide { background: var(--pink); color: #fff; border: 2px solid var(--ink); padding: 0.65rem 1.3rem; border-radius: 8px; font-weight: 700; box-shadow: 3px 3px 0 var(--ink); }
  .btn-clear { background: transparent; color: rgba(255,255,255,0.6); border: 2px solid rgba(255,255,255,0.3); padding: 0.65rem 1.1rem; border-radius: 8px; font-weight: 600; }
  .btn-clear:hover { color: #fff; border-color: rgba(255,255,255,0.6); }
  .count-note { font-size: 0.9rem; color: rgba(255,255,255,0.6); font-weight: 600; }
  .cloud-stage {
    flex: 1; display: flex; align-items: center; justify-content: center; min-height: 300px;
    background: var(--paper); border: 2.5px solid var(--ink); border-radius: 16px;
    padding: 2rem; box-shadow: 6px 6px 0 rgba(0,0,0,0.35);
  }
  .hidden-note { text-align: center; color: var(--muted); }
  .hidden-note-main { font-size: 1.15rem; margin-bottom: 0.5rem; font-weight: 700; color: var(--ink); }

  .room-code-input {
    font-family: 'Space Mono', monospace; font-size: 2rem; letter-spacing: 0.25em; text-align: center;
    padding: 0.7rem 1rem; border-radius: 10px; border: 2.5px solid var(--ink);
    width: 280px; text-transform: uppercase; background: #fff; color: var(--ink);
  }
  .error-text { color: var(--pink); font-size: 0.9rem; font-weight: 600; background: #fff; padding: 0.4rem 0.8rem; border-radius: 6px; }

  .student-wrap { flex: 1; display: flex; flex-direction: column; padding: 2rem 1.5rem; align-items: center; gap: 1.5rem; }
  .student-header { text-align: center; max-width: 480px; }
  .student-room-code { font-size: 0.85rem; color: rgba(255,255,255,0.6); font-weight: 700; letter-spacing: 0.03em; }
  .student-prompt { font-size: 1.6rem; font-weight: 700; margin-top: 0.4rem; color: #fff; font-family: 'Space Grotesk', sans-serif; }
  .answer-form { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; max-width: 400px; }
  .answer-input {
    font-size: 1.2rem; padding: 0.85rem 1rem; border-radius: 10px;
    border: 2.5px solid var(--line); text-align: center; transition: border-color 0.2s; background: #fff; color: var(--ink);
  }
  .answer-input.flash { border-color: var(--green); }
  .btn-submit { background: var(--green); color: #1B1730; border: 2.5px solid var(--ink); padding: 0.85rem; border-radius: 10px; font-size: 1.05rem; font-weight: 700; box-shadow: 4px 4px 0 var(--ink); transition: transform 0.12s, box-shadow 0.12s; }
  .btn-submit:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  .btn-submit:disabled, .btn-primary:disabled { background: #D8D3E8; color: #9992AD; box-shadow: 4px 4px 0 rgba(0,0,0,0.15); transform: none; }
  .flash-note { text-align: center; font-size: 0.85rem; color: transparent; transition: color 0.2s; height: 1rem; font-weight: 700; }
  .flash-note.show { color: var(--green); }

  .cloud-word { display: inline-block; margin: 0.25rem 0.65rem; font-weight: 700; line-height: 1.1; font-family: 'Space Grotesk', sans-serif; animation: floatIn 0.4s ease-out; }
  @keyframes floatIn { from { opacity: 0; transform: translateY(10px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .spinner-note { font-size: 0.85rem; color: var(--faint); }

  .activity-grid { display: flex; gap: 1.1rem; flex-wrap: wrap; justify-content: center; max-width: 780px; }
  .activity-card {
    width: 220px; padding: 1.6rem 1.3rem; border-radius: 14px; border: 2.5px solid var(--ink);
    background: #fff; text-align: left; display: flex; flex-direction: column; gap: 0.5rem;
    box-shadow: 5px 5px 0 var(--ink); transition: transform 0.12s, box-shadow 0.12s; color: var(--ink);
  }
  .activity-card:nth-of-type(1) { box-shadow: 5px 5px 0 var(--blue); }
  .activity-card:nth-of-type(2) { box-shadow: 5px 5px 0 var(--pink); }
  .activity-card:nth-of-type(3) { box-shadow: 5px 5px 0 var(--yellow); }
  .activity-card:hover { transform: translate(-3px, -3px); }
  .activity-card:nth-of-type(1):hover { box-shadow: 8px 8px 0 var(--blue); }
  .activity-card:nth-of-type(2):hover { box-shadow: 8px 8px 0 var(--pink); }
  .activity-card:nth-of-type(3):hover { box-shadow: 8px 8px 0 var(--yellow); }
  .activity-card-title { font-size: 1.25rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .activity-card-desc { font-size: 0.87rem; color: var(--muted); line-height: 1.45; }

  .option-row { display: flex; gap: 0.5rem; align-items: center; }
  .option-row input[type=text] { flex: 1; }
  .option-remove { background: none; border: none; color: var(--faint); font-size: 1.2rem; padding: 0 0.3rem; }
  .option-remove:hover { color: var(--pink); }
  .btn-add-option { background: var(--paper-soft); border: 2px dashed var(--line); color: var(--muted); padding: 0.6rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; }
  .btn-add-option:hover { border-color: var(--pink); color: var(--pink); }
  .checkbox-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--muted); font-weight: 500; }
  .correct-marker-row { display: flex; flex-direction: column; gap: 0.4rem; }
  .correct-option-choice {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0.75rem; border-radius: 8px;
    border: 2px solid var(--line); font-size: 0.9rem; cursor: pointer; font-weight: 500;
  }
  .correct-option-choice.marked { border-color: var(--green); background: #E7FBF3; font-weight: 700; }
  .correct-tick-box {
    width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--line); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff;
  }
  .correct-option-choice.marked .correct-tick-box { border-color: var(--green); background: var(--green); }

  .mc-vote-btn {
    width: 100%; text-align: left; padding: 0.95rem 1.2rem; border-radius: 10px;
    border: 2.5px solid var(--line); background: #fff; font-size: 1.05rem; font-weight: 600;
    display: flex; align-items: center; gap: 0.7rem; box-shadow: 3px 3px 0 rgba(27,23,48,0.12);
    transition: transform 0.1s, box-shadow 0.1s; color: var(--ink);
  }
  .mc-vote-btn:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 rgba(27,23,48,0.2); }
  .mc-vote-btn.selected { border-color: var(--green); background: #E7FBF3; box-shadow: 3px 3px 0 var(--green); }
  .mc-vote-btn:disabled { opacity: 0.75; cursor: default; }
  .mc-vote-marker {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700;
  }
  .mc-vote-btn.selected .mc-vote-marker { border-color: var(--green); background: var(--green); color: #fff; }
  .mc-vote-btn.multi .mc-vote-marker { border-radius: 6px; }

  .mc-bar-row { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; text-align: left; }
  .mc-bar-label { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 700; color: var(--ink); }
  .mc-bar-track { background: var(--paper-soft); border: 2px solid var(--line); border-radius: 8px; height: 30px; overflow: hidden; }
  .mc-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; display: flex; align-items: center; }
  .mc-bar-count { font-size: 0.8rem; color: var(--faint); font-weight: 600; }
  .correct-badge { color: var(--green); font-size: 0.8rem; font-weight: 700; }
  .answer-banner {
    background: #E7FBF3; border: 2.5px solid var(--green); border-radius: 10px;
    padding: 0.9rem 1.2rem; font-size: 1.05rem; color: var(--ink); margin-bottom: 1.2rem; text-align: center;
  }

  .stepper-row { display: flex; align-items: center; gap: 1.2rem; justify-content: center; }
  .stepper-btn {
    width: 42px; height: 42px; border-radius: 50%; border: 2.5px solid var(--ink);
    background: var(--yellow); font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .stepper-value { font-size: 2rem; font-weight: 700; min-width: 3rem; text-align: center; font-family: 'Space Mono', monospace; }
  .poll-progress { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .poll-nav-row { display: flex; gap: 0.6rem; align-items: center; }
  .btn-nav { background: #fff; border: 2px solid var(--ink); color: var(--ink); padding: 0.6rem 1rem; border-radius: 8px; font-weight: 700; box-shadow: 2px 2px 0 var(--yellow); }
  .btn-nav:disabled { opacity: 0.4; box-shadow: none; }
  .poll-question-counter { font-size: 0.95rem; font-weight: 700; color: var(--muted); min-width: 90px; text-align: center; }

  .results-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 2.5rem 1.5rem; gap: 2rem; width: 100%; max-width: 800px; margin: 0 auto; }
  .results-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 2rem; color: #fff; text-align: center; }
  .podium-row { display: flex; align-items: flex-end; gap: 1rem; justify-content: center; width: 100%; }
  .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
  .podium-medal { font-size: 2rem; }
  .podium-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.05rem; color: #fff; max-width: 140px; text-align: center; word-break: break-word; }
  .podium-score { font-size: 0.85rem; color: rgba(255,255,255,0.7); font-weight: 600; }
  .podium-bar {
    width: 120px; border-radius: 10px 10px 0 0; border: 2.5px solid var(--ink);
    display: flex; align-items: flex-start; justify-content: center; padding-top: 0.6rem;
    font-family: 'Space Mono', monospace; font-weight: 700; color: var(--ink);
  }
  .podium-bar.first { height: 130px; background: var(--yellow); }
  .podium-bar.second { height: 95px; background: #E0DCF5; }
  .podium-bar.third { height: 70px; background: #FFC7DA; }
  .leaderboard-list { width: 100%; max-width: 560px; background: #fff; border: 2.5px solid var(--ink); border-radius: 14px; padding: 1.2rem 1.5rem; box-shadow: 6px 6px 0 rgba(0,0,0,0.35); }
  .leaderboard-row { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1.5px solid var(--line); font-size: 0.95rem; color: var(--ink); font-weight: 600; }
  .leaderboard-row:last-child { border-bottom: none; }
  .leaderboard-rank { color: var(--faint); font-weight: 700; width: 2rem; }
  .results-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .empty-results { text-align: center; color: rgba(255,255,255,0.7); font-size: 1rem; }

  .student-score-banner {
    background: #fff; border: 2.5px solid var(--ink); border-radius: 14px; padding: 1.5rem 2rem;
    text-align: center; box-shadow: 6px 6px 0 var(--yellow); width: 100%; max-width: 400px;
  }
  .student-score-number { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 2.4rem; color: var(--ink); }
  .student-score-label { font-size: 0.9rem; color: var(--muted); font-weight: 600; }
  .revision-list { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 0.9rem; }
  .revision-card {
    background: #fff; border: 2.5px solid var(--pink); border-radius: 12px; padding: 1.1rem 1.3rem;
    text-align: left; box-shadow: 4px 4px 0 rgba(0,0,0,0.25);
  }
  .revision-question { font-weight: 700; color: var(--ink); margin-bottom: 0.5rem; font-family: 'Space Grotesk', sans-serif; }
  .revision-your-answer { color: var(--pink); font-size: 0.9rem; font-weight: 600; margin-bottom: 0.2rem; }
  .revision-correct-answer { color: var(--green); font-size: 0.9rem; font-weight: 600; }
  .revision-heading { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: #fff; font-size: 1.2rem; margin-top: 0.5rem; }
  .perfect-score-banner { font-size: 1.15rem; color: var(--green); font-weight: 700; background: #fff; border: 2.5px solid var(--green); border-radius: 12px; padding: 1rem 1.5rem; }

  .roster-list { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 0.6rem; }
  .roster-row {
    display: flex; justify-content: space-between; align-items: center; background: #fff;
    border: 2px solid var(--ink); border-radius: 10px; padding: 0.7rem 1.1rem; box-shadow: 3px 3px 0 var(--blue);
  }
  .roster-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--ink); }
  .roster-remove { background: none; border: none; color: var(--faint); font-size: 0.85rem; font-weight: 600; }
  .roster-remove:hover { color: var(--pink); }
  .roster-empty { color: rgba(255,255,255,0.6); font-size: 0.95rem; text-align: center; }
  .nickname-badge { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.3rem; color: #fff; }

  .brainstorm-board { position: relative; width: 100%; max-width: 600px; aspect-ratio: 1 / 1; margin: 0 auto; }
  .brainstorm-hub {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 46%; aspect-ratio: 1 / 1; border-radius: 50%; background: var(--yellow);
    border: 3px solid var(--ink); display: flex; align-items: center; justify-content: center;

      if (i === 0 || minLostPoint > lostPoint) { minLostPoint = lostPoint; pattern = i; }
    }
    return pattern;
  }
  setupTimingPattern() {
    for (let r = 8; r < this.moduleCount - 8; r++) { if (this.modules[r][6] != null) continue; this.modules[r][6] = (r % 2 === 0); }
    for (let c = 8; c < this.moduleCount - 8; c++) { if (this.modules[6][c] != null) continue; this.modules[6][c] = (c % 2 === 0); }
  }
  setupPositionAdjustPattern() {
    const pos = QRUtil.getPatternPosition(this.typeNumber);
    for (let i = 0; i < pos.length; i++) {
      for (let j = 0; j < pos.length; j++) {
        const row = pos[i], col = pos[j];
        if (this.modules[row][col] != null) continue;
        for (let r = -2; r <= 2; r++) for (let c = -2; c <= 2; c++) {
          const dark = (r===-2||r===2||c===-2||c===2||(r===0&&c===0));
          this.modules[row+r][col+c] = dark;
        }
      }
    }
  }
  setupTypeNumber(test) {
    const bits = QRUtil.getBCHTypeNumber(this.typeNumber);
    for (let i = 0; i < 18; i++) {
      const mod = (!test && ((bits >> i) & 1) === 1);
      this.modules[Math.floor(i/3)][i%3 + this.moduleCount - 8 - 3] = mod;
    }
    for (let i = 0; i < 18; i++) {
      const mod = (!test && ((bits >> i) & 1) === 1);
      this.modules[i%3 + this.moduleCount - 8 - 3][Math.floor(i/3)] = mod;
    }
  }
  setupTypeInfo(test, maskPattern) {
    const data = (this.errorCorrectLevel << 3) | maskPattern;
    const bits = QRUtil.getBCHTypeInfo(data);
    for (let i = 0; i < 15; i++) {
      const mod = (!test && ((bits >> i) & 1) === 1);
      if (i < 6) this.modules[i][8] = mod;
      else if (i < 8) this.modules[i+1][8] = mod;
      else this.modules[this.moduleCount - 15 + i][8] = mod;
    }
    for (let i = 0; i < 15; i++) {
      const mod = (!test && ((bits >> i) & 1) === 1);
      if (i < 8) this.modules[8][this.moduleCount - i - 1] = mod;
      else if (i < 9) this.modules[8][15 - i - 1 + 1] = mod;
      else this.modules[8][15 - i - 1] = mod;
    }
    this.modules[this.moduleCount - 8][8] = (!test);
  }
  mapData(data, maskPattern) {
    let inc = -1, row = this.moduleCount - 1, bitIndex = 7, byteIndex = 0;
    for (let col = this.moduleCount - 1; col > 0; col -= 2) {
      if (col === 6) col--;
      while (true) {
        for (let c = 0; c < 2; c++) {
          if (this.modules[row][col-c] == null) {
            let dark = false;
            if (byteIndex < data.length) dark = (((data[byteIndex] >>> bitIndex) & 1) === 1);
            const mask = QRUtil.getMask(maskPattern, row, col-c);
            if (mask) dark = !dark;
            this.modules[row][col-c] = dark;
            bitIndex--;
            if (bitIndex === -1) { byteIndex++; bitIndex = 7; }
          }
        }
        row += inc;
        if (row < 0 || this.moduleCount <= row) { row -= inc; inc = -inc; break; }
      }
    }
  }
  static createData(typeNumber, errorCorrectLevel, dataList) {
    const rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectLevel);
    const buffer = new QRBitBuffer();
    for (let i = 0; i < dataList.length; i++) {
      const data = dataList[i];
      buffer.put(data.mode, 4);
      buffer.put(data.getLength(), QRUtil.getLengthInBits(data.mode, typeNumber));
      data.write(buffer);
    }
    let totalDataCount = 0;
    for (let i = 0; i < rsBlocks.length; i++) totalDataCount += rsBlocks[i].dataCount;
    if (buffer.getLengthInBits() > totalDataCount * 8) throw new Error('code length overflow');
    if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) buffer.put(0, 4);
    while (buffer.getLengthInBits() % 8 !== 0) buffer.putBit(false);
    while (true) {
      if (buffer.getLengthInBits() >= totalDataCount * 8) break;
      buffer.put(0xEC, 8);
      if (buffer.getLengthInBits() >= totalDataCount * 8) break;
      buffer.put(0x11, 8);
    }
    return QRCodeModel.createBytes(buffer, rsBlocks);
  }
  static createBytes(buffer, rsBlocks) {
    let offset = 0, maxDcCount = 0, maxEcCount = 0;
    const dcdata = new Array(rsBlocks.length), ecdata = new Array(rsBlocks.length);
    for (let r = 0; r < rsBlocks.length; r++) {
      const dcCount = rsBlocks[r].dataCount, ecCount = rsBlocks[r].totalCount - dcCount;
      maxDcCount = Math.max(maxDcCount, dcCount); maxEcCount = Math.max(maxEcCount, ecCount);
      dcdata[r] = new Array(dcCount);
      for (let i = 0; i < dcdata[r].length; i++) dcdata[r][i] = 0xff & buffer.buffer[i + offset];
      offset += dcCount;
      const rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
      const rawPoly = new QRPolynomial(dcdata[r], rsPoly.getLength() - 1);
      const modPoly = rawPoly.mod(rsPoly);
      ecdata[r] = new Array(rsPoly.getLength() - 1);
      for (let i = 0; i < ecdata[r].length; i++) {
        const modIndex = i + modPoly.getLength() - ecdata[r].length;
        ecdata[r][i] = (modIndex >= 0) ? modPoly.get(modIndex) : 0;
      }
    }
    let totalCodeCount = 0;
    for (let i = 0; i < rsBlocks.length; i++) totalCodeCount += rsBlocks[i].totalCount;
    const data = new Array(totalCodeCount);
    let index = 0;
    for (let i = 0; i < maxDcCount; i++) for (let r = 0; r < rsBlocks.length; r++) if (i < dcdata[r].length) data[index++] = dcdata[r][i];
    for (let i = 0; i < maxEcCount; i++) for (let r = 0; r < rsBlocks.length; r++) if (i < ecdata[r].length) data[index++] = ecdata[r][i];
    return data;
  }
}

function getMinimumQRTypeNumber(data, errorCorrectLevel) {
  for (let typeNumber = 1; typeNumber <= 40; typeNumber++) {
    try {
      const testModel = new QRCodeModel(typeNumber, errorCorrectLevel);
      testModel.addData(data);
      testModel.make();
      return typeNumber;
    } catch (e) { continue; }
  }
  throw new Error('data too long for QR code');
}

function generateQR(text, errorCorrectLevel) {
  const ecLevel = errorCorrectLevel !== undefined ? errorCorrectLevel : QRErrorCorrectLevel.M;
  const typeNumber = getMinimumQRTypeNumber(text, ecLevel);
  const qr = new QRCodeModel(typeNumber, ecLevel);
  qr.addData(text);
  qr.make();
  return qr;
}

function qrToSVGString(text, sizePx) {
  if (!text) return '<div style="width:' + sizePx + 'px;height:' + sizePx + 'px;background:#F0EEE6;border-radius:3px;"></div>';
  let qr;
  try { qr = generateQR(text, QRErrorCorrectLevel.M); }
  catch (e) { return '<div style="width:' + sizePx + 'px;height:' + sizePx + 'px;background:#F0EEE6;border-radius:3px;"></div>'; }
  const count = qr.getModuleCount();
  const quiet = 2;
  const total = count + quiet * 2;
  let rects = '';
  for (let r = 0; r < count; r++) {
    for (let c = 0; c < count; c++) {
      if (qr.isDark(r, c)) rects += '<rect x="' + (c+quiet) + '" y="' + (r+quiet) + '" width="1" height="1" fill="#14111F"/>';
    }
  }
  return '<svg viewBox="0 0 ' + total + ' ' + total + '" width="' + sizePx + '" height="' + sizePx +
    '" style="border-radius:3px;background:#fff;" shape-rendering="crispEdges">' +
    '<rect x="0" y="0" width="' + total + '" height="' + total + '" fill="#fff"/>' + rects + '</svg>';
}

const SUPABASE_URL = 'https://qlrvlxcqlzntyasfivvn.supabase.co';

async function kvGet(key) {
  try {
    const parts = key.split(':');
    const code = parts[1];
    const property = parts[2];
    
    const { data, error } = await supabaseClient
      .from('rooms')
      .select(property)
      .eq('code', code)
      .maybeSingle();
      
    if (error) {
      console.error("Supabase kvGet error:", error);
      return null;
    }
    if (!data) return null;
    
    const val = data[property];
    if (val === undefined || val === null) return null;
    return typeof val === 'string' ? val : JSON.stringify(val);
  } catch (e) {
    console.error("kvGet Exception:", e);
    return null;
  }
}

async function kvSet(key, value) {
  try {
    const parts = key.split(':');
    const code = parts[1];
    const property = parts[2];
    const parsedValue = JSON.parse(value);
    
    const upsertData = { code };
    upsertData[property] = parsedValue;
    upsertData['updated_at'] = new Date().toISOString();
    
    const { error } = await supabaseClient
      .from('rooms')
      .upsert(upsertData, { onConflict: 'code' });
      
    if (error) {
      console.error("Supabase kvSet error:", error);
      return false;
    }
    return true;
  } catch (e) {
    console.error("kvSet Exception:", e);
    return false;
  }
}

function setupRealtimeListener(roomCode, tickFunction) {
  tickFunction(); // Execute the layout logic once immediately on load
  
  const channel = supabaseClient
    .channel(`room:${roomCode}`)
    .on('postgres_changes', { 
      event: 'UPDATE', 
      schema: 'public', 
      table: 'rooms', 
      filter: `code=eq.${roomCode}` 
    }, () => {
      tickFunction(); // Instantly re-render charts when data changes
    })
    .subscribe();
    
  return {
    close: () => supabaseClient.removeChannel(channel)
  };
}

const BAD_WORDS = ['fuck','shit','cunt','bitch','asshole','dick','pussy','nigger','faggot','whore','slut'];
function isClean(text) { const lower = text.toLowerCase(); return !BAD_WORDS.some(w => lower.includes(w)); }
function normalize(text) { return text.trim().replace(/\s+/g, ' ').slice(0, 40); }
const PALETTE = ['#2B6B5E', '#3D8B7A', '#D4A017', '#C05B3F', '#4A6FA5', '#7A5C8E', '#1F4E45'];
function colorFor(i) { return PALETTE[i % PALETTE.length]; }
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function generateCode() {
  const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let c = '';
  for (let i = 0; i < 4; i++) c += letters[Math.floor(Math.random() * letters.length)];
  return c;
}

}

function currentPromptText(s) { return currentQuestion(s).prompt || ''; }

function currentCorrectIndex(s) { const c = currentQuestion(s).correctIndex; return (c === undefined) ? null : c; }

  if (s.type === 'poll') return (s.votes && s.votes[s.currentIndex]) || currentOptions(s).map(() => 0);

}
function emptyVotesStructure(s) {
  if (s.type === 'poll') return s.questions.map(q => q.options.map(() => 0));

}

function parsePastedQuestions(raw) {
  const lines = raw.split('\n').map(l => l.trim());
  const OPTION_RE = /^[\(\[]?([A-Fa-f])[\.\)\:\]]\s*(.+)$/;
  const QNUM_RE = /^(?:q(?:uestion)?\s*)?\d{1,2}[\.\)\:]\s*(.*)$/i;
  const ANSWER_LINE_RE = /^(answer|correct)[:\s]+([A-Fa-f])\s*$/i;
  const CORRECT_MARK_RE = /\s*[\*✓]\s*$|\s*\((?:correct|right)\)\s*$|\s*\[(?:correct|right)\]\s*$/i;

  const questions = [];
  let current = null;
  let skippedCount = 0;

  function pushCurrent() {
    if (!current) return;
    const filledOptions = current.options.filter(o => o.text.trim().length > 0);
    if (current.prompt.trim() && filledOptions.length >= 2) {
      questions.push({
        prompt: current.prompt.trim(),
        options: filledOptions.map(o => o.text.trim()).slice(0, 6),
        allowMultiple: false,
        correctIndex: current.correctIndex
      });
    } else if (current.prompt.trim() || filledOptions.length > 0) {
      skippedCount++;
    }
    current = null;
  }

  for (const line of lines) {
    if (!line) continue;

    const answerLineMatch = line.match(ANSWER_LINE_RE);
    if (answerLineMatch && current) {
      const letter = answerLineMatch[2].toUpperCase();
      const idx = letter.charCodeAt(0) - 65;
      if (idx >= 0 && idx < current.options.length) current.correctIndex = idx;
      continue;
    }

    const optMatch = line.match(OPTION_RE);
    if (optMatch && current) {
      let text = optMatch[2];
      let isCorrect = false;
      if (CORRECT_MARK_RE.test(text)) {
        isCorrect = true;
        text = text.replace(CORRECT_MARK_RE, '');
      }
      current.options.push({ text });
      if (isCorrect && current.correctIndex === null) current.correctIndex = current.options.length - 1;
      continue;
    }

    let promptText = line;
    const qnumMatch = line.match(QNUM_RE);
    if (qnumMatch) promptText = qnumMatch[1];

    if (current && current.options.length === 0) {
      current.prompt = (current.prompt + ' ' + promptText).trim();
    } else {
      pushCurrent();
      current = { prompt: promptText, options: [], correctIndex: null };
    }
  }
  pushCurrent();

  return { questions, skippedCount };
}

        <div style="display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap;">
          <div class="room-badge">
            <div class="room-badge-label sans">ROOM CODE</div>
            <div class="room-badge-code">${s.code}</div>
          </div>
          <div class="qr-panel">
            ${qrToSVGString(joinUrl, 140)}
            <div class="qr-caption sans">Scan to join room ${s.code}</div>
          </div>
        </div>
      </div>
      <div class="prompt-label">${escapeHtml(isChoice ? currentPromptText(s) : s.prompt)}</div>
      <div class="controls-row">
        ${isPoll ? `
          <div class="poll-nav-row">
            <button class="btn-nav sans" id="btn-poll-prev" ${currentIndexOf(s) === 0 ? 'disabled' : ''}>← Prev</button>
            <button class="btn-nav sans" id="btn-poll-next-live" ${currentIndexOf(s) === numQuestionsOf(s) - 1 ? 'disabled' : ''}>Next →</button>
          </div>` : ''}
        ${s.revealMode === 'manual' ? `<button class="${s.revealed ? 'btn-hide' : 'btn-reveal'} sans" id="btn-toggle-reveal">${s.revealed ? 'Hide answers' : 'Reveal answers'}</button>` : ''}
        <button class="btn-clear sans" id="btn-clear">${isPoll ? 'Clear this question' : (isBrainstorm ? 'Clear all ideas' : 'Clear all answers')}</button>
        ${isPoll && s.requireNames ? '<button class="btn-reveal sans" id="btn-finish-poll">🏁 Finish &amp; show results</button>' : ''}
        ${isBrainstorm ? `
          <button class="${s.mergeMode ? 'btn-hide' : 'btn-nav'} sans" id="btn-toggle-merge">${s.mergeMode ? '✕ Cancel merging' : '🔀 Merge similar ideas'}</button>
          <button class="${s.moveMode ? 'btn-hide' : 'btn-nav'} sans" id="btn-toggle-move">${s.moveMode ? '✕ Lock positions' : '🖐️ Move ideas'}</button>
          <button class="${s.likesEnabled ? 'btn-reveal' : 'btn-clear'} sans" id="btn-toggle-likes">${s.likesEnabled ? '❤️ Liking: Enabled' : '🤍 Liking: Disabled'}</button>
        ` : ''}
        ${s.type === 'wordcloud' || s.type === 'brainstorm' ? `
          <div class="download-dropdown-wrap">
            <button class="btn-nav sans" id="btn-download-board">⬇️ Download Blurt Board</button>
            <div class="download-dropdown-menu sans" id="download-menu" style="display:none;">
              <button class="download-menu-item" id="download-pdf">Export as PDF</button>
              <button class="download-menu-item" id="download-jpeg">Export as JPEG</button>
            </div>
          </div>
        ` : ''}
        <div class="count-note sans" id="submission-count">${teacherCountLabel(s)}</div>
      </div>
      <div class="cloud-stage" id="cloud-stage"></div>
    </div>`;
  const finishBtn = document.getElementById('btn-finish-poll');
  if (finishBtn) finishBtn.onclick = async () => {
    stopPolling();
    const raw = await kvGet('room:' + s.code + ':config');
    if (raw) {
      try {
        const cfg = JSON.parse(raw);
        cfg.finished = true;
        await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
      } catch (e) {}
    }
    state = { screen: 'teacherResults', code: s.code, questions: s.questions };
    render();
  };
  document.getElementById('btn-clear').onclick = async () => {
    if (isChoice) {
      if (isPoll) {
        s.votes[s.currentIndex] = currentOptions(s).map(() => 0);
      } else {
        s.votes = currentOptions(s).map(() => 0);
      }
      await kvSet('room:' + s.code + ':votes', JSON.stringify(s.votes));
    } else if (isBrainstorm) {
      s.posts = [];
      await kvSet('room:' + s.code + ':posts', JSON.stringify([]));
    } else {
      s.words = [];
      await kvSet('room:' + s.code + ':words', JSON.stringify([]));
    }
    renderTeacherStage();
    document.getElementById('submission-count').textContent = teacherCountLabel(s);
  };
  const toggleBtn = document.getElementById('btn-toggle-reveal');
  if (toggleBtn) {
    toggleBtn.onclick = async () => {
      s.revealed = !s.revealed;
      const raw = await kvGet('room:' + s.code + ':config');
      if (raw) {
        try { const cfg = JSON.parse(raw); cfg.revealed = s.revealed; await kvSet('room:' + s.code + ':config', JSON.stringify(cfg)); } catch (e) {}
      }
      render();
    };
  }
  const prevBtn = document.getElementById('btn-poll-prev');
  const nextBtn = document.getElementById('btn-poll-next-live');
  if (prevBtn) prevBtn.onclick = () => pollGoTo(s.currentIndex - 1);
  if (nextBtn) nextBtn.onclick = () => pollGoTo(s.currentIndex + 1);
  const mergeToggleBtn = document.getElementById('btn-toggle-merge');
  if (mergeToggleBtn) mergeToggleBtn.onclick = () => {
    s.mergeMode = !s.mergeMode;
    s.mergeSelectedIds = [];
    if (s.mergeMode) s.moveMode = false;
    render();
  };
  const toggleMoveBtn = document.getElementById('btn-toggle-move');
  if (toggleMoveBtn) {
    toggleMoveBtn.onclick = () => {
      s.moveMode = !s.moveMode;
      s.mergeSelectedIds = [];
      if (s.moveMode) s.mergeMode = false;
      render();
    };
  }
  const toggleLikesBtn = document.getElementById('btn-toggle-likes');
  if (toggleLikesBtn) {
    toggleLikesBtn.onclick = async () => {
      s.likesEnabled = !s.likesEnabled;
      const raw = await kvGet('room:' + s.code + ':config');
      if (raw) {
        try {
          const cfg = JSON.parse(raw);
          cfg.likesEnabled = s.likesEnabled;
          await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
        } catch (e) {}
      }
      render();
    };
  }

  const downloadBtn = document.getElementById('btn-download-board');
  const downloadMenu = document.getElementById('download-menu');
  if (downloadBtn && downloadMenu) {
    downloadBtn.onclick = (e) => {
      e.stopPropagation();
      downloadMenu.style.display = downloadMenu.style.display === 'none' ? 'flex' : 'none';
    };
    document.addEventListener('click', () => {
      downloadMenu.style.display = 'none';
    });
    document.getElementById('download-pdf').onclick = () => exportBoard('pdf');
    document.getElementById('download-jpeg').onclick = () => exportBoard('jpeg');
  }

  renderTeacherStage();
  stopPolling();
  const tick = async () => {
    if (isChoice) {
      const raw = await kvGet('room:' + s.code + ':votes');
      if (raw) { try { s.votes = JSON.parse(raw); } catch (e) {} }
    } else if (isBrainstorm) {
      const raw = await kvGet('room:' + s.code + ':posts');
      if (raw) { try { s.posts = JSON.parse(raw); } catch (e) {} }
    } else {
      const raw = await kvGet('room:' + s.code + ':words');
      if (raw) { try { s.words = JSON.parse(raw); } catch (e) {} }
    }
    if (document.getElementById('submission-count')) document.getElementById('submission-count').textContent = teacherCountLabel(s);
    renderTeacherStage();
  };
  pollTimer = setupRealtimeListener(s.code, tick);
}

async function pollGoTo(newIndex) {
  const s = state;
  if (newIndex < 0 || newIndex >= s.questions.length) return;
  s.currentIndex = newIndex;
  s.revealed = s.revealMode === 'live';
  const raw = await kvGet('room:' + s.code + ':config');
  if (raw) {
    try {
      const cfg = JSON.parse(raw);
      cfg.currentIndex = newIndex;
      cfg.revealed = s.revealed;
      await kvSet('room:' + s.code + ':config', JSON.stringify(cfg));
    } catch (e) {}
  }
  render();
}

async function renderTeacherResults() {
  const s = state;
  app.innerHTML = `
    <div class="results-wrap" id="results-wrap">
      <div class="results-title display">Loading results…</div>
    </div>`;
  const raw = await kvGet('room:' + s.code + ':responses');
  let responses = [];
  if (raw) { try { responses = JSON.parse(raw); } catch (e) { responses = []; } }

  const scored = responses.map(r => scoreResponse(r, s.questions));
  scored.sort((a, b) => b.correct - a.correct);

  const wrap = document.getElementById('results-wrap');
  if (scored.length === 0) {
    wrap.innerHTML = `
      <div class="results-title display">Results</div>
      <div class="empty-results sans">No named responses yet — nobody has submitted an answer in this quiz.</div>
      <div class="results-actions">
        <button class="btn-outline sans" id="btn-back-to-quiz">← Back to quiz</button>
      </div>`;
    document.getElementById('btn-back-to-quiz').onclick = () => {
      state = { screen: 'teacherLive', type: 'poll', code: s.code, questions: s.questions,
        currentIndex: 0, revealMode: 'live', revealed: true, requireNames: true,
        votes: s.questions.map(q => q.options.map(() => 0)) };
      render();
    };
    return;
  }

  const top3 = scored.slice(0, 3);
  // visualOrder maps each podium slot (left-to-right) to the actual rank (0=gold,1=silver,2=bronze)
  const visualOrder = top3.length === 3 ? [1, 0, 2] : top3.map((_, i) => i);
  const medalEmoji = ['🥇', '🥈', '🥉'];
  const barClass = ['first', 'second', 'third'];

  wrap.innerHTML = `
    <div class="results-title display">🏁 Results</div>
    <div class="podium-row">
      ${visualOrder.map(rank => {
        const r = top3[rank];
        return `
        <div class="podium-slot">
          <div class="podium-medal">${medalEmoji[rank]}</div>
          <div class="podium-name sans">${escapeHtml(r.name)}</div>
          <div class="podium-score sans">${r.correct}/${r.total}</div>
          <div class="podium-bar ${barClass[rank]}"></div>
        </div>`;
      }).join('')}
    </div>
    <div class="leaderboard-list">
      ${scored.map((r, i) => `
        <div class="leaderboard-row">
          <span><span class="leaderboard-rank sans">#${i + 1}</span><span class="sans">${escapeHtml(r.name)}</span></span>
          <span class="sans">${r.correct}/${r.total} correct</span>
        </div>`).join('')}
    </div>
    <div class="results-actions">
      <button class="btn-outline sans" id="btn-back-to-quiz">← Back to quiz</button>
    </div>`;

  document.getElementById('btn-back-to-quiz').onclick = () => {
    state = { screen: 'teacherLive', type: 'poll', code: s.code, questions: s.questions,
      currentIndex: 0, revealMode: 'live', revealed: true, requireNames: true,
      votes: s.questions.map(q => q.options.map(() => 0)) };
    render();
  };
}

function scoreResponse(record, questions) {
  let correct = 0, wrong = 0;
  const perQuestion = questions.map((q, i) => {
    const answer = (record.answers && record.answers[i]) || null;
    if (!answer || answer.length === 0) return { status: 'unanswered', text: '' };
    const answerText = answer.map(idx => q.options[idx]).filter(Boolean).join('; ');
    if (q.correctIndex === null || q.correctIndex === undefined) {
      return { status: 'unscored', text: answerText };
    }
    const isCorrect = answer.length === 1 && answer[0] === q.correctIndex;
    if (isCorrect) correct++; else wrong++;
    return { status: isCorrect ? 'correct' : 'wrong', text: answerText };
  });
  const scoredQuestionCount = questions.filter(q => q.correctIndex !== null && q.correctIndex !== undefined).length;
  return { name: record.name, correct, wrong, total: scoredQuestionCount, perQuestion };
}

function teacherCountLabel(s) {
  if (s.type === 'mc' || s.type === 'poll') {
    const total = getCurrentVotes(s).reduce((a, v) => a + v, 0);
    return total + ' vote' + (total === 1 ? '' : 's');
  }
  if (s.type === 'brainstorm') {
    const count = (s.posts || []).length;
    return count + ' idea' + (count === 1 ? '' : 's');
  }
  return totalCount(s.words) + ' submissions';
}

function renderTeacherStage() {
  if (state.type === 'mc' || state.type === 'poll') return renderMCStage();
  if (state.type === 'brainstorm') return renderBrainstormStage();
  return renderCloudStage();
}

function totalCount(words) { return (words || []).reduce((a, w) => a + w.count, 0); }

function renderMCStage() {
  const stage = document.getElementById('cloud-stage');
  if (!stage) return;
  const s = state;
  const votes = getCurrentVotes(s);
  if (s.revealMode === 'manual' && !s.revealed) {
    const total = votes.reduce((a, v) => a + v, 0);
    stage.innerHTML = `
      <div class="hidden-note sans">
        <div class="hidden-note-main">Results are hidden from view.</div>
        <div>${total} vote${total === 1 ? '' : 's'} collected so far — hit "Reveal answers" when ready.</div>
      </div>`;
    return;
  }
  stage.innerHTML = '<div style="width:100%;max-width:600px;">' + mcResultsHtml(currentOptions(s), votes, currentCorrectIndex(s), true) + '</div>';
}

function mcResultsHtml(options, votes, correctIndex, revealCorrect) {
  const total = (votes || []).reduce((a, v) => a + v, 0);
  const hasCorrect = correctIndex !== null && correctIndex !== undefined;
  let html = '';
  if (revealCorrect && hasCorrect) {
    html += `<div class="answer-banner sans">✅ Correct answer: <strong>${escapeHtml(options[correctIndex])}</strong></div>`;
  }
  options.forEach((opt, i) => {
    const count = votes[i] || 0;
    const pct = total > 0 ? Math.round((count / total) * 100) : 0;
    const isCorrect = revealCorrect && hasCorrect && correctIndex === i;
    html += `
      <div class="mc-bar-row">
        <div class="mc-bar-label sans">
          <span>${escapeHtml(opt)} ${isCorrect ? '<span class="correct-badge">✓ correct</span>' : ''}</span>
          <span class="mc-bar-count">${count} · ${pct}%</span>
        </div>
        <div class="mc-bar-track">
          <div class="mc-bar-fill" style="width:${pct}%;background:${isCorrect ? '#2B6B5E' : colorFor(i)};"></div>
        </div>
      </div>`;
  });
  return html;
}

function renderBrainstormStage() {
  const stage = document.getElementById('cloud-stage');
  if (!stage) return;
  const s = state;
  const posts = s.posts || [];
  s.mergeSelectedIds = s.mergeSelectedIds || [];
  if (s.revealMode === 'manual' && !s.revealed) {
    stage.innerHTML = `
      <div class="hidden-note sans">
        <div class="hidden-note-main">Ideas are hidden from view.</div>
        <div>${posts.length} idea${posts.length === 1 ? '' : 's'} collected so far — hit "Reveal answers" when ready.</div>
      </div>`;
    return;
  }

  stage.innerHTML = brainstormBoardHtml(s.prompt, posts, {
    interactive: false, mergeMode: s.mergeMode, moveMode: s.moveMode, selectedIds: s.mergeSelectedIds
  });

  if (s.moveMode) {
    stage.querySelectorAll('.brainstorm-post').forEach(el => {
      setupPostDragging(el, el.dataset.id);
    });
  }

  if (s.mergeMode) {
    stage.querySelectorAll('.brainstorm-post[data-id], .brainstorm-chip[data-id]').forEach(el => {
      el.onclick = () => {
        const id = el.dataset.id;
        const idx = s.mergeSelectedIds.indexOf(id);
        if (idx === -1) s.mergeSelectedIds.push(id); else s.mergeSelectedIds.splice(idx, 1);
        renderBrainstormStage();
      };
    });
    renderMergeControls(stage, posts);
  }
}

function renderMergeControls(stage, posts) {
  const s = state;
  const selected = posts.filter(p => s.mergeSelectedIds.indexOf(p.id) !== -1);
  const container = document.createElement('div');

  if (s.mergePickText !== undefined && selected.length >= 2) {
    // confirmation panel: choose which wording to keep
    const panel = document.createElement('div');
    panel.className = 'merge-panel';
    panel.innerHTML = `
      <div class="field-label sans">Merge ${selected.length} ideas — which wording should we keep?</div>
      ${selected.map((p, i) => `
        <div class="merge-option-row sans ${s.mergePickText === p.text ? 'picked' : ''}" data-idx="${i}">
          ${escapeHtml(p.text)} <span style="color:var(--faint);font-weight:400;">(×${p.count || 1}, ❤️${p.likes})</span>
        </div>`).join('')}
      <div style="margin-top:0.6rem;">
        <label class="field-label sans">Or type a new combined label</label>
        <input type="text" id="merge-custom-text" placeholder="Custom wording (optional)" value="${escapeHtml(s.mergeCustomText || '')}" />
      </div>
      <div style="display:flex;gap:0.6rem;margin-top:1rem;">
        <button class="btn-nav sans" id="btn-merge-cancel" style="flex:1;">Cancel</button>
        <button class="btn-primary sans" id="btn-merge-confirm" style="flex:1;">Confirm merge</button>
      </div>`;
    container.appendChild(panel);
    stage.appendChild(container);

    panel.querySelectorAll('.merge-option-row').forEach((row, i) => {
      row.onclick = () => { s.mergePickText = selected[i].text; s.mergeCustomText = ''; renderBrainstormStage(); };
    });
    document.getElementById('merge-custom-text').oninput = (e) => { s.mergeCustomText = e.target.value; };
    document.getElementById('btn-merge-cancel').onclick = () => { s.mergePickText = undefined; s.mergeCustomText = ''; renderBrainstormStage(); };
    document.getElementById('btn-merge-confirm').onclick = () => confirmMerge(selected);
  } else {
    const bar = document.createElement('div');
    bar.className = 'merge-bar sans';
    bar.innerHTML = selected.length >= 2
      ? `<span>${selected.length} selected</span><button class="btn-primary sans" id="btn-merge-next">Merge these →</button>`
      : `<span style="color:var(--muted);">Tap 2 or more ideas to merge them</span>`;
    container.appendChild(bar);
    stage.appendChild(container);
    const nextBtn = document.getElementById('btn-merge-next');
    if (nextBtn) nextBtn.onclick = () => {
      s.mergePickText = selected[0].text;
      s.mergeCustomText = '';
      renderBrainstormStage();
    };
  }
}

async function confirmMerge(selected) {
  const s = state;
  const finalText = (s.mergeCustomText && s.mergeCustomText.trim()) ? s.mergeCustomText.trim() : s.mergePickText;
  if (!finalText) return;
  for (let attempt = 0; attempt < 3; attempt++) {
    const raw = await kvGet('room:' + s.code + ':posts');
    let list = [];
    if (raw) { try { list = JSON.parse(raw); } catch (e) {} }
    const idsToMerge = selected.map(p => p.id);
    const toMerge = list.filter(p => idsToMerge.indexOf(p.id) !== -1);
    if (toMerge.length < 2) break;
    const mergedPost = {
      id: toMerge[0].id,
      text: finalText,
      likes: toMerge.reduce((a, p) => a + (p.likes || 0), 0),
      count: toMerge.reduce((a, p) => a + (p.count || 1), 0),
      ownerSessionIds: Array.from(new Set(toMerge.reduce((a, p) => a.concat(p.ownerSessionIds || []), [])))
    };
    const remaining = list.filter(p => idsToMerge.indexOf(p.id) === -1);
    remaining.push(mergedPost);
    const ok = await kvSet('room:' + s.code + ':posts', JSON.stringify(remaining));
    if (ok) { s.posts = remaining; break; }
    await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
  }
  s.mergeMode = false;
  s.mergeSelectedIds = [];
  s.mergePickText = undefined;
  s.mergeCustomText = '';
  renderTeacherStage();
  if (document.getElementById('submission-count')) document.getElementById('submission-count').textContent = teacherCountLabel(s);
}

function setupPostDragging(el, postId) {
  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let startLeft = 0;
  let startTop = 0;

  const onStart = (clientX, clientY) => {
    isDragging = true;
    startX = clientX;
    startY = clientY;
    startLeft = parseFloat(el.style.left) || 50;
    startTop = parseFloat(el.style.top) || 50;
    el.style.zIndex = 1000;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  };

  const onMove = (clientX, clientY) => {
    if (!isDragging) return;
    const board = el.parentElement;
    const rect = board.getBoundingClientRect();
    const deltaX = clientX - startX;
    const deltaY = clientY - startY;
    const deltaLeft = (deltaX / rect.width) * 100;
    const deltaTop = (deltaY / rect.height) * 100;
    
    let newLeft = Math.max(5, Math.min(95, startLeft + deltaLeft));
    let newTop = Math.max(5, Math.min(95, startTop + deltaTop));
    
    el.style.left = newLeft + '%';
    el.style.top = newTop + '%';
  };

  const onTouchMove = (e) => {
    if (e.cancelable) e.preventDefault();
    if (e.touches.length > 0) {
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }
  };

  const onEnd = async () => {
    if (!isDragging) return;
    isDragging = false;
    el.style.zIndex = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onEnd);

    const finalLeft = parseFloat(el.style.left);
    const finalTop = parseFloat(el.style.top);
    const post = state.posts.find(p => p.id === postId);
    if (post) {
      post.left = finalLeft;
      post.top = finalTop;
      await kvSet('room:' + state.code + ':posts', JSON.stringify(state.posts));
    }
  };

  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return; // Only left click
    onStart(e.clientX, e.clientY);
  });
  el.addEventListener('touchstart', (e) => {
    if (e.touches.length > 0) {
      onStart(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: true });
  el.addEventListener('dragstart', (e) => e.preventDefault());
}

function circlePositions(n) {
  const positions = [];
  if (n === 0) return positions;
  const radius = 38;
  for (let i = 0; i < n; i++) {
    const angle = (2 * Math.PI * i / n) - Math.PI / 2;
    positions.push({ left: 50 + radius * Math.cos(angle), top: 50 + radius * Math.sin(angle) });
  }
  return positions;
}

function postWeight(post) {
  return (post.likes || 0) + ((post.count || 1) - 1);
}

function brainstormBoardHtml(prompt, posts, opts) {
  opts = opts || {};
  const interactive = !!opts.interactive;
  const mergeMode = !!opts.mergeMode;
  const mySessionId = opts.mySessionId;
  const likedPostIds = opts.likedPostIds || [];
  const selectedIds = opts.selectedIds || [];

  if (!posts || posts.length === 0) {
    return `
      <div class="brainstorm-board">
        <div class="brainstorm-hub"><div class="brainstorm-hub-text">${escapeHtml(prompt)}</div></div>
      </div>
      <div class="hidden-note sans" style="margin-top:1rem;">No ideas yet — waiting for the first post…</div>`;
  }

  const sorted = posts.slice().sort((a, b) => postWeight(b) - postWeight(a));
  const top = sorted.slice(0, 8);
  const rest = sorted.slice(8);
  const maxW = postWeight(top[0]);
  const minW = postWeight(top[top.length - 1]);
  const positions = circlePositions(top.length);

  function postInner(post, small) {
    const likesEnabled = (opts.likesEnabled !== undefined) ? opts.likesEnabled : true;
    const canLike = interactive && !mergeMode && likesEnabled && (post.ownerSessionIds || []).indexOf(mySessionId) === -1 && likedPostIds.indexOf(post.id) === -1;
    const countBadge = (post.count || 1) > 1 ? `<span class="brainstorm-count-badge" title="${post.count} people wrote this">×${post.count}</span>` : '';
    const likeEl = mergeMode
      ? ''
      : (interactive
          ? `<button class="${small ? 'brainstorm-like-btn-sm' : 'brainstorm-like-btn'}" data-id="${post.id}" ${canLike ? '' : 'disabled'}>❤️ ${post.likes}</button>`
          : `<${small ? 'span' : 'div'} class="${small ? 'brainstorm-like-count-sm' : 'brainstorm-like-count'}">❤️ ${post.likes}</${small ? 'span' : 'div'}>`);
    return { countBadge, likeEl, canLike };
  }

  let html = '<div class="brainstorm-board">';
  html += '<div class="brainstorm-hub"><div class="brainstorm-hub-text">' + escapeHtml(prompt) + '</div></div>';
  top.forEach((post, i) => {
    const pos = positions[i];
    const leftVal = (post.left !== undefined) ? post.left : pos.left;
    const topVal = (post.top !== undefined) ? post.top : pos.top;
    const scale = maxW === minW ? 1 : (0.85 + 0.5 * ((postWeight(post) - minW) / (maxW - minW)));
    const { countBadge, likeEl } = postInner(post, false);
    const isSelected = selectedIds.indexOf(post.id) !== -1;
    html += `<div class="brainstorm-post ${mergeMode ? 'mergeable' : ''} ${opts.moveMode ? 'movable' : ''} ${isSelected ? 'merge-selected' : ''}" data-id="${post.id}" style="left:${leftVal}%;top:${topVal}%;transform:translate(-50%,-50%) scale(${scale.toFixed(2)});">
      ${mergeMode ? `<span class="merge-tick-box">${isSelected ? '✓' : ''}</span>` : ''}
      <div class="brainstorm-post-text">${escapeHtml(post.text)} ${countBadge}</div>
      ${likeEl}
    </div>`;
  });
  html += '</div>';

  if (rest.length > 0) {
    html += '<div class="brainstorm-more-list">';
    rest.forEach(post => {
      const { countBadge, likeEl } = postInner(post, true);
      const isSelected = selectedIds.indexOf(post.id) !== -1;
      html += `<div class="brainstorm-chip ${mergeMode ? 'mergeable' : ''} ${isSelected ? 'merge-selected' : ''}" data-id="${post.id}">
        ${mergeMode ? `<span class="merge-tick-box">${isSelected ? '✓' : ''}</span>` : ''}
        <span>${escapeHtml(post.text)} ${countBadge}</span>
        ${likeEl}
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function normalizeBrainstorm(text) {
  return text.trim().replace(/\s+/g, ' ').slice(0, 80);
}

function renderCloudStage() {
  const stage = document.getElementById('cloud-stage');
  if (!stage) return;
  const s = state;
  if (s.revealMode === 'manual' && !s.revealed) {
    stage.innerHTML = `
      <div class="hidden-note sans">
        <div class="hidden-note-main">Answers are hidden from view.</div>
        <div>${totalCount(s.words)} collected so far — hit "Reveal answers" when ready.</div>
      </div>`;
    return;
  }
  stage.innerHTML = cloudHtml(s.words, false);
}

function cloudHtml(words, compact) {
  if (!words || words.length === 0) {
    return '<div class="hidden-note sans">No answers yet — waiting for the first submission…</div>';
  }
  const max = Math.max(...words.map(w => w.count));
  const min = Math.min(...words.map(w => w.count));
  const sorted = [...words].sort((a, b) => b.count - a.count);
  let html = '<div style="display:flex;flex-wrap:wrap;gap:0.4rem 1rem;justify-content:center;align-items:center;max-width:' + (compact ? '620px' : '900px') + ';margin:0 auto;">';
  sorted.forEach((w, i) => {
    const scale = max === min ? 0.6 : (w.count - min) / (max - min);
    const size = compact ? (0.9 + scale * 1.6) : (1.1 + scale * 2.8);
    html += `<span class="cloud-word" style="font-size:${size}rem;color:${colorFor(i)};" title="${w.count} submission${w.count > 1 ? 's' : ''}">${escapeHtml(w.text)}</span>`;
  });
  html += '</div>';
  return html;
}

    const clean = (state.codeInput || '').trim().toUpperCase();

    state.checking = true; render();
    document.getElementById('code-input').focus();

      };

        answer: '', words: [], options: cfg.options || [], allowMultiple: !!cfg.allowMultiple,
        correctIndex: (cfg.correctIndex === undefined) ? null : cfg.correctIndex, votes: (cfg.options || []).map(() => 0),
        selected: [], hasVoted: false, posts: []

    render();
  }
}

      </div>

  document.getElementById('btn-back').onclick = () => { state = { screen: 'studentJoin', codeInput: '', error: '' }; render(); };
  const nameInput = document.getElementById('name-input');
  nameInput.oninput = (e) => { s.nameInput = e.target.value; document.getElementById('btn-join-named').disabled = !e.target.value.trim(); };
  nameInput.onkeydown = (e) => { if (e.key === 'Enter' && s.nameInput && s.nameInput.trim()) proceed(); };
  document.getElementById('btn-join-named').onclick = proceed;

  async function proceed() {
    const nickname = (s.nameInput || '').trim().slice(0, 30);
    if (!nickname) return;
    s.checking = true; s.nameError = '';
    render();

    for (let attempt = 0; attempt < 3; attempt++) {
      const raw = await kvGet('room:' + s.code + ':roster');
      let roster = [];
      if (raw) { try { roster = JSON.parse(raw); } catch (e) {} }
      const taken = roster.some(n => n.trim().toLowerCase() === nickname.toLowerCase());
      if (taken) {
        s.checking = false;
        s.nameError = 'That nickname is already taken in this room — try another.';
        render();
        return;
      }
      roster.push(nickname);
      const ok = await kvSet('room:' + s.code + ':roster', JSON.stringify(roster));
      if (ok) {
        const cfgRaw = await kvGet('room:' + s.code + ':config');
        let started = s.started;
        if (cfgRaw) { try { started = !!JSON.parse(cfgRaw).started; } catch (e) {} }

          state = Object.assign({ screen: 'studentRoom' }, s.pending, { studentName: nickname });
        } else {
          state = { screen: 'studentWaitingRoom', code: s.code, nickname, pending: s.pending };
        }
        render();
        return;
      }
      await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
    }
    s.checking = false;
    s.nameError = "Couldn't join — check your connection and try again.";
    render();
  }
}

function renderStudentRoomBrainstorm() {
  const s = state;
  if (!s.mySessionId) s.mySessionId = Math.random().toString(36).slice(2) + Date.now().toString(36);
  if (!s.likedPostIds) s.likedPostIds = [];
  app.innerHTML = `

  const input = document.getElementById('answer-input');

  input.oninput = () => { btn.disabled = !input.value.trim(); };
  input.onkeydown = (e) => { if (e.key === 'Enter') submitIdea(); };

  input.focus();

  renderBoard();
  stopPolling();
  const tick = async () => {
    const cfgRaw = await kvGet('room:' + s.code + ':config');
    if (cfgRaw) {
      try {
        const cfg = JSON.parse(cfgRaw);
        s.revealed = cfg.revealed;
        s.likesEnabled = !!cfg.likesEnabled;
      } catch (e) {}
    }
    const raw = await kvGet('room:' + s.code + ':posts');
    if (raw) { try { s.posts = JSON.parse(raw); } catch (e) {} }
    renderBoard();
  };
  pollTimer = setupRealtimeListener(s.code, tick);

  function renderBoard() {
    const wrap = document.getElementById('brainstorm-board-wrap');
    if (!wrap) return;
    if (!s.revealed) {
      wrap.innerHTML = "<div class=\"hidden-note sans\" style=\"font-size:0.9rem;\">Your teacher hasn't revealed ideas yet.</div>";
      return;
    }
    wrap.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:0.8rem;">
        <div class="download-dropdown-wrap">
          <button class="btn-nav sans" id="btn-download-board" style="padding:0.4rem 0.8rem;font-size:0.8rem;">⬇️ Download Board</button>
          <div class="download-dropdown-menu sans" id="download-menu" style="display:none;right:0;left:auto;">
            <button class="download-menu-item" id="download-pdf">Export as PDF</button>
            <button class="download-menu-item" id="download-jpeg">Export as JPEG</button>
          </div>
        </div>
      </div>
    ` + brainstormBoardHtml(s.prompt, s.posts || [], { interactive: true, mySessionId: s.mySessionId, likedPostIds: s.likedPostIds, likesEnabled: s.likesEnabled });

    const downloadBtn = wrap.querySelector('#btn-download-board');
    const downloadMenu = wrap.querySelector('#download-menu');
    if (downloadBtn && downloadMenu) {
      downloadBtn.onclick = (e) => {
        e.stopPropagation();
        downloadMenu.style.display = downloadMenu.style.display === 'none' ? 'flex' : 'none';
      };
      document.addEventListener('click', () => {
        downloadMenu.style.display = 'none';
      });
      wrap.querySelector('#download-pdf').onclick = () => exportBoard('pdf');
      wrap.querySelector('#download-jpeg').onclick = () => exportBoard('jpeg');
    }

    wrap.querySelectorAll('.brainstorm-like-btn, .brainstorm-like-btn-sm').forEach(el => {
      el.onclick = () => likePost(el.dataset.id);
    });
  }

  async function submitIdea() {
    const clean = normalizeBrainstorm(input.value);
    if (!clean) return;
    document.getElementById('answer-error').textContent = '';
    if (!isClean(clean)) {
      document.getElementById('answer-error').textContent = "That can't be posted here. Try another.";
      return;
    }
    for (let attempt = 0; attempt < 3; attempt++) {
      const raw = await kvGet('room:' + s.code + ':posts');
      let list = [];
      if (raw) { try { list = JSON.parse(raw); } catch (e) { list = []; } }
      const lower = clean.toLowerCase();
      const existing = list.find(p => p.text.toLowerCase() === lower);
      if (existing) {
        existing.count = (existing.count || 1) + 1;
        existing.ownerSessionIds = existing.ownerSessionIds || [];
        if (existing.ownerSessionIds.indexOf(s.mySessionId) === -1) existing.ownerSessionIds.push(s.mySessionId);
      } else {
        list.push({ id: Math.random().toString(36).slice(2) + Date.now().toString(36), text: clean, likes: 0, count: 1, ownerSessionIds: [s.mySessionId] });
      }
      const ok = await kvSet('room:' + s.code + ':posts', JSON.stringify(list));
      if (ok) { s.posts = list; break; }
      await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
    }
    input.value = '';
    btn.disabled = true;
    input.focus();
    const flash = document.getElementById('flash-note');
    const inputEl = document.getElementById('answer-input');
    inputEl.classList.add('flash');
    flash.classList.add('show');
    setTimeout(() => { inputEl.classList.remove('flash'); flash.classList.remove('show'); }, 900);
    renderBoard();
  }

  async function likePost(id) {
    if (s.likedPostIds.indexOf(id) !== -1) return;
    s.likedPostIds.push(id);
    for (let attempt = 0; attempt < 3; attempt++) {
      const raw = await kvGet('room:' + s.code + ':posts');
      let list = [];
      if (raw) { try { list = JSON.parse(raw); } catch (e) { list = []; } }
      const post = list.find(p => p.id === id);
      if (post) post.likes = (post.likes || 0) + 1;
      const ok = await kvSet('room:' + s.code + ':posts', JSON.stringify(list));
      if (ok) { s.posts = list; break; }
      await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
    }
    renderBoard();
  }
}

      renderMCOptions();
    }
    renderMCStudentResults();
  };
  pollTimer = setupRealtimeListener(s.code, tick);
}

function renderMCOptions() {
  const s = state;
  const wrap = document.getElementById('mc-options-wrap');
  if (!wrap) return;
  const options = currentOptions(s);
  const allowMultiple = currentAllowMultiple(s);
  wrap.innerHTML = options.map((opt, i) => `
    <button class="mc-vote-btn sans ${allowMultiple ? 'multi' : ''} ${s.selected.includes(i) ? 'selected' : ''}"
      data-idx="${i}" id="mc-opt-${i}" ${s.hasVoted ? 'disabled' : ''}>
      <span class="mc-vote-marker">${s.selected.includes(i) ? '✓' : ''}</span>
      <span>${escapeHtml(opt)}</span>
    </button>`).join('');
  const submitBtn = document.getElementById('btn-submit-vote');
  if (submitBtn) submitBtn.disabled = s.hasVoted || s.selected.length === 0;
  if (s.hasVoted) return;
  document.querySelectorAll('.mc-vote-btn').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx, 10);
      if (allowMultiple) {
        if (s.selected.includes(idx)) s.selected = s.selected.filter(x => x !== idx);
        else s.selected.push(idx);
      } else {
        s.selected = [idx];
      }
      renderMCOptions();
    };
  });
  if (submitBtn) submitBtn.onclick = submitVote;
}

async function submitVote() {
  const s = state;
  if (s.selected.length === 0) return;
  const isPoll = s.type === 'poll';
  const qIndex = currentIndexOf(s);
  document.getElementById('btn-submit-vote').disabled = true;
  for (let attempt = 0; attempt < 3; attempt++) {
    const raw = await kvGet('room:' + s.code + ':votes');
    let votes = emptyVotesStructure(s);
    if (raw) { try { votes = JSON.parse(raw); } catch (e) {} }
    let target;
    if (isPoll) {
      if (!votes[qIndex]) votes[qIndex] = currentOptions(s).map(() => 0);
      target = votes[qIndex];
    } else {
      target = votes;
    }
    s.selected.forEach(idx => { target[idx] = (target[idx] || 0) + 1; });
    const ok = await kvSet('room:' + s.code + ':votes', JSON.stringify(votes));
    if (ok) { s.votes = votes; break; }
    await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
  }
  s.hasVoted = true;
  if (isPoll) {
    s.answeredIndices[qIndex] = true;
    if (s.studentName) await recordStudentResponse(s, qIndex, s.selected.slice());
  }
  document.getElementById('mc-status-note').textContent = '✓ Vote submitted — thanks!';
  renderMCOptions();
  renderMCStudentResults();
}

async function recordStudentResponse(s, qIndex, selectedIndices) {
  for (let attempt = 0; attempt < 3; attempt++) {
    const raw = await kvGet('room:' + s.code + ':responses');
    let list = [];
    if (raw) { try { list = JSON.parse(raw); } catch (e) { list = []; } }
    const lower = s.studentName.trim().toLowerCase();
    let record = list.find(r => r.name.trim().toLowerCase() === lower);
    if (!record) {
      record = { name: s.studentName.trim(), answers: s.questions.map(() => null) };
      list.push(record);
    }
    if (!record.answers || record.answers.length !== s.questions.length) {
      record.answers = s.questions.map((_, i) => (record.answers && record.answers[i]) || null);
    }
    record.answers[qIndex] = selectedIndices;
    const ok = await kvSet('room:' + s.code + ':responses', JSON.stringify(list));
    if (ok) return;
    await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
  }
}

function renderMCStudentResults() {
  const wrap = document.getElementById('mc-results-wrap');
  if (!wrap) return;
  const s = state;
  if (!s.revealed) {
    wrap.innerHTML = "<div class=\"hidden-note sans\" style=\"font-size:0.9rem;\">Your teacher hasn't revealed the results yet.</div>";
    return;
  }
  wrap.innerHTML = mcResultsHtml(currentOptions(s), getCurrentVotes(s), currentCorrectIndex(s), s.hasVoted);
}

function renderStudentCloud() {
  const wrap = document.getElementById('student-cloud-wrap');
  if (!wrap) return;
  const s = state;
  if (!s.revealed) {
    wrap.innerHTML = "<div class=\"hidden-note sans\" style=\"font-size:0.9rem;\">Your teacher hasn't revealed the answers yet.</div>";
    return;
  }
  wrap.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:0.8rem;">
      <div class="download-dropdown-wrap">
        <button class="btn-nav sans" id="btn-download-board" style="padding:0.4rem 0.8rem;font-size:0.8rem;">⬇️ Download Board</button>
        <div class="download-dropdown-menu sans" id="download-menu" style="display:none;right:0;left:auto;">
          <button class="download-menu-item" id="download-pdf">Export as PDF</button>
          <button class="download-menu-item" id="download-jpeg">Export as JPEG</button>
        </div>
      </div>
    </div>
  ` + cloudHtml(s.words, true);

  const downloadBtn = wrap.querySelector('#btn-download-board');
  const downloadMenu = wrap.querySelector('#download-menu');
  if (downloadBtn && downloadMenu) {
    downloadBtn.onclick = (e) => {
      e.stopPropagation();
      downloadMenu.style.display = downloadMenu.style.display === 'none' ? 'flex' : 'none';
    };
    document.addEventListener('click', () => {
      downloadMenu.style.display = 'none';
    });
    wrap.querySelector('#download-pdf').onclick = () => exportBoard('pdf');
    wrap.querySelector('#download-jpeg').onclick = () => exportBoard('jpeg');
  }
}

function exportBoard(format) {
  const target = document.getElementById('cloud-stage') || 
                 document.getElementById('brainstorm-board-wrap') || 
                 document.getElementById('student-cloud-wrap');
  if (!target) {
    alert("Could not find the board element to export.");
    return;
  }

  const originalCursor = document.body.style.cursor;
  document.body.style.cursor = 'wait';

  html2canvas(target, {
    backgroundColor: '#2B2145',
    scale: 2,
    logging: false,
    useCORS: true
  }).then(canvas => {
    document.body.style.cursor = originalCursor;
    if (format === 'jpeg') {
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `blurt-board-${state.code}.jpg`;
      a.click();
    } else if (format === 'pdf') {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
        unit: 'px',
        format: [canvas.width, canvas.height]
      });
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, canvas.width, canvas.height);
      pdf.save(`blurt-board-${state.code}.pdf`);
    }
  }).catch(err => {
    document.body.style.cursor = originalCursor;
    alert("Export failed: " + err.message);
  });
}

/* Auto-join if the URL contains ?join=CODE (used by the QR code) */
(function init() {
  const params = new URLSearchParams(window.location.search);
  const joinCode = params.get('join');
  if (joinCode) {
    state = { screen: 'studentJoin', codeInput: joinCode.toUpperCase(), error: '' };
    render();
    // auto-trigger join
    document.getElementById('btn-join').click();
  } else {
    render();
  }
})();
</script>
